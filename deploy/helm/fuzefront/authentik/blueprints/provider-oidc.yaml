# Authentik Blueprint — FuzeFront OIDC provider + Application
#
# Creates the OIDC provider and Application for the FuzeFront backend.
# client_id is public/non-sensitive and kept as a literal.
# client_secret is injected at blueprint-apply time via Authentik's !Env
# YAML tag — it reads AUTHENTIK_OIDC_CLIENT_SECRET from the worker pod's
# environment (sourced from the chart Secret via secretKeyRef). No secret
# value is stored in this file or in the ConfigMap.
#
# For production: set AUTHENTIK_CLIENT_SECRET in the chart Secret
# (e.g. via a SealedSecret); the worker propagates it to Authentik.
#
# NOTE: attrs.client_id / attrs.client_secret are respected at *creation time*
# by Authentik 2024.x blueprint runner. If the provider already exists, these
# fields are not updated (Authentik generates a new secret on provider creation
# if client_secret is absent from attrs). Rotation requires deleting the
# provider entry and re-applying.
#
# DESIGN: All objects this blueprint needs are defined inline (flow, scope
# mappings) — no !Find references to system-blueprint objects. Authentik's
# Celery blueprint runner applies system and custom blueprints concurrently;
# a !Find that references a system object (e.g. the built-in scope-openid
# scopemapping) will silently abort the entry if that object isn't yet
# committed to the DB. Defining everything inline eliminates that race.
version: 1
metadata:
  name: FuzeFront OIDC Provider
entries:
  # ── Authorization flow (implicit consent) ────────────────────────────────────
  # An empty authorization flow = implicit consent in Authentik. The blueprint
  # runner appends OAuthFulfillmentStage automatically; with no ConsentStage in
  # the flow, consent is bypassed and the code is issued immediately.
  - model: authentik_flows.flow
    state: present
    identifiers:
      slug: fuzefront-authorization-implicit-consent
    attrs:
      name: FuzeFront Authorization (Implicit Consent)
      slug: fuzefront-authorization-implicit-consent
      designation: authorization
      title: FuzeFront Sign In
      # require_authenticated: user must already be logged in to run this flow.
      # all + 0 policy bindings = vacuous truth → flow is always accessible.
      authentication: require_authenticated
      policy_engine_mode: all

  # ── Scope mappings (inline — no system-blueprint dependency) ─────────────────
  # Defined before the provider so they exist in DB when the provider entry's
  # !Find tags execute (blueprint entries are applied in order).
  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: "FuzeFront OIDC scope - openid"
    attrs:
      name: "FuzeFront OIDC scope - openid"
      scope_name: openid
      expression: "return {}"

  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: "FuzeFront OIDC scope - email"
    attrs:
      name: "FuzeFront OIDC scope - email"
      scope_name: email
      expression: |
        return {
            "email": request.user.email,
            "email_verified": True,
        }

  - model: authentik_providers_oauth2.scopemapping
    state: present
    identifiers:
      name: "FuzeFront OIDC scope - profile"
    attrs:
      name: "FuzeFront OIDC scope - profile"
      scope_name: profile
      expression: |
        return {
            "name": request.user.name,
            "given_name": request.user.name,
            "preferred_username": request.user.username,
            "nickname": request.user.username,
            "groups": [g.name for g in request.user.ak_groups.all()],
        }

  # ── OIDC / OAuth2 provider ────────────────────────────────────────────────────
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: FuzeFront
    attrs:
      name: FuzeFront
      client_type: confidential
      # client_id is public/non-sensitive — kept as a deterministic literal.
      # client_secret is resolved at apply time from the worker pod env var
      # AUTHENTIK_OIDC_CLIENT_SECRET (sourced from the chart Secret). No
      # secret value is committed to git or stored in the ConfigMap.
      client_id: "fuzefront-oidc-client"
      client_secret: !Env [AUTHENTIK_OIDC_CLIENT_SECRET, ""]
      # Redirect URIs — local dev (http + https) + E2E tunnel + production.
      # All listed statically (the blueprint ConfigMap is a raw file, not
      # Helm-templated), so the same blueprint works in all envs; extra URIs
      # are harmless. The http://localhost:3001 entry is used by the E2E stack
      # (docker-compose.e2e.yml) where the backend is published on the host.
      redirect_uris:
        - matching_mode: strict
          url: "http://fuzefront.dev.local/api/auth/oidc/callback"
        - matching_mode: strict
          url: "https://fuzefront.dev.local/api/auth/oidc/callback"
        - matching_mode: strict
          url: "https://app.fuzefront.com/api/auth/oidc/callback"
        - matching_mode: strict
          url: "http://localhost:3001/api/auth/oidc/callback"
      # Scope mappings defined inline above — !Find resolves within this same
      # blueprint run since those entries are applied before this one.
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [name, "FuzeFront OIDC scope - openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "FuzeFront OIDC scope - email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, "FuzeFront OIDC scope - profile"]]
      # Use email as the `sub` claim — consistent with the seeder behaviour
      sub_mode: user_email
      include_claims_in_id_token: true
      # Reference the flow defined above. !Find resolves within the same
      # blueprint run — the flow entry is applied before this provider entry.
      authorization_flow: !Find [authentik_flows.flow, [slug, fuzefront-authorization-implicit-consent]]

  # ── Application ───────────────────────────────────────────────────────────────
  - model: authentik_core.application
    state: present
    identifiers:
      slug: fuzefront
    attrs:
      name: FuzeFront
      slug: fuzefront
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, FuzeFront]]
      # Post-login landing target. MUST be the production app host — this was
      # a DEV url (https://fuzefront.dev.local/) in production, so Authentik
      # could not send the user anywhere valid and fell back to its own library
      # page (authentik_core:if-user → /if/user/#/library), leaking the IdP UI.
      #
      # This endpoint 302s to the OIDC authorize URL with a fresh state + PKCE
      # challenge, so landing here completes a clean login round-trip rather
      # than replaying a stale authorization request.
      meta_launch_url: "https://app.fuzefront.com/api/auth/oidc/login"
      meta_description: "FuzeFront runtime microfrontend platform"
      # all + 0 policy bindings = vacuous truth → all authenticated users are
      # granted access. No policy binding entries needed.
      policy_engine_mode: all
      open_in_new_tab: false

  # ── Brand default application ────────────────────────────────────────────────
  # The second half of the "Authentik landed the user on its own library page"
  # fix. Even with a correct meta_launch_url, a brand with no default_application
  # falls back to `authentik_core:if-user` (/if/user/#/library) after login.
  # Pointing the brand at the FuzeFront Application makes that redirect land on
  # the FuzeFront dashboard instead.
  #
  # Defined HERE rather than in brand-fuseseam.yaml on purpose: the !Find needs
  # the Application above to already be committed. Authentik's Celery runner
  # applies blueprint files CONCURRENTLY, so a cross-file !Find can silently
  # abort the entry (see the DESIGN note at the top of this file) — and
  # brand-fuseseam.yaml sorts alphabetically first, making the race likely.
  # Same file + after the Application entry = resolved in one ordered pass.
  #
  # Only `default_application` is set; identifiers match the existing brand row
  # by domain, so all branding attrs in brand-fuseseam.yaml are left untouched.
  - model: authentik_brands.brand
    state: present
    identifiers:
      domain: "fuzefront.com"
    attrs:
      default_application: !Find [authentik_core.application, [slug, fuzefront]]
