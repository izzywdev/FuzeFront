# Authentik Blueprint — FuzeFront OIDC provider + Application
#
# Creates the OIDC provider and Application for the FuzeFront backend.
# client_id is public/non-sensitive and kept as a literal.
# client_secret is injected at blueprint-apply time via Authentik's !Env
# YAML tag — it reads AUTHENTIK_OIDC_CLIENT_SECRET from the worker pod's
# environment (sourced from the chart Secret via secretKeyRef). No secret
# value is stored in this file or in the ConfigMap.
#
# For production: set AUTHENTIK_CLIENT_SECRET in the chart Secret
# (e.g. via a SealedSecret); the worker propagates it to Authentik.
#
# NOTE: attrs.client_id / attrs.client_secret are respected at *creation time*
# by Authentik 2024.x blueprint runner. If the provider already exists, these
# fields are not updated (Authentik generates a new secret on provider creation
# if client_secret is absent from attrs). Rotation requires deleting the
# provider entry and re-applying.
version: 1
metadata:
  name: FuzeFront OIDC Provider
entries:
  # ── Authorization flow (implicit consent) ────────────────────────────────────
  # An empty authorization flow = implicit consent in Authentik. The blueprint
  # runner appends OAuthFulfillmentStage automatically; with no ConsentStage in
  # the flow, consent is bypassed and the code is issued immediately.
  #
  # We define the flow inline (not via !Find on a system blueprint slug) so
  # there is no ordering dependency on system blueprints. If !Find can't resolve
  # an object, Authentik aborts the blueprint entry, which would prevent the
  # provider (and thus the application) from being created.
  - model: authentik_flows.flow
    state: present
    identifiers:
      slug: fuzefront-authorization-implicit-consent
    attrs:
      name: FuzeFront Authorization (Implicit Consent)
      slug: fuzefront-authorization-implicit-consent
      designation: authorization
      title: FuzeFront Sign In
      # require_authenticated: user must already be logged in to run this flow.
      # all + 0 policy bindings = vacuous truth → flow is always accessible.
      authentication: require_authenticated
      policy_engine_mode: all

  # ── OIDC / OAuth2 provider ────────────────────────────────────────────────────
  - model: authentik_providers_oauth2.oauth2provider
    state: present
    identifiers:
      name: FuzeFront
    attrs:
      name: FuzeFront
      client_type: confidential
      # client_id is public/non-sensitive — kept as a deterministic literal.
      # client_secret is resolved at apply time from the worker pod env var
      # AUTHENTIK_OIDC_CLIENT_SECRET (sourced from the chart Secret). No
      # secret value is committed to git or stored in the ConfigMap.
      client_id: "fuzefront-oidc-client"
      client_secret: !Env [AUTHENTIK_OIDC_CLIENT_SECRET, ""]
      # Redirect URIs — local dev (http + https) + E2E tunnel + production.
      # All listed statically (the blueprint ConfigMap is a raw file, not
      # Helm-templated), so the same blueprint works in all envs; extra URIs
      # are harmless. The http://localhost:3001 entry is used by the E2E stack
      # (docker-compose.e2e.yml) where the backend is published on the host.
      redirect_uris:
        - matching_mode: strict
          url: "http://fuzefront.dev.local/api/auth/oidc/callback"
        - matching_mode: strict
          url: "https://fuzefront.dev.local/api/auth/oidc/callback"
        - matching_mode: strict
          url: "https://app.fuzefront.com/api/auth/oidc/callback"
        - matching_mode: strict
          url: "http://localhost:3001/api/auth/oidc/callback"
      # Standard OIDC scopes (openid, email, profile)
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, "goauthentik.io/providers/oauth2/scope-profile"]]
      # Use email as the `sub` claim — consistent with the seeder behaviour
      sub_mode: user_email
      include_claims_in_id_token: true
      # Reference the flow defined above. !Find resolves within the same
      # blueprint run — the flow entry is applied before this provider entry.
      authorization_flow: !Find [authentik_flows.flow, [slug, fuzefront-authorization-implicit-consent]]

  # ── Application ───────────────────────────────────────────────────────────────
  - model: authentik_core.application
    state: present
    identifiers:
      slug: fuzefront
    attrs:
      name: FuzeFront
      slug: fuzefront
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, FuzeFront]]
      meta_launch_url: "https://fuzefront.dev.local/"
      meta_description: "FuzeFront runtime microfrontend platform"
      # all + 0 policy bindings = vacuous truth → all authenticated users are
      # granted access. No policy binding entries needed.
      policy_engine_mode: all
      open_in_new_tab: false
