# Authentik Blueprint — FuzeFront self-service enrollment flow
#
# Stages (in order):
#   1. fuzefront-enroll-prompt  — email, username, password, password_repeat
#   2. fuzefront-enroll-write   — create the user account (active immediately)
#   3. fuzefront-enroll-login   — automatically log the new user in
#
# Password policy (12+ chars, upper/lower/digit/symbol) is applied as a
# validation_policy on the prompt stage.
#
# NOTE: Captcha and email-verification stages are intentionally omitted until
# prod SMTP is configured (authentik.smtp.* in values-prod.yaml). Without
# SMTP, the email-verify stage stalls the flow. Re-add once SMTP is live.
version: 1
metadata:
  name: FuzeFront Enrollment Flow
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  # ── Password policy ─────────────────────────────────────────────────────────
  - model: authentik_policies_password.passwordpolicy
    state: present
    identifiers:
      name: fuzefront-password-policy
    attrs:
      name: fuzefront-password-policy
      length_min: 12
      amount_uppercase: 1
      amount_lowercase: 1
      amount_digits: 1
      amount_symbols: 1
      password_field: password
      error_message: "Password must be at least 12 characters with uppercase, lowercase, digit and symbol."

  # ── Prompt fields ─────────────────────────────────────────────────────────
  - model: authentik_stages_prompt.prompt
    state: present
    identifiers:
      name: ff-enroll-email
    attrs:
      name: ff-enroll-email
      field_key: email
      label: "Email"
      type: email
      required: true
      placeholder: "you@example.com"
      order: 10

  - model: authentik_stages_prompt.prompt
    state: present
    identifiers:
      name: ff-enroll-username
    attrs:
      name: ff-enroll-username
      field_key: username
      label: "Username"
      type: username
      required: true
      placeholder: "your-username"
      order: 20

  - model: authentik_stages_prompt.prompt
    state: present
    identifiers:
      name: ff-enroll-password
    attrs:
      name: ff-enroll-password
      field_key: password
      label: "Password"
      type: password
      required: true
      placeholder: "Password (12+ chars)"
      order: 30

  - model: authentik_stages_prompt.prompt
    state: present
    identifiers:
      name: ff-enroll-password-repeat
    attrs:
      name: ff-enroll-password-repeat
      field_key: password_repeat
      label: "Confirm Password"
      type: password
      required: true
      placeholder: "Repeat password"
      order: 40

  # Consent / ToS acceptance field
  - model: authentik_stages_prompt.prompt
    state: present
    identifiers:
      name: ff-enroll-tos
    attrs:
      name: ff-enroll-tos
      field_key: tos_accepted
      label: "I agree to the Terms of Service"
      type: checkbox
      required: true
      order: 50

  # ── Prompt stage (bundles fields + policy) ──────────────────────────────────
  - model: authentik_stages_prompt.promptstage
    state: present
    identifiers:
      name: fuzefront-enroll-prompt
    attrs:
      name: fuzefront-enroll-prompt
      fields:
        - !Find [authentik_stages_prompt.prompt, [name, ff-enroll-email]]
        - !Find [authentik_stages_prompt.prompt, [name, ff-enroll-username]]
        - !Find [authentik_stages_prompt.prompt, [name, ff-enroll-password]]
        - !Find [authentik_stages_prompt.prompt, [name, ff-enroll-password-repeat]]
        - !Find [authentik_stages_prompt.prompt, [name, ff-enroll-tos]]
      validation_policies:
        - !Find [authentik_policies_password.passwordpolicy, [name, fuzefront-password-policy]]

  # ── Email verification stage ─────────────────────────────────────────────────
  - model: authentik_stages_email.emailstage
    state: present
    identifiers:
      name: fuzefront-enroll-email-verify
    attrs:
      name: fuzefront-enroll-email-verify
      use_global_settings: true
      activate_user_on_success: true
      from_address: "noreply@fuzefront.dev"
      subject: "Verify your FuzeFront account"
      template: email/account_confirmation.html
      token_expiry: 30  # minutes

  # ── User-write stage ─────────────────────────────────────────────────────────
  - model: authentik_stages_user_write.userwritestage
    state: present
    identifiers:
      name: fuzefront-enroll-write
    attrs:
      name: fuzefront-enroll-write
      create_users_as_inactive: false
      user_type: internal

  # ── User-login stage ─────────────────────────────────────────────────────────
  - model: authentik_stages_user_login.userloginstage
    state: present
    identifiers:
      name: fuzefront-enroll-login
    attrs:
      name: fuzefront-enroll-login
      session_duration: "seconds=0"  # browser-session (expires on close)

  # ── Enrollment flow ───────────────────────────────────────────────────────────
  - model: authentik_flows.flow
    state: present
    identifiers:
      slug: fuzefront-enrollment
    attrs:
      name: "FuzeFront Sign-up"
      slug: fuzefront-enrollment
      title: "Create your FuzeFront account"
      designation: enrollment
      authentication: none
      layout: stacked

  # ── Flow-stage bindings (order = execution order) ─────────────────────────────
  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, fuzefront-enrollment]]
      stage: !Find [authentik_stages_prompt.promptstage, [name, fuzefront-enroll-prompt]]
    attrs:
      order: 10
      evaluate_on_plan: true
      re_evaluate_policies: false

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, fuzefront-enrollment]]
      stage: !Find [authentik_stages_user_write.userwritestage, [name, fuzefront-enroll-write]]
    attrs:
      order: 20
      evaluate_on_plan: true
      re_evaluate_policies: false

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, fuzefront-enrollment]]
      stage: !Find [authentik_stages_user_login.userloginstage, [name, fuzefront-enroll-login]]
    attrs:
      order: 30
      evaluate_on_plan: true
      re_evaluate_policies: false

  # ══════════════════════════════════════════════════════════════════════════════
  # SOCIAL (Google) ENROLLMENT — separate, non-interactive flow
  # ══════════════════════════════════════════════════════════════════════════════
  # A user signing in with Google for the first time must NEVER see an
  # Authentik-branded page (provider-agnostic boundary: the browser only ever
  # sees app.fuzefront.com + accounts.google.com). Authentik's stock
  # `default-source-enrollment` renders a "select a username" prompt, which both
  # leaks the IdP and blocked account creation.
  #
  # This flow therefore has NO prompt stage — it writes the user and logs them
  # in. Google supplies email/name but NOT username, so user-write would fail
  # with "Aborting write to empty username"; the expression policy below derives
  # username from email into prompt_data BEFORE the user-write stage runs.
  #
  # The write/login stages are the SAME objects used by `fuzefront-enrollment`
  # (the interactive password sign-up flow) — reused, not duplicated. That flow
  # is separate and keeps its prompt stage; do not merge the two.

  # ── Derive username from email (Google gives no username) ────────────────────
  - model: authentik_policies_expression.expressionpolicy
    state: present
    identifiers:
      name: fuzefront-source-username-from-email
    attrs:
      name: fuzefront-source-username-from-email
      execution_logging: false
      expression: |
        prompt_data = request.context.setdefault('prompt_data', {})
        if not prompt_data.get('username'):
            email = prompt_data.get('email') or ''
            prompt_data['username'] = email
        return bool(prompt_data.get('username'))

  # ── Social enrollment flow ────────────────────────────────────────────────────
  - model: authentik_flows.flow
    state: present
    identifiers:
      slug: fuzefront-source-enrollment
    attrs:
      name: "FuzeFront Social Enrollment"
      slug: fuzefront-source-enrollment
      title: "Signing you in…"
      designation: enrollment
      authentication: none
      layout: stacked

  # ── Flow-stage bindings (no prompt stage — this flow is non-interactive) ──────
  # `id:` is required so the PolicyBinding below can target this stage-binding
  # via !KeyOf. For a PolicyBindingModel target, !KeyOf resolves to the entry's
  # pbm_uuid (not its pk), which is exactly what PolicyBinding.target expects.
  - id: ff-source-enroll-write-binding
    model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, fuzefront-source-enrollment]]
      stage: !Find [authentik_stages_user_write.userwritestage, [name, fuzefront-enroll-write]]
    attrs:
      order: 10
      evaluate_on_plan: true
      re_evaluate_policies: false

  - model: authentik_flows.flowstagebinding
    state: present
    identifiers:
      target: !Find [authentik_flows.flow, [slug, fuzefront-source-enrollment]]
      stage: !Find [authentik_stages_user_login.userloginstage, [name, fuzefront-enroll-login]]
    attrs:
      order: 20
      evaluate_on_plan: true
      re_evaluate_policies: false

  # ── Bind the username-derivation policy to the user-write stage binding ───────
  - model: authentik_policies.policybinding
    state: present
    identifiers:
      target: !KeyOf ff-source-enroll-write-binding
      policy: !Find [authentik_policies_expression.expressionpolicy, [name, fuzefront-source-username-from-email]]
    attrs:
      order: 0
      enabled: true
      negate: false
      timeout: 30
      failure_result: false
