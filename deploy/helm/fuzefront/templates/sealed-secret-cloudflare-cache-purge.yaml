# SEALING REQUIRED before deploying to prod:
#   kubectl create secret generic cloudflare-cache-purge \
#     --namespace fuzefront \
#     --from-literal=CF_CACHE_PURGE_TOKEN=<token> \
#     --dry-run=client -o yaml | \
#     kubeseal --controller-namespace kube-system --format yaml \
#     > deploy/helm/fuzefront/templates/sealed-secret-cloudflare-cache-purge.yaml
#
# The token (cache_purge scope only) is stored in 1Password under
# "Cloudflare Cache Purge Token (FuzeFront prod)".
{{- if .Values.cloudflare.cachePurge.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-cache-purge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    CF_CACHE_PURGE_TOKEN: {{ .Values.cloudflare.cachePurge.sealedToken | required "cloudflare.cachePurge.sealedToken is required when cloudflare.cachePurge.enabled=true" | quote }}
  template:
    metadata:
      name: cloudflare-cache-purge
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
