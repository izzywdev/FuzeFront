{{- /*
Cloudflare cache-purge API token, kubesealed for this cluster. The ciphertext
lives in values (cloudflare.cachePurge.sealedToken) so each overlay can carry
its own sealed blob; render only when the feature is enabled AND a blob is set.
Reseal with:
  kubectl create secret generic cloudflare-cache-purge -n fuzefront \
    --from-literal=CF_CACHE_PURGE_TOKEN=<token> --dry-run=client -o yaml \
    | kubeseal --controller-namespace kube-system --format yaml
*/ -}}
{{- if and .Values.cloudflare.cachePurge.enabled .Values.cloudflare.cachePurge.sealedToken }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-cache-purge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    CF_CACHE_PURGE_TOKEN: {{ .Values.cloudflare.cachePurge.sealedToken }}
  template:
    metadata:
      name: cloudflare-cache-purge
      namespace: {{ .Release.Namespace }}
    type: Opaque
{{- end }}
