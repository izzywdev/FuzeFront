{{- if .Values.applicationsService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzefront-applications
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: applications-service
spec:
  replicas: {{ .Values.applicationsService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzefront
      app.kubernetes.io/component: applications-service
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzefront
        app.kubernetes.io/component: applications-service
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: applications
          image: "{{ .Values.applicationsService.image.repository }}:{{ .Values.applicationsService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.applicationsService.port }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: USE_POSTGRES
              value: "true"
            - name: PORT
              value: {{ .Values.applicationsService.port | quote }}
            - name: DB_HOST
              value: {{ .Values.fuzeinfra.postgres.host | quote }}
            - name: DB_PORT
              value: {{ .Values.fuzeinfra.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: JWT_SECRET
            - name: FRONTEND_URL
              value: "{{ ternary "https" "http" .Values.ingress.tls.enabled }}://{{ .Values.ingress.host }}"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            {{- toYaml .Values.applicationsService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  # Name is significant: the ingress / frontend nginx route /api/apps and
  # /socket.io to http://fuzefront-applications:3003.
  name: fuzefront-applications
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: applications-service
spec:
  selector:
    app.kubernetes.io/part-of: fuzefront
    app.kubernetes.io/component: applications-service
  ports:
    - name: http
      port: {{ .Values.applicationsService.port }}
      targetPort: http
{{- end }}
