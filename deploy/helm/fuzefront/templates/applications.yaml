{{- if .Values.applicationsService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzefront-applications
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: applications-service
spec:
  replicas: {{ .Values.applicationsService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzefront
      app.kubernetes.io/component: applications-service
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzefront
        app.kubernetes.io/component: applications-service
      annotations:
        {{- include "fuzefront.metricsAnnotations" (dict "port" .Values.applicationsService.port "root" .) | nindent 8 }}
    spec:
      {{- include "fuzefront.scheduling" (dict "svc" .Values.applicationsService "root" .) | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: applications
          image: "{{ .Values.applicationsService.image.repository }}:{{ .Values.applicationsService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.applicationsService.port }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: USE_POSTGRES
              value: "true"
            - name: PORT
              value: {{ .Values.applicationsService.port | quote }}
            - name: DB_HOST
              value: {{ .Values.fuzeinfra.postgres.host | quote }}
            - name: DB_PORT
              value: {{ .Values.fuzeinfra.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: JWT_SECRET
            - name: FRONTEND_URL
              value: "{{ ternary "https" "http" .Values.ingress.tls.enabled }}://{{ .Values.ingress.host }}"
            # --- app-registry (new /api/v1/app-registry surface) env -----------
            # Kafka brokers for the app.* registry events. Fail-soft in code: an
            # empty value disables emission and the service still runs.
            - name: KAFKA_BROKERS
              value: {{ .Values.applicationsService.kafka.brokers | quote }}
            # Permit.io authorization for the registry write paths. PERMIT_API_KEY
            # is the shared key from fuzefront-secrets (created/sealed for the
            # whole chart); PERMIT_PDP_URL points at the in-cluster PDP.
            - name: PERMIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: PERMIT_API_KEY
            - name: PERMIT_PDP_URL
              value: {{ .Values.applicationsService.permitPdpUrl | quote }}
            # @fuzefront/feature-flags (OpenFeature + Unleash) client for the
            # app-registry release / kill-switch flags. FLAG_ENV picks the Unleash
            # environment; absence of the client/token → safe in-code defaults.
            - name: FLAG_ENV
              value: {{ ternary "prod" "local" (eq .Values.ingress.className "traefik") | quote }}
            {{- if .Values.applicationsService.featureFlags.unleashUrl }}
            - name: UNLEASH_URL
              value: {{ .Values.applicationsService.featureFlags.unleashUrl | quote }}
            - name: UNLEASH_APP_NAME
              value: {{ .Values.applicationsService.featureFlags.appName | quote }}
            # Scoped Unleash client token (sealed). The chart Secret / SealedSecret
            # carries it under this key; rendered only when a URL is configured so
            # local/dev with no flag platform stays inert (safe defaults).
            - name: UNLEASH_CLIENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: {{ .Values.applicationsService.featureFlags.tokenSecretKey | quote }}
                  optional: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            {{- toYaml .Values.applicationsService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  # Name is significant: the ingress / frontend nginx route /api/apps and
  # /socket.io to http://fuzefront-applications:3003.
  name: fuzefront-applications
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: applications-service
spec:
  selector:
    app.kubernetes.io/part-of: fuzefront
    app.kubernetes.io/component: applications-service
  ports:
    - name: http
      port: {{ .Values.applicationsService.port }}
      targetPort: http
{{- end }}
