{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fuzefront.secretName" . }}
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
  SESSION_SECRET: {{ .Values.secret.sessionSecret | quote }}
  DB_PASSWORD: {{ .Values.secret.dbPassword | quote }}
  {{- if and .Values.database.bootstrap.enabled (not .Values.database.bootstrap.superuser.secretName) }}
  # Consumed only by the db-bootstrap Job (default: read the superuser password
  # from this chart Secret). Omitted when bootstrap points at an external Secret.
  DB_SUPERUSER_PASSWORD: {{ .Values.secret.dbSuperuserPassword | quote }}
  {{- end }}
  PERMIT_API_KEY: {{ .Values.secret.permitApiKey | quote }}
  AUTHENTIK_SECRET_KEY: {{ .Values.secret.authentikSecretKey | quote }}
  AUTHENTIK_BOOTSTRAP_PASSWORD: {{ .Values.secret.authentikBootstrapPassword | quote }}
  AUTHENTIK_BOOTSTRAP_TOKEN: {{ .Values.secret.authentikBootstrapToken | quote }}
  {{- if .Values.secret.authentikClientId }}
  AUTHENTIK_CLIENT_ID: {{ .Values.secret.authentikClientId | quote }}
  {{- end }}
  {{- if .Values.secret.authentikClientSecret }}
  AUTHENTIK_CLIENT_SECRET: {{ .Values.secret.authentikClientSecret | quote }}
  {{- end }}
  {{- if .Values.secret.sendgridApiKey }}
  SENDGRID_API_KEY: {{ .Values.secret.sendgridApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.twilioAccountSid }}
  TWILIO_ACCOUNT_SID: {{ .Values.secret.twilioAccountSid | quote }}
  {{- end }}
  {{- if .Values.secret.twilioAuthToken }}
  TWILIO_AUTH_TOKEN: {{ .Values.secret.twilioAuthToken | quote }}
  {{- end }}
  {{- if .Values.secret.twilioVerifyServiceSid }}
  TWILIO_VERIFY_SERVICE_SID: {{ .Values.secret.twilioVerifyServiceSid | quote }}
  {{- end }}
  {{- if .Values.secret.smsAuthSecret }}
  SMS_AUTH_SECRET: {{ .Values.secret.smsAuthSecret | quote }}
  {{- end }}
  {{- if .Values.secret.googleClientId }}
  GOOGLE_CLIENT_ID: {{ .Values.secret.googleClientId | quote }}
  {{- end }}
  {{- if .Values.secret.googleClientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secret.googleClientSecret | quote }}
  {{- end }}
  {{- if .Values.secret.smtpPassword }}
  SMTP_PASSWORD: {{ .Values.secret.smtpPassword | quote }}
  {{- end }}
{{- end }}
