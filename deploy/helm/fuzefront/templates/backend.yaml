apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzefront-backend
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzefront
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzefront
        app.kubernetes.io/component: backend
      annotations:
        {{- include "fuzefront.metricsAnnotations" (dict "port" .Values.backend.port "root" .) | nindent 8 }}
    spec:
      {{- include "fuzefront.scheduling" (dict "svc" .Values.backend "root" .) | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.authentik.oidc.enabled .Values.authentik.oidc.backendHostAliasIP }}
      # Dev split-DNS: let the backend resolve the external Authentik host (used
      # as the OIDC issuer by both browser and backend) to the ingress IP.
      hostAliases:
        - ip: {{ .Values.authentik.oidc.backendHostAliasIP | quote }}
          hostnames:
            - {{ .Values.authentik.host | quote }}
      {{- end }}
      {{- if and .Values.authentik.oidc.enabled .Values.authentik.oidc.caConfigMap }}
      volumes:
        - name: fuzefront-ca
          configMap:
            name: {{ .Values.authentik.oidc.caConfigMap | quote }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
          env:
            - name: NODE_ENV
              value: "production"            # required: built image ships compiled .js migrations
            - name: USE_POSTGRES
              value: "true"
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: DB_HOST
              value: {{ .Values.fuzeinfra.postgres.host | quote }}
            - name: DB_PORT
              value: {{ .Values.fuzeinfra.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: JWT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: SESSION_SECRET
            - name: FRONTEND_URL
              value: "{{ ternary "https" "http" .Values.ingress.tls.enabled }}://{{ .Values.ingress.host }}"
            # Permit.io deferred in the minimal cut; placeholder lets the backend
            # boot (SDK uses throwOnError:false). PDP is intentionally absent.
            - name: PERMIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: PERMIT_API_KEY
            - name: PERMIT_PDP_URL
              {{- if .Values.permit.enabled }}
              value: "http://fuzefront-permit-pdp:7000"
              {{- else }}
              value: "http://localhost:7766"
              {{- end }}
            - name: PERMIT_DEBUG
              value: "false"
            # Kafka brokers for publishing identity/email events (Plan B/C).
            # Empty => publisher is a logging no-op; provisioning still self-heals.
            - name: KAFKA_BROKERS
              value: {{ .Values.emailService.kafka.brokers | default "" | quote }}
            # Shared secret guarding POST /internal/provision (Plan D calls this).
            - name: INTERNAL_PROVISION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: INTERNAL_PROVISION_SECRET
                  optional: true
            {{- if .Values.billingService.enabled }}
            # Billing proxy: the host backend forwards /api/v1/billing/* to the
            # cluster-internal billing-service, presenting BILLING_INTERNAL_TOKEN
            # as the upstream bearer. Sourced from the SAME per-service
            # `billing-secrets` the billing-service reads, so they match by
            # construction. optional:true so the backend still boots if the
            # secret hasn't synced yet (the proxy then returns a clean 5xx).
            - name: BILLING_SERVICE_URL
              value: "http://fuzefront-billing-service:{{ .Values.billingService.port | default 3006 }}"
            - name: BILLING_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billingService.secretName | default "billing-secrets" }}
                  key: BILLING_INTERNAL_TOKEN
                  optional: true
            {{- end }}
            {{- if .Values.authentik.oidc.enabled }}
            # Authentik OIDC (SSO). client_id/secret come from the Secret (set
            # deterministically by blueprints); issuer/redirect from values.
            - name: AUTHENTIK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: AUTHENTIK_CLIENT_ID
            - name: AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: AUTHENTIK_CLIENT_SECRET
            - name: AUTHENTIK_ISSUER_URL
              value: {{ .Values.authentik.oidc.issuerUrl | quote }}
            - name: AUTHENTIK_REDIRECT_URI
              value: {{ .Values.authentik.oidc.redirectUri | quote }}
            # M2M provisioning (backend/src/authentik/provision-m2m-clients.ts)
            # authenticates to the Authentik Admin API with the akadmin bootstrap
            # token — which Authentik issues as a full API token — so we reuse the
            # already-sealed AUTHENTIK_BOOTSTRAP_TOKEN key rather than minting a
            # second admin token. optional:true keeps provisioning gracefully
            # skipped (provisionM2MClients returns early) if the key is absent.
            - name: AUTHENTIK_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: AUTHENTIK_BOOTSTRAP_TOKEN
                  optional: true
            {{- if .Values.authentik.oidc.caConfigMap }}
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/fuzefront-ca/ca.crt
            {{- end }}
            {{- end }}
            {{- if .Values.cloudflare.cachePurge.enabled }}
            # Cloudflare cache purge — lets the platform purge the CF edge cache
            # after MFE deploys. Token comes from the cloudflare-cache-purge
            # SealedSecret; optional:true keeps the pod schedulable while the
            # secret is still being sealed/synced.
            - name: CF_CACHE_PURGE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-cache-purge
                  key: CF_CACHE_PURGE_TOKEN
                  optional: true
            - name: CF_ZONE_ID
              value: {{ .Values.cloudflare.cachePurge.zoneId | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          {{- if and .Values.authentik.oidc.enabled .Values.authentik.oidc.caConfigMap }}
          volumeMounts:
            - name: fuzefront-ca
              mountPath: /etc/fuzefront-ca
              readOnly: true
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  # Name is significant: the frontend nginx proxies to http://fuzefront-backend:3001.
  name: fuzefront-backend
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    app.kubernetes.io/part-of: fuzefront
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http
