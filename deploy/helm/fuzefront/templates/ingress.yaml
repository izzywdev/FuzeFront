{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fuzefront
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" .Values.ingress.host) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if .Values.securityService.enabled }}
          # Security-service direct paths (ingress-nginx longest-prefix-match
          # makes these win over the /api catch-all below). /internal is NOT
          # exposed — it stays cluster-internal (pod-to-pod via Service DNS).
          # /api/v1/security is the provider-neutral Security API (AuthN/AuthZ);
          # /api/auth + /api/organizations are the deprecated shims kept for one
          # release.
          - path: /api/v1/security
            pathType: Prefix
            backend:
              service:
                name: fuzefront-security
                port:
                  number: {{ .Values.securityService.port }}
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: fuzefront-security
                port:
                  number: {{ .Values.securityService.port }}
          - path: /api/organizations
            pathType: Prefix
            backend:
              service:
                name: fuzefront-security
                port:
                  number: {{ .Values.securityService.port }}
          {{- end }}
          {{- if .Values.applicationsService.enabled }}
          # Applications-service direct paths (+ Socket.IO).
          - path: /api/apps
            pathType: Prefix
            backend:
              service:
                name: fuzefront-applications
                port:
                  number: {{ .Values.applicationsService.port }}
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: fuzefront-applications
                port:
                  number: {{ .Values.applicationsService.port }}
          {{- end }}
          {{- if .Values.billingService.enabled }}
          # Billing webhook carve-out: the Stripe webhook is the ONLY publicly
          # reachable billing path (Stripe-signature verified via STRIPE_WEBHOOK_SECRET).
          # Exact match so the rest of /api/v1/billing/* stays internal (no ingress) —
          # internal callers reach it in-cluster with BILLING_INTERNAL_TOKEN.
          - path: /api/v1/billing/webhooks/stripe
            pathType: Exact
            backend:
              service:
                name: fuzefront-billing-service
                port:
                  number: {{ .Values.billingService.port }}
          {{- end }}
          {{- if or .Values.securityService.enabled .Values.applicationsService.enabled }}
          # Thin backend: health + any remaining /api/* (still dual-serving the
          # domain routes during the soak; this is the catch-all under the
          # service-specific prefixes above).
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fuzefront-backend
                port:
                  number: {{ .Values.backend.port }}
          {{- end }}
          # Frontend catch-all. The frontend nginx also fans /api and /socket.io
          # to the per-service backends for in-pod / port-forward scenarios.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fuzefront-frontend
                port:
                  number: {{ .Values.frontend.port }}
{{- if .Values.clockApp.enabled }}
---
# Clock-app remote, same-origin under the app host at /apps/clock/. A SEPARATE
# Ingress (not a path on the main one) so its prefix-strip rewrite is scoped to
# clock-app only and does not touch the host shell / API routes. The browser
# fetches https://<host>/apps/clock/remoteEntry.js → stripped to /remoteEntry.js
# at the clock nginx (matches the seeded built-in manifest remoteEntry).
#   - nginx-ingress: rewrite-target + a capture-group path.
#   - traefik:       the clock-app-stripprefix Middleware (templates/clock-app.yaml).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fuzefront-clock-app
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: clock-app
  annotations:
    {{- if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- else if eq .Values.ingress.className "traefik" }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-clock-app-stripprefix@kubernetescrd
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" .Values.ingress.host) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if eq .Values.ingress.className "nginx" }}
          # Capture group 2 ($2) is everything after /apps/clock, fed to
          # rewrite-target so /apps/clock/remoteEntry.js → /remoteEntry.js.
          - path: /apps/clock(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: clock-app
                port:
                  number: {{ .Values.clockApp.port }}
          {{- else }}
          # traefik strips /apps/clock via the Middleware; route the prefix.
          - path: /apps/clock
            pathType: Prefix
            backend:
              service:
                name: clock-app
                port:
                  number: {{ .Values.clockApp.port }}
          {{- end }}
{{- end }}
{{- if .Values.authentik.enabled }}
---
# IdP reverse-proxy — the provider-agnostic security boundary.
#
# The browser must transit a small set of Authentik OAuth endpoints (authorize /
# social-source redirect). We expose them ONLY under the FuzeFront-owned host at
# app.fuzefront.com/api/auth/idp/* → authentik-server (ClusterIP, no public
# Ingress of its own). The IdP host `auth.fuzefront.com` is invisible to the
# browser and named in no consumer contract.
#
# A SEPARATE Ingress (not a path on the main one) so the prefix-strip +
# forwarded-proto middlewares are scoped to the IdP proxy only and never touch
# the host shell / API / security-service routes.
#   - traefik: authentik-idp-stripprefix (strips /api/auth/idp, sets
#     X-Forwarded-Prefix) + authentik-forwarded-proto (pins https), so the OIDC
#     discovery/issuer resolve to https://app.fuzefront.com/api/auth/idp/...
#   - nginx (local): rewrite-target strips the prefix; the issuer path stays
#     app-hosted. Authentik would otherwise 404 the app-prefixed paths.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fuzefront-authentik-idp
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: authentik-idp
  annotations:
    {{- if eq .Values.ingress.className "traefik" }}
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-authentik-forwarded-proto@kubernetescrd
    {{- else if eq .Values.ingress.className "nginx" }}
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" .Values.ingress.host) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Route Authentik's OWN native root paths under the app host (NO prefix,
          # NO strip). Authentik ignores X-Forwarded-Prefix, so it builds absolute
          # OIDC discovery/authorize URLs at these root paths using the forwarded
          # Host (app.fuzefront.com) — which must therefore be routable here.
          # These prefixes don't overlap the app's /api, /apps, /socket.io, / routes.
          {{- range $p := list "/application" "/if" "/source" "/flows" "/ws" "/-" "/outpost.goauthentik.io" "/static/dist" "/static/authentik" }}
          - path: {{ $p }}
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 9000
          {{- end }}
{{- end }}
{{- end }}
