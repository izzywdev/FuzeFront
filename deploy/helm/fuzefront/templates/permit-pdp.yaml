{{- if .Values.permit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzefront-permit-pdp
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: permit-pdp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzefront
      app.kubernetes.io/component: permit-pdp
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzefront
        app.kubernetes.io/component: permit-pdp
    spec:
      {{- include "fuzefront.scheduling" (dict "svc" .Values.permit.pdp "root" .) | nindent 6 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: permit-pdp
          image: "{{ .Values.permit.pdp.image.repository }}:{{ .Values.permit.pdp.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 7000
          env:
            - name: PDP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: PERMIT_API_KEY
            - name: PDP_DEBUG
              value: "false"
            # The PDP container runs OPAL + an embedded OPA started inline. OPA's
            # HTTP server takes ~6s to bind :8181, but OPAL pushes the initial
            # policy+data bundle at ~3s and, with the default connection-retry
            # (~5 attempts / ~3s), gives up with a ClientConnectorError
            # ("Cannot connect to host localhost:8181"). It then only polls for
            # DELTAS (none on a quiet env), so OPA is left EMPTY — no policy, no
            # facts — and EVERY permit.check() returns a clean false (legitimate
            # org admins got 403 ORG_PERMISSION_DENIED at billing /checkout).
            # Widen the policy-store connection retry so the initial bundle push
            # survives OPA's startup. Covers both set_policies and set_policy_data.
            - name: OPAL_POLICY_STORE_CONN_RETRY
              value: '{"attempts":15,"wait_time":2}'
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            {{- toYaml .Values.permit.pdp.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzefront-permit-pdp
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: permit-pdp
spec:
  selector:
    app.kubernetes.io/part-of: fuzefront
    app.kubernetes.io/component: permit-pdp
  ports:
    - name: http
      port: 7000
      targetPort: http
{{- end }}
