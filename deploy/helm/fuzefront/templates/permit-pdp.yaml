{{- if .Values.permit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzefront-permit-pdp
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: permit-pdp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzefront
      app.kubernetes.io/component: permit-pdp
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzefront
        app.kubernetes.io/component: permit-pdp
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: permit-pdp
          image: "{{ .Values.permit.pdp.image.repository }}:{{ .Values.permit.pdp.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 7000
          env:
            - name: PDP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: PERMIT_API_KEY
            - name: PDP_DEBUG
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            {{- toYaml .Values.permit.pdp.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzefront-permit-pdp
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: permit-pdp
spec:
  selector:
    app.kubernetes.io/part-of: fuzefront
    app.kubernetes.io/component: permit-pdp
  ports:
    - name: http
      port: 7000
      targetPort: http
{{- end }}
