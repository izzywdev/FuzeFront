{{- if .Values.securityService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzefront-security
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: security-service
spec:
  replicas: {{ .Values.securityService.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/part-of: fuzefront
      app.kubernetes.io/component: security-service
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: fuzefront
        app.kubernetes.io/component: security-service
      annotations:
        {{- include "fuzefront.metricsAnnotations" (dict "port" .Values.securityService.port "root" .) | nindent 8 }}
    spec:
      {{- include "fuzefront.scheduling" (dict "svc" .Values.securityService "root" .) | nindent 6 }}
      # Bound DNS stalls (same rationale as authentik-server): single CoreDNS
      # replica over the overlay intermittently stalls lookups in 5s/10s retry
      # multiples; this service resolves authentik-server on every auth flow.
      # timeout:1/attempts:2 caps a DNS hiccup at ~2s instead of 5-10s.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
          - name: timeout
            value: "1"
          - name: attempts
            value: "2"
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.authentik.oidc.enabled .Values.authentik.oidc.backendHostAliasIP }}
      hostAliases:
        - ip: {{ .Values.authentik.oidc.backendHostAliasIP | quote }}
          hostnames:
            - {{ .Values.authentik.host | quote }}
      {{- end }}
      {{- if and .Values.authentik.oidc.enabled .Values.authentik.oidc.caConfigMap }}
      volumes:
        - name: fuzefront-ca
          configMap:
            name: {{ .Values.authentik.oidc.caConfigMap | quote }}
      {{- end }}
      containers:
        - name: security
          image: "{{ .Values.securityService.image.repository }}:{{ .Values.securityService.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.securityService.port }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: USE_POSTGRES
              value: "true"
            - name: PORT
              value: {{ .Values.securityService.port | quote }}
            - name: DB_HOST
              value: {{ .Values.fuzeinfra.postgres.host | quote }}
            - name: DB_PORT
              value: {{ .Values.fuzeinfra.postgres.port | quote }}
            - name: DB_NAME
              value: {{ .Values.database.name | quote }}
            - name: DB_USER
              value: {{ .Values.database.user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: JWT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: SESSION_SECRET
            - name: FRONTEND_URL
              value: "{{ ternary "https" "http" .Values.ingress.tls.enabled }}://{{ .Values.ingress.host }}"
            - name: PERMIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: PERMIT_API_KEY
            - name: PERMIT_PDP_URL
              {{- if .Values.permit.enabled }}
              value: "http://fuzefront-permit-pdp:7000"
              {{- else }}
              value: "http://localhost:7766"
              {{- end }}
            - name: PERMIT_DEBUG
              value: "false"
            - name: INTERNAL_PROVISION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: INTERNAL_PROVISION_SECRET
            - name: KAFKA_BROKERS
              value: {{ .Values.securityService.kafka.brokers | quote }}
            # In-cluster dispatch targets for the verification flows. These MUST
            # be set explicitly: the code's built-in fallbacks are
            # http://email-service:3000 / http://sms-service:3000, which match
            # NEITHER the real Service names (fuzefront-email-service /
            # fuzefront-sms-service) NOR the real ports (3003 / 3004) — so the
            # fallback silently never resolves. Rendered from the same values the
            # Services are built from, so a port change cannot drift them apart.
            {{- if .Values.emailService.enabled }}
            - name: EMAIL_SERVICE_URL
              value: "http://fuzefront-email-service:{{ .Values.emailService.port }}"
            {{- end }}
            {{- if .Values.smsService.enabled }}
            - name: SMS_SERVICE_URL
              value: "http://fuzefront-sms-service:{{ .Values.smsService.port }}"
            {{- end }}
            # Release/kill switch for signup email verification. The code reads
            # the STRING "true" and additionally requires EMAIL_SERVICE_URL to be
            # non-empty; if either is missing it DEGRADES to auto-verifying every
            # account. That degrade is silent, which is why this is pinned from
            # values per-env rather than left unset.
            - name: REQUIRE_EMAIL_VERIFICATION
              value: {{ .Values.securityService.requireEmailVerification | default false | quote }}
            {{- if .Values.authentik.oidc.enabled }}
            - name: AUTHENTIK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: AUTHENTIK_CLIENT_ID
            - name: AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: AUTHENTIK_CLIENT_SECRET
            - name: AUTHENTIK_ISSUER_URL
              value: {{ .Values.authentik.oidc.issuerUrl | quote }}
            - name: AUTHENTIK_REDIRECT_URI
              value: {{ .Values.authentik.oidc.redirectUri | quote }}
            # Server-side base for Authentik's flow-executor (password + enrollment
            # driver). Points at the IN-CLUSTER service so the multi-hop flow does
            # NOT hairpin out to the app host via Cloudflare (which took 17-34s and
            # blew the client timeout). The external issuer/redirect above stay for
            # the browser + the `iss` claim.
            - name: AUTHENTIK_BASE_URL
              value: {{ .Values.authentik.oidc.internalUrl | default "http://authentik-server:9000" | quote }}
            # Admin token for server-side Authentik REST (M2M client provisioning).
            # Reuses the akadmin bootstrap token (see authentik-m2m-provisioning).
            - name: AUTHENTIK_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: AUTHENTIK_BOOTSTRAP_TOKEN
            # Enrollment flow slug driven server-side by signup() (blueprint: flow-enrollment.yaml).
            - name: AUTHENTIK_ENROLLMENT_FLOW_SLUG
              value: {{ .Values.authentik.oidc.enrollmentFlowSlug | default "fuzefront-enrollment" | quote }}
            # Empty prefix: PR #256 routes Authentik's NATIVE paths under app.fuzefront.com
            # (no /api/auth/idp prefix). Pin it so the authorize URL stays a bare native path.
            - name: SECURITY_IDP_PROXY_PREFIX
              value: {{ .Values.authentik.oidc.idpProxyPrefix | default "" | quote }}
            {{- if .Values.authentik.oidc.caConfigMap }}
            - name: NODE_EXTRA_CA_CERTS
              value: /etc/fuzefront-ca/ca.crt
            {{- end }}
            {{- end }}
            # ---- Server-brokered Google sign-in (PR #329) ----
            # googleOidc.ts talks to Google directly using these creds; the
            # brokered flow 302s back to ${FRONTEND_URL}/dashboard on success
            # (FRONTEND_URL is set above). GOOGLE_CLIENT_ID/SECRET reuse the SAME
            # keys the Authentik pods consume from the fuzefront-secrets
            # SealedSecret; optional:true so the pod still starts when Google is
            # unconfigured in an env (then SECURITY_GOOGLE_BROKERED should be off).
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: GOOGLE_CLIENT_ID
                  optional: true
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: GOOGLE_CLIENT_SECRET
                  optional: true
            # External browser-facing callback URL registered in the Google
            # console. Prod = app host; dev overrides via securityService.googleRedirectUri.
            - name: GOOGLE_REDIRECT_URI
              value: {{ .Values.securityService.googleRedirectUri | default "https://app.fuzefront.com/api/v1/security/social/google/callback" | quote }}
            # KILL-SWITCH: "true" = server-brokered Google (googleOidc.ts) is the
            # source of truth; "false" = revert to the legacy Authentik Google
            # source flow with NO rebuild — the instant rollback is flipping
            # securityService.googleBrokered to "false" in values and re-syncing.
            - name: SECURITY_GOOGLE_BROKERED
              value: {{ .Values.securityService.googleBrokered | default "false" | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            {{- toYaml .Values.securityService.resources | nindent 12 }}
          {{- if and .Values.authentik.oidc.enabled .Values.authentik.oidc.caConfigMap }}
          volumeMounts:
            - name: fuzefront-ca
              mountPath: /etc/fuzefront-ca
              readOnly: true
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  # Name is significant: the ingress / frontend nginx route /api/auth,
  # /api/organizations, /api/internal to http://fuzefront-security:3002.
  name: fuzefront-security
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app.kubernetes.io/component: security-service
spec:
  selector:
    app.kubernetes.io/part-of: fuzefront
    app.kubernetes.io/component: security-service
  ports:
    - name: http
      port: {{ .Values.securityService.port }}
      targetPort: http
{{- end }}
