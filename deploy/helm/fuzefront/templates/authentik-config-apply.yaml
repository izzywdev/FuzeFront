{{- /*
  authentik-config-apply — in-cluster blueprint apply Job.

  WHY: the file-based blueprint runner (ConfigMap mounted at
  /blueprints/fuzefront) proved unreliable in prod — blueprints sat unapplied
  with no visible error, leaving the login page unthemed, without the Google
  source and without a sign-up link. This Job applies the same blueprints
  DETERMINISTICALLY through Authentik's admin API and fails loudly (visible in
  Argo as a degraded sync) when anything is rejected.

  Auth: AUTHENTIK_BOOTSTRAP_TOKEN from the existing Secret — the API token the
  worker's bootstrap creates for akadmin. Nothing leaves the cluster and no
  extra GitHub secret is needed.

  Runs as a Helm post-install/post-upgrade hook (Argo CD: PostSync), i.e. after
  every sync, once the Authentik server is Healthy. before-hook-creation
  delete-policy replaces the previous Job on each sync, so re-syncs re-apply
  idempotently (the script upserts by instance name).

  Apply order matters: login-surface is LAST — its !Find lookups resolve
  objects the earlier blueprints create.
*/}}
{{- if .Values.authentik.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-ops-script
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app: authentik
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  ops.py: |
    {{- .Files.Get "authentik/ops.py" | nindent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: authentik-config-apply
  labels:
    {{- include "fuzefront.labels" . | nindent 4 }}
    app: authentik
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  # Ready-wait (≤10min) + per-blueprint apply confirmation polls (≤90s × 5).
  activeDeadlineSeconds: 1500
  template:
    metadata:
      labels:
        {{- include "fuzefront.labels" . | nindent 8 }}
        app: authentik-config-apply
    spec:
      restartPolicy: OnFailure
      containers:
        - name: apply
          image: python:3.12-alpine
          command:
            - /bin/sh
            - -ec
            - |
              echo "waiting for authentik-server to be ready..."
              i=0
              until python3 -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('$AK_URL/-/health/ready/', timeout=5).status < 500 else 1)" 2>/dev/null; do
                i=$((i+1))
                if [ "$i" -ge 60 ]; then echo "authentik-server never became ready" >&2; exit 1; fi
                sleep 10
              done
              cd /tmp
              python3 /ops/ops.py
          env:
            - name: AK_URL
              value: "http://authentik-server:9000"
            - name: AK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "fuzefront.secretName" . }}
                  key: AUTHENTIK_BOOTSTRAP_TOKEN
            - name: PHASE
              value: "apply"
            - name: BLUEPRINTS
              value: "brand-fuseseam,flow-recovery,flow-enrollment,source-google,login-surface"
            - name: BLUEPRINT_DIR
              value: "/blueprints"
          volumeMounts:
            - name: ops-script
              mountPath: /ops
              readOnly: true
            - name: blueprints
              mountPath: /blueprints
              readOnly: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 250m, memory: 128Mi }
      volumes:
        - name: ops-script
          configMap:
            name: authentik-ops-script
        - name: blueprints
          configMap:
            name: authentik-blueprints
{{- end }}
