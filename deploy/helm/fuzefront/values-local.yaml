# =============================================================================
# Local (kind) overlay for FuzeFront.
#   helm upgrade --install fuzefront deploy/helm/fuzefront \
#     -n fuzefront --create-namespace -f deploy/helm/fuzefront/values-local.yaml
#
# The defaults in values.yaml already target the local kind setup. Override
# secrets here (in a gitignored copy) or via --set for anything real.
# =============================================================================
global:
  imagePullPolicy: IfNotPresent

# Backend 3-way split — dual-serving locally. security-service comes up in
# Phase 1 (auth/organizations/internal on :3002) alongside the old backend,
# which still serves the same routes. applications-service is enabled in Phase 2.
# The ingress/nginx are NOT switched until Phase 3, so the old backend keeps
# serving live traffic until then.
securityService:
  enabled: true

applicationsService:
  enabled: true

# Billing-service (Stripe). Enabled locally but runs in DEGRADED mode (/health
# only) until you supply Stripe TEST-mode keys + a webhook secret — e.g. a
# gitignored values-local.secret.yaml or:
#   --set secret.stripeSecretKey=sk_test_... #   --set secret.stripeWebhookSecret=whsec_... #   --set secret.billingInternalToken=<long-random>
# Local Stripe webhooks need the Stripe CLI:
#   stripe listen --forward-to http://fuzefront.dev.local/api/v1/billing/webhooks/stripe
billingService:
  enabled: true

ingress:
  enabled: true
  className: nginx
  host: fuzefront.dev.local
  # Local TLS via cert-manager + the self-signed local CA
  # (deploy/local-tls/cert-manager-local-ca.yaml). Trust the CA cert once and
  # https://fuzefront.dev.local is green in the browser.
  annotations:
    cert-manager.io/cluster-issuer: fuzefront-local-ca
  tls:
    enabled: true
    secretName: fuzefront-dev-local-tls

# Backend OIDC SSO against the in-cluster Authentik (#12).
#
# client_id/secret are now deterministic — declared in the blueprint at
# deploy/helm/fuzefront/authentik/blueprints/provider-oidc.yaml and set to
# matching dev defaults in values.yaml (secret.authentikClientId/Secret).
# No manual seeding or out-of-band patch step required.
#
# To use different creds in local dev, override secret.authentikClientId and
# secret.authentikClientSecret here (or in a gitignored values-local.secret.yaml)
# AND update the blueprint's attrs.client_id / attrs.client_secret to match
# BEFORE first deploy (Authentik sets client_id/secret at creation time only).
#
# WARNING: with oidc.enabled=true the backend mounts AUTHENTIK_CLIENT_ID/SECRET
# from the Secret via secretKeyRef. Creds in the Secret must match the blueprint.
authentik:
  oidc:
    enabled: true
    issuerUrl: "https://auth.fuzefront.dev.local/application/o/fuzefront/"
    redirectUri: "https://fuzefront.dev.local/api/auth/oidc/callback"
    # ingress-nginx ClusterIP — backend resolves the external Authentik host to
    # the ingress (split-DNS). Re-check if ingress-nginx is recreated:
    #   kubectl -n ingress-nginx get svc ingress-nginx-controller
    backendHostAliasIP: "10.96.14.165"
    # ConfigMap (in the fuzefront ns) holding ca.crt for the local CA so the
    # backend trusts the Authentik TLS cert (NODE_EXTRA_CA_CERTS).
    caConfigMap: "fuzefront-local-ca"
