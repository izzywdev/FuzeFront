# =============================================================================
# FuzeFront Helm chart — default values (minimal first cut: backend + frontend).
#
# Deploy into its own namespace, wired to FuzeInfra services in the `fuzeinfra`
# namespace via cross-namespace CoreDNS names:
#   helm upgrade --install fuzefront deploy/helm/fuzefront \
#     -n fuzefront --create-namespace -f deploy/helm/fuzefront/values-local.yaml
# =============================================================================

global:
  # Applied to every workload. IfNotPresent so kind uses images loaded via
  # `kind load docker-image` rather than trying to pull from a registry.
  imagePullPolicy: IfNotPresent
  # Default pod placement for ALL workloads (per-service blocks override these).
  # Empty = no-op (the scheduler decides). In prod, set per-service nodeSelector/
  # affinity to steer heavy stateless services (litellm/chat/billing) onto node-2
  # and keep app pods spread; see values-prod.yaml.
  scheduling:
    nodeSelector: {}
    affinity: {}
    tolerations: []

# Observability (Phase E). Disabled by default → metrics annotations and the
# backend /metrics scrape are a no-op locally. Enabled in values-prod.yaml so the
# FuzeInfra Prometheus auto-discovers FuzeFront pods via prometheus.io/* annots.
observability:
  metrics:
    enabled: false
    path: /metrics
  # Ship FuzeFront Grafana dashboards / Prometheus alert rules as labeled
  # ConfigMaps (consumed by FuzeInfra discovery hooks). Only rendered when
  # metrics.enabled is also true (no point shipping dashboards with no metrics).
  dashboards:
    enabled: true
  alerts:
    enabled: true

# Image pull secrets for private registries (e.g. private GHCR). Sealed in prod.
imagePullSecrets: []

# Connection to FuzeInfra shared services (CoreDNS names, cross-namespace).
fuzeinfra:
  namespace: fuzeinfra
  postgres:
    host: postgres.fuzeinfra.svc.cluster.local
    port: 5432
  redis:
    host: redis.fuzeinfra.svc.cluster.local
    port: 6379

# FuzeFront application database.
#
# Bootstrap/runtime split: a privileged Helm pre-install/pre-upgrade Job
# (templates/db-bootstrap-job.yaml) connects as the FuzeInfra Postgres
# SUPERUSER and idempotently creates the database + a least-privilege runtime
# role. The backend Deployment then connects as that runtime role
# (`database.user`), which has NO CREATEDB/CREATEROLE.
database:
  name: fuzefront_platform
  # Least-privilege runtime role created by the bootstrap Job. Its password is
  # DB_PASSWORD from the Secret below.
  user: fuzefront_user
  bootstrap:
    enabled: true
    superuser:
      # The FuzeInfra Postgres superuser (its container runs with
      # POSTGRES_USER=fuzeinfra, which makes `fuzeinfra` the cluster superuser).
      username: fuzeinfra
      # K8s Secrets are namespace-scoped; the `fuzeinfra` Secret lives in the
      # fuzeinfra namespace and cannot be referenced from here. Leave secretName
      # empty to read the superuser password from THIS chart's Secret (key
      # below), into which you supply it (e.g. --set secret.dbSuperuserPassword,
      # or a SealedSecret in prod). Or point secretName at any Secret in this
      # namespace that holds the superuser password.
      secretName: ""
      secretKey: DB_SUPERUSER_PASSWORD

# Secret handling. Either let the chart create a Secret from the values here
# (DEV ONLY — override!), or point at an existing Secret via `existingSecret`.
secret:
  existingSecret: ""        # e.g. "fuzefront-secrets" created out-of-band
  # Dev-only placeholders. OVERRIDE for anything real, e.g.:
  #   --set secret.jwtSecret=... --set secret.dbPassword=...
  # or a gitignored values file. NEVER commit real secrets here.
  jwtSecret: "dev-only-change-me"
  sessionSecret: "dev-only-change-me"
  # Password for the least-privilege runtime role (`database.user`). The
  # bootstrap Job sets the role's password to this and the backend connects with
  # it. DEV-ONLY default — override for anything real.
  dbPassword: "dev-fuzefront-user-change-me"
  # Password for the privileged bootstrap superuser (database.bootstrap.superuser
  # = `fuzeinfra` by default). Matches the FuzeInfra postgres default in dev;
  # OVERRIDE/seal in prod. Only consumed by the bootstrap Job, never the runtime.
  dbSuperuserPassword: "fuzeinfra_secure_password"
  # Permit.io is deferred in the minimal cut, but the backend requires this var
  # to be set at import time. The SDK is built with throwOnError:false, so with a
  # placeholder it boots and degrades gracefully (Permit-gated routes will deny).
  permitApiKey: "dev-no-permit"
  # Shared secret for the backend's internal provisioning endpoint
  # (POST /internal/provision), called by Plan D's provisioning-service.
  # DEV ONLY default — override with a long random value in real deployments.
  internalProvisionSecret: "dev-internal-provision-secret-change-me"
  # Authentik (DEV ONLY — override). Secret key must be long/random in real use.
  authentikSecretKey: "dev-authentik-secret-key-change-me-0123456789abcdef0123"
  authentikBootstrapPassword: "admin123"
  authentikBootstrapToken: "dev-bootstrap-token-change-me-0123456789"
  # OIDC client creds for the backend. Set deterministically by the blueprint
  # deploy/helm/fuzefront/authentik/blueprints/provider-oidc.yaml.
  # authentikClientSecret has NO default — must be supplied via --set or a
  # gitignored values file (or an existingSecret). The blueprint reads the
  # same value from the worker env var AUTHENTIK_OIDC_CLIENT_SECRET.
  authentikClientId: "fuzefront-oidc-client"
  authentikClientSecret: ""
  # OIDC client secret for the mendys-datasets consumer product (blueprint
  # provider-oidc-mendys-datasets.yaml, client_id mendys-datasets-oidc-client).
  # OPTIONAL: leave empty to apply the blueprint with a placeholder secret;
  # supply via --set / a gitignored values file / the prod SealedSecret.
  # NEVER commit a real secret.
  mendysDatasetsClientSecret: ""
  sendgridApiKey: ""
  # Twilio Verify credentials for SMS MFA. Leave empty to run in mock/inert mode.
  # Supply real values via --set or a gitignored values file. NEVER commit real creds.
  twilioAccountSid: ""
  twilioAuthToken: ""
  twilioVerifyServiceSid: ""
  smsAuthSecret: "dev-sms-secret-change-me"
  # Google OAuth2 source creds. Leave empty to disable the Google source
  # (inert — Authentik skips sources whose consumer_key resolves to "").
  # Override via --set or a gitignored values file. NEVER commit real creds.
  googleClientId: ""
  googleClientSecret: ""
  # SMTP password for Authentik's email backend (leave empty for MailHog / open relay).
  smtpPassword: ""
  # AI provider keys for the chat-service and LiteLLM gateway.
  # Leave empty to disable; supply via --set or a gitignored values file. NEVER commit real keys.
  anthropicApiKey: ""
  openaiApiKey: ""
  litellmMasterKey: ""
  # Scoped @fuzefront/feature-flags (Unleash) client token, consumed by services
  # that evaluate family flags (applications-service / app-registry). Leave empty
  # to run with safe in-code flag defaults (no flag platform wired). Supply via
  # --set or a gitignored values file locally; in prod it comes from the
  # fuzefront-secrets SealedSecret. NEVER commit a real token here.
  featureFlagsClientToken: ""

backend:
  image:
    repository: fuzefront/backend
    tag: local
  # Must stay 3001: the frontend nginx proxies /api and /socket.io to
  # http://fuzefront-backend:3001, and the backend Service is named accordingly.
  port: 3001
  replicas: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 512Mi }
  # Per-service placement overrides (empty → falls back to global.scheduling).
  nodeSelector: {}
  affinity: {}
  tolerations: []

# Backend 3-way split (dual-serving). Both default to disabled; the old backend
# still serves every route until the Phase 3 cutover flips routing. Enable in
# values-local (Phases 1-3) and values-prod (Phase 3) once the images are built.
securityService:
  enabled: false
  image:
    repository: fuzefront/security-service
    tag: local
  port: 3002
  replicas: 1
  # Enforce signup email verification. Default false: the code DEGRADES to
  # auto-verifying every account when this is off, so turning it on is only safe
  # once a working email path (email-service + a proven SMTP/SendGrid sender) is
  # verified — otherwise every new signup is locked out at the door.
  requireEmailVerification: false
  kafka:
    brokers: "fuzeinfra-kafka.fuzeinfra.svc.cluster.local:9092"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 512Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # security-service owns auth; keep it co-located with the DB-heavy node-1 by
  # default (no-op here, set in values-prod if desired).

applicationsService:
  enabled: false
  image:
    repository: fuzefront/applications-service
    tag: local
  port: 3003
  replicas: 1
  # Kafka brokers for the app.* registry events (events.ts fail-soft: empty →
  # events are skipped, the service still runs). Set in values-prod (FuzeInfra
  # Kafka, cross-namespace DNS).
  kafka:
    brokers: ""
  # Permit PDP for the app-registry authz checks (permit.ts). When permit.enabled
  # the in-cluster PDP runs at fuzefront-permit-pdp:7000; PERMIT_API_KEY comes
  # from the shared fuzefront-secrets SealedSecret.
  permitPdpUrl: "http://fuzefront-permit-pdp:7000"
  # @fuzefront/feature-flags (OpenFeature + Unleash) client for the app-registry
  # flags (flags.ts). FuzeFront HOSTS the family Unleash; this points the client
  # at it. The scoped CLIENT TOKEN is a SECRET (sealed) — its key in the chart
  # Secret / SealedSecret is below; absence → flags fall back to safe defaults.
  featureFlags:
    unleashUrl: ""           # e.g. http://unleash.fuzefront.svc.cluster.local:4242/api
    appName: "applications-service"
    # Key in fuzefront-secrets holding the scoped Unleash client token.
    tokenSecretKey: "FEATURE_FLAGS_CLIENT_TOKEN"
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 512Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []

# Clock-app — the built-in reference Module-Federation REMOTE (clock-app/), a
# static nginx image serving remoteEntry.js. Deployed as its own Deployment+
# Service and exposed SAME-ORIGIN under the app host at /apps/clock/ (see
# templates/clock-app.yaml + the clock ingress in templates/ingress.yaml).
# Disabled by default; enabled in values-local + values-prod once the image is
# built (release matrix — see deploy/PENDING-WORKFLOW-CHANGES.md).
clockApp:
  enabled: false
  image:
    repository: fuzefront/clock-app
    tag: local
  # The clock-app nginx (clock-app/nginx.conf) listens on 8080.
  port: 8080
  replicas: 1
  resources:
    requests: { cpu: 10m,  memory: 16Mi }
    limits:   { cpu: 100m, memory: 64Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []

# Permit.io authorization. Disabled by default (minimal cut). When enabled, the
# chart runs a standalone PDP and (Task 3) a schema-sync Job. PERMIT_API_KEY is
# read from the existing chart Secret. Local enablement needs a REAL key — the
# PDP's offline mode is unreliable (see docs/troubleshooting/PERMIT_PDP_TROUBLESHOOTING.md).
permit:
  enabled: false
  pdp:
    image:
      repository: permitio/pdp-v2
      # Pin to a concrete tag (Step: verify before commit). Do NOT use :latest.
      tag: "0.8.1"
    # The PDP container runs BOTH the OPAL/Python client and an embedded OPA
    # subprocess. OPA loads the full Permit fact snapshot (users/tenants/role
    # assignments) into memory on startup. At a 512Mi limit the cgroup OOM-killer
    # reaped the OPA subprocess mid-write — the container stayed up (restarts=0,
    # so it looked healthy) but OPAL logged "Failed to save data update to
    # policy-store: ClientConnectorError" and OPA ended up with the policy but NO
    # facts, so EVERY permit.check() returned a clean false (e.g. checkout 403
    # "ORG_PERMISSION_DENIED" for a legitimate org admin). Give OPA headroom.
    resources:
      requests: { cpu: 100m, memory: 384Mi }
      limits:   { cpu: 500m, memory: 1Gi }
    nodeSelector: {}
    affinity: {}
    tolerations: []

frontend:
  image:
    repository: fuzefront/frontend
    tag: local
  port: 8080
  replicas: 1
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []

emailService:
  enabled: false
  replicas: 1
  port: 3003
  image:
    repository: fuzefront/email-service
    tag: local
  kafka:
    brokers: "fuzeinfra-kafka.fuzeinfra.svc.cluster.local:9092"
    clientId: "email-service"
    groupId: "email-service-group"
  email:
    provider: "smtp"  # "sendgrid" or "smtp"
    from: "noreply@fuzefront.com"
    # SMTP transport config (provider: "smtp"). NON-secret only — the credentials
    # (SMTP_USER / SMTP_PASS) come from the SealedSecret, never from values.
    #
    # Leave `host` EMPTY for local/dev: the service then falls back to its in-code
    # localhost:1025 (mailhog) default, which is correct for a dev mail catcher.
    # In any environment that must deliver real mail, host MUST be set — see the
    # smtp.hostRequired guard in templates/email-service.yaml. That in-code
    # fallback is silent: with no host the pod is healthy, /health is green, and
    # every message is dropped. That is exactly how signup email-verification and
    # password-reset sat live-dead in prod.
    smtp:
      host: ""          # e.g. smtp.zoho.com — empty = dev mailhog fallback
      port: 587
      secure: false     # true for implicit TLS (465); false for STARTTLS (587)
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  # Per-service placement overrides (default empty → falls back to global.scheduling).
  nodeSelector: {}
  affinity: {}
  tolerations: []

smsService:
  enabled: false
  replicas: 1
  port: 3004
  image:
    repository: fuzefront/sms-service
    tag: local
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []

chatService:
  enabled: false
  replicas: 1
  # Port 3006: 3001=backend, 3002=security, 3003=apps/email, 3004=sms, 3005=provisioning
  port: 3006
  image:
    repository: fuzefront/chat-service
    tag: local
  # LiteLLM gateway in fuzeinfra namespace (its own Argo App).
  litellmUrl: "http://litellm.fuzeinfra.svc.cluster.local:4000"
  # ChromaDB vector store in fuzeinfra namespace (enabled via fuzeinfra Argo values).
  chromaUrl: "http://fuzeinfra-chromadb.fuzeinfra.svc.cluster.local:8000"
  # FuzeFront backend for user/org lookups.
  backendUrl: "http://fuzefront-backend:3001"
  # Permit PDP for authorization checks. When permit.enabled=true the in-cluster PDP runs
  # at fuzefront-permit-pdp:7000; otherwise falls back to the offline stub port.
  permitPdpUrl: "http://fuzefront-permit-pdp:7000"
  kafka:
    brokers: "fuzeinfra-kafka.fuzeinfra.svc.cluster.local:9092"
  # Embedding model resolved at the LiteLLM gateway (used by the doc indexer).
  embeddingModel: "text-embedding-3-small"
  # Resource requests/limits. Local/dev single replica; prod overrides upward.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # chat-doc-indexer Job: indexes docs/ into ChromaDB as a post-install/upgrade
  # hook. Idempotent (content-hash keyed). Disabled by default — flip on once
  # LiteLLM + ChromaDB are reachable in fuzeinfra.
  docIndexer:
    enabled: false
    # Directory inside the chat-service image that holds the docs to index.
    docsDir: "/app/services/chat-service/docs"

# Plan D — thin Kafka→HTTP bridge: consumes identity.user.created, calls
# security-service POST /internal/provision. No DB, no domain logic.
# SECURITY_SERVICE_URL is derived in the Helm template from securityService.port
# (http://fuzefront-security:<port>) — do not override separately.
provisioningService:
  enabled: false
  replicas: 1
  port: 3005
  image:
    repository: fuzefront/provisioning-service
    tag: local
  kafka:
    brokers: "fuzeinfra-kafka.fuzeinfra.svc.cluster.local:9092"
    clientId: "provisioning-service"
    groupId: "provisioning-service-group"
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []

# ---------------------------------------------------------------------------
# Forward-looking service placeholders (disabled by default). These are wired
# into deploy/CD ahead of the feature merges (billing #65, chat #66, litellm).
# The chart does NOT yet ship Deployment templates for them; these blocks exist
# so values-prod can size/place them and so the release pipeline (Phase F, owned
# by the orchestrator) can flip `enabled` + bump tags without a schema change.
# When enabled with no matching template, Helm simply ignores the extra values.
# ---------------------------------------------------------------------------
billingService:
  enabled: false
  image:
    repository: fuzefront/billing-service
    tag: local
  port: 3006
  replicas: 1
  # Dedicated least-privilege DB role (created by the billing-db-bootstrap Job),
  # NOT the shared fuzefront_user. Its password is BILLING_DB_PASSWORD in the
  # per-service billing-secrets SealedSecret.
  dbUser: billing_svc
  # Per-service secret (billing-only keys: STRIPE_*, BILLING_INTERNAL_TOKEN,
  # BILLING_DB_PASSWORD). Shared creds (PERMIT_API_KEY) stay in fuzefront-secrets.
  secretName: billing-secrets
  meterFlushIntervalSec: 60
  permitPdpUrl: "http://fuzefront-permit-pdp:7000"
  # Pre-install Job that creates the billing_svc role + `billing` schema + grants.
  dbBootstrap:
    enabled: true
  kafka:
    brokers: "fuzeinfra-kafka.fuzeinfra.svc.cluster.local:9092"
    clientId: "billing-service"
    groupId: "billing-service-group"
  # Payment-path config (checkout allowlist). Fail-closed by default: empty
  # productKeys means the payments route rejects every product key. Prod
  # overrides these in values-prod.yaml.
  payment:
    productKeys: ""
    currencies: ""
    maxTotalCents: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []

# payment-service — vendor-neutral payment GATEWAY (SCAFFOLD; not the live money
# path yet). Stateless: no DB, no Kafka. Runnable with zero secrets — without a
# real STRIPE_SECRET_KEY it serves /health only (degraded mode). Its templates
# live in this umbrella chart, so it is synced by the umbrella `fuzefront` Argo
# Application (hybrid-Argo — same rule as billingService/unleash). Disabled by
# default; flip `enabled` + seal payment-secrets to bring it up.
paymentService:
  enabled: false
  image:
    repository: fuzefront/payment-service
    tag: local
  # 3007: billing-service is 3006. Keep unique across the service port map.
  port: 3007
  replicas: 1
  # Active vendor adapter. Swapping the vendor = adding a sibling adapter and
  # changing this. Default 'stripe'.
  provider: stripe
  # Per-service secret (payment-only keys: STRIPE_SECRET_KEY,
  # PAYMENT_INTERNAL_TOKEN). Placeholders committed in
  # deploy/contabo/sealed/payment-secrets.yaml; both keys are `optional: true` in
  # the Deployment so the scaffold pod runs even before real values are sealed.
  secretName: payment-secrets
  resources:
    requests: { cpu: 50m,  memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []

litellm:
  enabled: false
  image:
    repository: ghcr.io/berriai/litellm
    tag: "main-stable"
  port: 4000
  replicas: 1
  resources:
    requests: { cpu: 250m, memory: 512Mi }
    limits:   { cpu: "1",  memory: "1Gi" }
  nodeSelector: {}
  affinity: {}
  tolerations: []

# ---------------------------------------------------------------------------
# Unleash — self-hosted OSS feature-flag server (issue #116, Deliverable 1).
#
# EXTERNAL upstream image (unleashorg/unleash-server) — NOT built by release.yml
# and NOT in its build matrix. Pin a concrete tag below (never :latest).
#
# Gated by `unleash.enabled` (default false). When enabled, the umbrella chart
# renders, in order:
#   1. a pre-install/pre-upgrade bootstrap Job (unleash-db-bootstrap) that creates
#      the least-privilege `unleash_svc` role + a DEDICATED `unleash` database it
#      OWNS on the shared FuzeInfra Postgres (Unleash self-migrates its schema on
#      boot as unleash_svc — that's why it must own the db).
#   2. the Unleash Deployment + a cluster-internal Service `fuzefront-unleash`.
#
# Admin UI is NOT public: the Service is cluster-internal. Reach the admin UI via
# `kubectl port-forward svc/fuzefront-unleash 4242:4242`, or (optionally) an
# admin-gated host under the *.prod.fuzefront.com Cloudflare-Access zone — see
# `unleash.ingress` below (default off; requires FuzeInfra to wire the CF host).
#
# Secrets live in the per-service `unleash-secrets` SealedSecret (keys:
# UNLEASH_DB_PASSWORD, INIT_ADMIN_API_TOKENS, UNLEASH_CLIENT_TOKEN). Seal real
# values with:  deploy/scripts/seal-secret.sh <KEY> --scope fuzefront/unleash-secrets
# Placeholders are committed in deploy/contabo/sealed/unleash-secrets.yaml.
#
# Client connection (the @fuzefront/feature-flags package): the unleash API is at
#   http://fuzefront-unleash.fuzefront.svc.cluster.local:4242/api
# authenticated with the UNLEASH_CLIENT_TOKEN.
# ---------------------------------------------------------------------------
unleash:
  enabled: false
  image:
    repository: unleashorg/unleash-server
    # Concrete, widely-published OSS tag (verified-available fallback per #116).
    # Bump deliberately in a deploy window (external image — not auto-bumped by CI).
    tag: "5.12.0"
  port: 4242
  replicas: 1
  # Least-privilege DB role created by the unleash-db-bootstrap Job (NOT the shared
  # fuzefront_user). Its password is UNLEASH_DB_PASSWORD in unleash-secrets.
  dbUser: unleash_svc
  # Dedicated database OWNED by unleash_svc (Unleash self-migrates into it).
  dbName: unleash
  # Per-service secret (unleash-only keys). Shared creds stay in fuzefront-secrets.
  secretName: unleash-secrets
  # Pre-install Job that creates the unleash_svc role + `unleash` database.
  dbBootstrap:
    enabled: true
  # Unleash needs headroom for its Node runtime + in-memory flag cache.
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits:   { cpu: 500m, memory: 512Mi }
  # OPTIONAL admin-gated ingress for the admin UI (default OFF). Requires the host
  # to sit under the *.prod.fuzefront.com Cloudflare-Access zone; the CF tunnel
  # rule + CNAME are FuzeInfra-owned (delegated). See the chart README.
  ingress:
    enabled: false
    className: ""        # defaults to ingress.className when empty
    host: ""             # e.g. unleash.prod.fuzefront.com (CF-Access gated)
    annotations: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []

authentik:
  enabled: true
  image:
    repository: ghcr.io/goauthentik/server
    tag: "2024.12.3"
  host: auth.fuzefront.dev.local
  dbName: authentik # must pre-exist in the FuzeInfra Postgres
  cookieDomain: fuzefront.dev.local
  bootstrapEmail: admin@fuzefront.dev
  # Backend OIDC SSO. The client_id/secret are now declared deterministically in
  # the blueprint (authentik/blueprints/provider-oidc.yaml) and in secret.*
  # above — no manual seeder or out-of-band patch needed. Enable once the
  # in-cluster Authentik has started and applied the blueprints.
  # issuer/redirect are public config; the dev-only split-DNS bits
  # (hostAlias to the ingress + a CA configmap) are set in values-local.
  oidc:
    enabled: false
    issuerUrl: "" # https://auth.fuzefront.dev.local/application/o/fuzefront/
    redirectUri: "" # https://fuzefront.dev.local/api/auth/oidc/callback
    backendHostAliasIP: "" # ingress-nginx ClusterIP (kubectl -n ingress-nginx get svc)
    caConfigMap: "" # configmap holding ca.crt for NODE_EXTRA_CA_CERTS
  # SMTP for Authentik transactional email (enrollment verification, password reset).
  # Leave all fields empty (default) to keep email disabled — Authentik will log a
  # warning but won't crash. Supply real values via --set or an existingSecret in prod.
  # In the local test harness, point host/port at MailHog (1025, no auth needed).
  smtp:
    host: ""        # e.g. "mailhog" (compose), "smtp.sendgrid.net" (prod)
    port: 25        # 1025 for MailHog, 587 for TLS STARTTLS, 465 for SSL
    username: ""    # leave empty for MailHog (no auth)
    # password stored in chart Secret as SMTP_PASSWORD; set via --set secret.smtpPassword
    from: "noreply@fuzefront.dev"
    useTls: false
    useSSL: false
    timeout: 10
  # Placement for the Authentik server + worker (empty → global.scheduling).
  nodeSelector: {}
  affinity: {}
  tolerations: []

ingress:
  enabled: true
  className: nginx
  host: fuzefront.dev.local
  # Extra annotations (e.g. cert-manager.io/cluster-issuer for prod TLS).
  annotations: {}
  tls:
    enabled: false
    # Defaults to "<host>-tls" when empty.
    secretName: ''

# ---------------------------------------------------------------------------
# Kafka topic pre-creation (Phase D). A Helm post-install/post-upgrade Job runs
# `kafka-topics.sh --create --if-not-exists` for each topic below so prod does
# not rely on broker auto-create. Disabled by default (local kind has no Kafka);
# enabled in values-prod.yaml. `topics[]` is the reconciled set from the shared
# Kafka constants (@fuzefront/shared TOPICS: identity.user.created,
# notify.email.requested, notify.email.status) plus the planned billing/chat
# events. Edit this list when the shared TOPICS constant changes.
kafkaTopics:
  enabled: false
  # Official Apache Kafka image ships kafka-topics.sh under /opt/kafka/bin (the
  # Job prepends that to PATH). Switched off bitnami/kafka — Bitnami removed
  # versioned tags from docker.io/bitnami ("Bitnami Secure Images" change), so
  # bitnami/kafka:3.7.0 was unpullable and froze the post-upgrade sync hook.
  image:
    repository: apache/kafka
    tag: "3.7.0"
  # Bootstrap server the Job talks to (FuzeInfra Kafka, cross-namespace DNS).
  bootstrapServer: "fuzeinfra-kafka.fuzeinfra.svc.cluster.local:9092"
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits:   { cpu: 250m, memory: 256Mi }
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # retentionMs default applied when a topic omits its own. 7 days.
  defaultRetentionMs: 604800000
  # Each topic: name (required), partitions, replicationFactor, retentionMs.
  # DLQ companions are created for the consumer topics (dlqTopic() = "<t>.dlq").
  topics:
    # --- identity (security-service → provisioning-service) ---
    - name: identity.user.created
      partitions: 3
      replicationFactor: 1
      retentionMs: 604800000
    # --- notifications (backend/security → email-service) ---
    - name: notify.email.requested
      partitions: 3
      replicationFactor: 1
      retentionMs: 604800000
    - name: notify.email.requested.dlq
      partitions: 1
      replicationFactor: 1
      retentionMs: 1209600000 # 14d — keep failures longer for triage
    - name: notify.email.status
      partitions: 3
      replicationFactor: 1
      retentionMs: 604800000
    # --- billing (planned: billing-service / chat-service emitters) ---
    - name: billing.subscription.changed
      partitions: 3
      replicationFactor: 1
      retentionMs: 2592000000 # 30d — billing audit trail
    - name: billing.usage.recorded
      partitions: 6
      replicationFactor: 1
      retentionMs: 2592000000
    - name: billing.usage.recorded.dlq
      partitions: 1
      replicationFactor: 1
      retentionMs: 2592000000
    - name: billing.llm.usage
      partitions: 6
      replicationFactor: 1
      retentionMs: 2592000000
    - name: billing.payment.completed
      partitions: 3
      replicationFactor: 1
      retentionMs: 2592000000 # 30d — billing audit trail

# ── Cloudflare edge integration ──────────────────────────────────────────────
# Cache purge lets the backend purge the CF edge cache after MFE deploys.
# Disabled by default; prod enables it and supplies the kubesealed token blob
# (see templates/sealed-secret-cloudflare-cache-purge.yaml for reseal steps).
cloudflare:
  cachePurge:
    enabled: false
    # Cloudflare zone ID for app.fuzefront.com (not a secret).
    zoneId: "94eaf85fb0ed9a26b5645af10fed0788"
    # kubesealed ciphertext of the CF API token; empty disables the SealedSecret.
    sealedToken: ""
