apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzeinfra
  namespace: argocd
spec:
  project: fuzefront
  source:
    repoURL: https://github.com/izzywdev/FuzeFront.git
    targetRevision: master
    # Chart lives in the FuzeInfra git submodule (Argo inits submodules by default).
    path: FuzeInfra/helm/fuzeinfra
    helm:
      # Consumer-model overlay. The authoritative shared platform is the
      # `fuzeinfra-prod` Argo app (terraform-provisioned from the FuzeInfra repo,
      # values-contabo) — it already runs Postgres/Redis/monitoring. This app must
      # NOT redeploy those: doing so created a SECOND postgres/redis with identical
      # selector labels (app.kubernetes.io/name=postgres, instance=fuzeinfra), which
      # split-brained the `fuzeinfra-postgres` Service (round-robined both pods) and
      # intermittently 404'd app.fuzefront.com. This app now supplies ONLY the
      # components the base Contabo overlay disables but FuzeFront needs: Kafka
      # (event bus) + ChromaDB (chat-RAG). FuzeFront consumes the shared
      # fuzeinfra-postgres / fuzeinfra-redis (see values-prod.yaml fuzeinfra.* hosts).
      values: |
        global:
          storageClass: local-path
          domain: fuzefront.com
        postgres: { enabled: false }    # shared: fuzeinfra-postgres (fuzeinfra-prod)
        redis: { enabled: false }       # shared: fuzeinfra-redis (fuzeinfra-prod)
        prometheus: { enabled: false }  # shared platform owns monitoring
        grafana: { enabled: false }
        alertmanager: { enabled: false }
        loki: { enabled: false }
        promtail: { enabled: false }
        nodeExporter: { enabled: false }
        mongodb: { enabled: false }
        mongoExpress: { enabled: false }
        neo4j: { enabled: false }
        elasticsearch: { enabled: false }
        # ChromaDB + Kafka enabled: chat-RAG (vector store) and the event bus
        # (email/sms/provisioning/billing/chat consumers) depend on them.
        chromadb: { enabled: true }
        kafka: { enabled: true }
        kafkaUi: { enabled: false } # admin UI only — keep off in prod
        rabbitmq: { enabled: false }
        airflow: { enabled: false }
        dnsmasq: { enabled: false }
        cloudflareTunnel: { enabled: false }
        ingress:
          enabled: true
          className: nginx
          tls:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: fuzeinfra
  syncPolicy:
    automated:
      prune: false # stateful (Postgres/Redis PVCs) — never auto-prune data
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
