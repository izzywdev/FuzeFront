# GitOps-persists the FuzeFront SealedSecrets that were, until go-live, applied
# imperatively (kubectl) to the cluster. Argo now reconciles deploy/contabo/sealed/
# so the encrypted manifests are the single source of truth: re-creating the
# cluster (or losing a secret) self-heals from git instead of a manual re-apply.
#
# SAFE TO COMMIT: every file under deploy/contabo/sealed/ is a SealedSecret
# (kubeseal-encrypted) — only the in-cluster sealed-secrets controller's private
# key can decrypt it. Plaintext never lives in git. See deploy/contabo/SEAL_PROD_SECRETS.md.
#
# Each SealedSecret carries its own metadata.namespace (fuzefront / fuzeinfra),
# so resources land in their declared namespace (both are whitelisted in the
# fuzefront AppProject). sync-wave -1 runs this BEFORE the fuzefront app (wave 0)
# and billing (wave 1) so the secrets exist when the db-bootstrap pre-sync hook
# and the image-pull need them.
#
# Currently tracked: billing-secrets. fuzefront-secrets + ghcr-pull are in the
# cluster imperatively; once the repo owner seals them into deploy/contabo/sealed/
# (per SEAL_PROD_SECRETS.md) and commits, this app adopts and persists them too.
#
# prune: false — never auto-delete a secret on an incidental git change.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fuzefront-sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: fuzefront
  source:
    repoURL: https://github.com/izzywdev/FuzeFront.git
    targetRevision: master
    path: deploy/contabo/sealed
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    # Nominal default ns; each SealedSecret declares its own metadata.namespace.
    namespace: fuzefront
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
