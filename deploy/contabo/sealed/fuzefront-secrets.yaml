# =============================================================================
# SealedSecret: fuzefront-secrets  (namespace: fuzefront)
# -----------------------------------------------------------------------------
# This is the SHARED application secret. MANY running services read keys from it
# (Authentik, Permit, Postgres, OAuth, messaging, LLM, and now billing). Each
# value below is encrypted against the cluster's sealed-secrets PUBLIC key and is
# safe to commit — only the in-cluster controller (FuzeInfra) can decrypt it.
#
# ⚠️  DANGER — DO NOT apply/sync this file with `encryptedData: {}` (empty) or
#     with only a subset of keys. Argo would create an EMPTY/partial Secret and
#     CLOBBER the live one → Authentik/Permit/DB/etc. break. This file must hold
#     EVERY key below before it is wired into Argo.
#
# HOW TO POPULATE (credential-free — no kubeconfig, FuzeInfra holds the decrypt key):
#   Seal one key at a time; `--merge-into` preserves the others:
#       deploy/scripts/seal-secret.sh STRIPE_SECRET_KEY            # hidden prompt
#       deploy/scripts/seal-secret.sh STRIPE_WEBHOOK_SECRET
#       deploy/scripts/seal-secret.sh BILLING_INTERNAL_TOKEN --in ~/.fuzefront-secrets/billing-internal-token.txt
#       ...and the same for every key in the inventory below.
#   The script fetches the current public cert from FuzeInfra and runs
#   `kubeseal --cert … --merge-into` against THIS file.
#
# KEY INVENTORY (group → keys):
#   core      : JWT_SECRET, SESSION_SECRET, DB_PASSWORD, DB_SUPERUSER_PASSWORD,
#               INTERNAL_PROVISION_SECRET
#   authz     : PERMIT_API_KEY
#   authentik : AUTHENTIK_SECRET_KEY, AUTHENTIK_BOOTSTRAP_PASSWORD,
#               AUTHENTIK_BOOTSTRAP_TOKEN, AUTHENTIK_CLIENT_ID, AUTHENTIK_CLIENT_SECRET
#   oauth     : GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
#   messaging : SENDGRID_API_KEY, TWILIO_AUTH_TOKEN, SMS_AUTH_SECRET, SMTP_PASSWORD
#   llm       : ANTHROPIC_API_KEY, OPENAI_API_KEY, LITELLM_MASTER_KEY
#   billing   : STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, BILLING_INTERNAL_TOKEN
#
# If you already maintain a populated fuzefront-secrets SealedSecret elsewhere,
# run seal-secret.sh --merge-into against THAT file instead and ignore this stub.
# =============================================================================
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fuzefront-secrets
  namespace: fuzefront
spec:
  encryptedData: {}        # populate via deploy/scripts/seal-secret.sh (do NOT sync empty)
  template:
    metadata:
      name: fuzefront-secrets
      namespace: fuzefront
    type: Opaque
