# =============================================================================
# SealedSecret: billing-secrets  (namespace: fuzefront)   [STRICT scope]
# -----------------------------------------------------------------------------
# Per-service secret for billing-service ONLY (least privilege). Holds just the
# four billing-specific keys. Shared platform creds (PERMIT_API_KEY, etc.) stay
# in fuzefront-secrets — billing-service reads PERMIT_API_KEY from there. A
# compromised billing pod therefore cannot read Authentik/SMTP/OAuth/LLM secrets,
# and a pending/crashing billing pod cannot take down other services (its secret
# is isolated).
#
# WHY THIS FILE EXISTS / GitOps gap it closes:
#   The live cluster currently has a billing-secrets Secret created out-of-band
#   via `kubectl apply` (NOT GitOps) — it would be LOST on a from-scratch cluster
#   rebuild and is not reconciled by Argo. This SealedSecret puts billing-secrets
#   under GitOps (the `fuzefront-sealed` Argo Application syncs deploy/contabo/sealed/),
#   so it survives a rebuild and Argo owns it.
#
# VALUES ARE DECRYPTABLE PLACEHOLDERS (NOT empty, NOT fake ciphertext):
#   STRIPE_SECRET_KEY     = sk_test_PLACEHOLDER_reseal_before_golive
#   STRIPE_WEBHOOK_SECRET = whsec_PLACEHOLDER_reseal_before_golive
#   BILLING_INTERNAL_TOKEN/BILLING_DB_PASSWORD = PLACEHOLDER_..._reseal_before_golive
#   They are sealed against the LIVE controller cert so the controller decrypts
#   them cleanly into a Secret — this AVOIDS the two failure modes seen before:
#     (1) encryptedData:{} (empty)  -> SealedSecret/app went Degraded.
#     (2) hand-typed fake base64    -> controller decrypt error -> Degraded.
#   billing-service with these placeholders will START but Stripe calls will fail
#   until real keys are sealed (intended: keys are an integration-time flip).
#
# GO-LIVE — reseal the REAL values (credential-free; --merge-into preserves the
# other keys, so reseal only what changes):
#   deploy/scripts/seal-secret.sh STRIPE_SECRET_KEY
#   deploy/scripts/seal-secret.sh STRIPE_WEBHOOK_SECRET
#   # BILLING_INTERNAL_TOKEN / BILLING_DB_PASSWORD: only reseal if rotating off the
#   # placeholder (BILLING_DB_PASSWORD MUST match what the billing-db-bootstrap Job
#   # sets the billing_svc role password to — keep them in sync).
#   deploy/scripts/seal-secret.sh BILLING_DB_PASSWORD --in ~/.fuzefront-secrets/billing-db-password.txt
# Then: git add + commit + push  -> Argo (FuzeInfra-operated controller) decrypts
# in-cluster. Plaintext never touches git/chat/shell history.
#
# NOTE: scope is STRICT (name+namespace bound) — matches fuzefront-secrets and
# seal-secret.sh's default. Reseals MUST keep scope=fuzefront/billing-secrets.
# =============================================================================
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: billing-secrets
  namespace: fuzefront
spec:
  encryptedData:
    BILLING_DB_PASSWORD: 
    BILLING_INTERNAL_TOKEN: 
    STRIPE_SECRET_KEY: 
    STRIPE_WEBHOOK_SECRET: 
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/managed: "true"
      name: billing-secrets
      namespace: fuzefront
    type: Opaque
