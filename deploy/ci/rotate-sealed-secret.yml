# ─────────────────────────────────────────────────────────────────────────────
# rotate-sealed-secret.yml — FuzeFront replica of the FuzeInfra family-standard
# rotation workflow (izzywdev/FuzeInfra#111).
#
#   ⚠️ STAGED LOCATION. This file lives at deploy/ci/ ONLY because the bot that
#   authored it cannot write under .github/workflows/. A maintainer must move it:
#
#       git mv deploy/ci/rotate-sealed-secret.yml .github/workflows/rotate-sealed-secret.yml
#       git commit -m "ci: install rotate-sealed-secret workflow" && push via PR
#
#   It does NOT run from deploy/ci/ — GitHub only executes workflows under
#   .github/workflows/.
#
# WHAT IT DOES (hands-off secret rotation, no manual seal-secret.sh):
#   1. Generates a fresh value (or accepts a provided one) for ONE data key.
#   2. Seals it OFFLINE against the cluster's published public cert via this
#      repo's deploy/scripts/seal-secret.sh — no kubeconfig, no cluster access,
#      plaintext NEVER logged (written to a 0600 temp file, fed via --in).
#   3. Merges the sealed value into deploy/contabo/sealed/<name>.yaml in place
#      (every other key preserved).
#   4. Opens an auto-merging PR. On merge → the `fuzefront-sealed` Argo app
#      (selfHeal:true) syncs the SealedSecret → the in-cluster sealed-secrets
#      controller decrypts it into the real Secret → stakater/Reloader rolls
#      authentik-server + authentik-worker (annotation added in
#      deploy/helm/fuzefront/templates/authentik.yaml). No human restart step.
#
# DEPLOY-WINDOW NOTE (this repo): master is `required_signatures` + deploy-on-
# push. The PR's squash-merge commit is created and SIGNED by GitHub, so it
# satisfies required_signatures. Because merging to master deploys, treat
# auto_merge=true as "merge in a deploy window" per the repo CLAUDE.md.
# ─────────────────────────────────────────────────────────────────────────────
name: Rotate sealed secret

on:
  workflow_dispatch:
    inputs:
      key:
        description: "Secret data key to rotate (e.g. AUTHENTIK_BOOTSTRAP_TOKEN)"
        required: true
        type: string
      scope:
        description: "SealedSecret scope as <namespace>/<name>"
        required: true
        default: "fuzefront/fuzefront-secrets"
        type: string
      value_mode:
        description: "How to produce the new value"
        required: true
        default: "generate"
        type: choice
        options:
          - generate
          - provided
      value:
        description: "New value (ONLY for value_mode=provided; prefer 'generate' so plaintext never enters the run inputs)"
        required: false
        type: string
      generate_format:
        description: "Generator for value_mode=generate"
        required: false
        default: "hex32"
        type: choice
        options:
          - hex32       # openssl rand -hex 32  → 64 hex chars
          - hex64       # openssl rand -hex 64  → 128 hex chars
          - base64-32   # openssl rand -base64 32 (url-safe, padding stripped)
      reload_argocd_app:
        description: "Optional Argo app to hard-refresh after merge (fallback when Reloader is NOT installed cluster-side). Requires ARGOCD_SERVER + ARGOCD_AUTH_TOKEN repo secrets; otherwise a no-op note."
        required: false
        default: ""
        type: string
      auto_merge:
        description: "Enable auto-merge (squash) on the PR. master is deploy-on-push — merge in a deploy window."
        required: false
        default: true
        type: boolean

concurrency:
  # One rotation at a time per scope, so two runs never seal/commit the same
  # manifest concurrently.
  group: rotate-sealed-secret-${{ inputs.scope }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Validate inputs (env-passed, never interpolated into the shell body) ──
      - name: Validate inputs
        env:
          KEY: ${{ inputs.key }}
          SCOPE: ${{ inputs.scope }}
          VALUE_MODE: ${{ inputs.value_mode }}
          PROVIDED_VALUE: ${{ inputs.value }}
        run: |
          set -euo pipefail
          # Data key: SealedSecret/Secret keys are [A-Za-z0-9_.-].
          if ! printf '%s' "$KEY" | grep -Eq '^[A-Za-z0-9_.-]+$'; then
            echo "::error::Invalid key '$KEY' — allowed: A-Z a-z 0-9 _ . -"; exit 1
          fi
          # Scope: exactly one '/', both halves DNS-label-ish.
          if ! printf '%s' "$SCOPE" | grep -Eq '^[a-z0-9-]+/[a-z0-9-]+$'; then
            echo "::error::Invalid scope '$SCOPE' — expected <namespace>/<name>"; exit 1
          fi
          if [ "$VALUE_MODE" = "provided" ] && [ -z "$PROVIDED_VALUE" ]; then
            echo "::error::value_mode=provided but no value supplied"; exit 1
          fi
          echo "Validated: key=$KEY scope=$SCOPE mode=$VALUE_MODE"

      - name: Install kubeseal + kubectl
        env:
          KUBESEAL_VERSION: "0.27.1"
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/kubeseal.tgz \
            "https://github.com/bitnami-labs/sealed-secrets/releases/download/v${KUBESEAL_VERSION}/kubeseal-${KUBESEAL_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/kubeseal.tgz -C /tmp kubeseal
          sudo install -m 0755 /tmp/kubeseal /usr/local/bin/kubeseal
          curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          kubeseal --version
          kubectl version --client

      # ── Generate the value to a 0600 temp file. NEVER echoed; NEVER an arg. ──
      - name: Produce new value (offline)
        id: mk
        env:
          VALUE_MODE: ${{ inputs.value_mode }}
          GEN_FORMAT: ${{ inputs.generate_format }}
          PROVIDED_VALUE: ${{ inputs.value }}
        run: |
          set -euo pipefail
          VAL_FILE="$(mktemp)"; chmod 600 "$VAL_FILE"
          if [ "$VALUE_MODE" = "provided" ]; then
            # Strip any trailing newline; the seal script's --in does tr -d '\r\n'.
            printf '%s' "$PROVIDED_VALUE" > "$VAL_FILE"
          else
            case "$GEN_FORMAT" in
              hex32)     openssl rand -hex 32  | tr -d '\n' > "$VAL_FILE" ;;
              hex64)     openssl rand -hex 64  | tr -d '\n' > "$VAL_FILE" ;;
              base64-32) openssl rand -base64 32 | tr -d '\n=' | tr '+/' '-_' > "$VAL_FILE" ;;
              *) echo "::error::unknown generate_format '$GEN_FORMAT'"; exit 1 ;;
            esac
          fi
          [ -s "$VAL_FILE" ] || { echo "::error::produced empty value"; exit 1; }
          # Emit only the PATH (not the value) for the next step.
          echo "val_file=$VAL_FILE" >> "$GITHUB_OUTPUT"

      - name: Seal into the manifest (offline, plaintext never logged)
        id: seal
        env:
          KEY: ${{ inputs.key }}
          SCOPE: ${{ inputs.scope }}
          VAL_FILE: ${{ steps.mk.outputs.val_file }}
          # seal-secret.sh fetches the CURRENT public cert from here (override if
          # the published URL differs); keeps key rotation transparent.
          FUZEINFRA_SEALED_CERT_URL: ${{ vars.FUZEINFRA_SEALED_CERT_URL || 'https://sealed-secrets.fuzeinfra.fuzefront.com/v1/cert.pem' }}
        run: |
          set -euo pipefail
          NS="${SCOPE%%/*}"; NAME="${SCOPE##*/}"
          MANIFEST="deploy/contabo/sealed/${NAME}.yaml"
          # Delegate to the repo's hardened seal path (#105): whitespace-scrubbed
          # value via --in, merge-into the manifest in place.
          deploy/scripts/seal-secret.sh "$KEY" --in "$VAL_FILE" --scope "$SCOPE"
          rm -f "$VAL_FILE"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "ns=$NS"   >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          if git diff --quiet -- "$MANIFEST"; then
            echo "::error::seal produced no change to $MANIFEST"; exit 1
          fi

      - name: Open auto-merging PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEY: ${{ inputs.key }}
          SCOPE: ${{ inputs.scope }}
          MANIFEST: ${{ steps.seal.outputs.manifest }}
          AUTO_MERGE: ${{ inputs.auto_merge }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="rotate/${KEY}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add "$MANIFEST"
          git commit -m "secrets(rotate): rotate ${KEY} in ${SCOPE}

Automated rotation via rotate-sealed-secret. Sealed offline against the
cluster public cert; plaintext never logged. On merge, Argo (fuzefront-sealed,
selfHeal) syncs the SealedSecret, the controller decrypts it, and Reloader
rolls authentik-server + authentik-worker.

Run: ${RUN_URL}"
          git push origin "$BRANCH"
          PR_URL="$(gh pr create \
            --title "secrets(rotate): ${KEY} in ${SCOPE}" \
            --body "Automated SealedSecret rotation of \`${KEY}\` (scope \`${SCOPE}\`).

- Sealed offline via \`deploy/scripts/seal-secret.sh\` (no cluster access, plaintext never logged).
- On merge: \`fuzefront-sealed\` Argo app syncs → sealed-secrets controller decrypts → stakater/Reloader rolls \`authentik-server\` + \`authentik-worker\`.
- master is \`required_signatures\` + deploy-on-push; the squash-merge commit is signed by GitHub. Merge in a deploy window.

Run: ${RUN_URL}" \
            --base master --head "$BRANCH")"
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          if [ "$AUTO_MERGE" = "true" ]; then
            gh pr merge "$PR_URL" --auto --squash --delete-branch
            echo "Auto-merge (squash) enabled on $PR_URL"
          else
            echo "Opened (no auto-merge): $PR_URL"
          fi

      # ── Fallback reload path: only when Reloader is NOT installed cluster-side ──
      # No-op unless ARGOCD_SERVER + ARGOCD_AUTH_TOKEN repo secrets are configured
      # (this repo intentionally holds no cluster creds — see infra-dispatch.yml).
      - name: Argo app hard-refresh (fallback)
        if: ${{ inputs.reload_argocd_app != '' }}
        env:
          APP: ${{ inputs.reload_argocd_app }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ARGOCD_SERVER:-}" ] || [ -z "${ARGOCD_AUTH_TOKEN:-}" ]; then
            echo "::notice::reload_argocd_app='$APP' requested but ARGOCD_SERVER/ARGOCD_AUTH_TOKEN not set — skipping (rely on stakater/Reloader, or restart out-of-band)."
            exit 0
          fi
          curl -fsSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 0755 /tmp/argocd /usr/local/bin/argocd
          argocd app get "$APP" --refresh --grpc-web
          argocd app actions run "$APP" restart --kind Deployment --grpc-web || true
          echo "Requested hard-refresh + restart for Argo app '$APP'."
