# Seal with: kubeseal --controller-namespace kube-system < fuzeservice-permit-plain.yaml > fuzeservice-permit.yaml
# Plain secret (DO NOT COMMIT):
#   kubectl create secret generic fuzeservice-permit \
#     --namespace fuzeservice \
#     --from-literal=PERMIT_API_KEY=<your-key> \
#     --from-literal=PERMIT_PDP_URL=http://permit-pdp.fuzefront.svc.cluster.local:7766 \
#     --dry-run=client -o yaml > fuzeservice-permit-plain.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fuzeservice-permit
  namespace: fuzeservice
spec:
  encryptedData:
    PERMIT_API_KEY: PLACEHOLDER_SEAL_ME
    PERMIT_PDP_URL: PLACEHOLDER_SEAL_ME
  template:
    metadata:
      name: fuzeservice-permit
      namespace: fuzeservice
