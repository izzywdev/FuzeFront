# Seal with: kubeseal --controller-namespace kube-system < fuzecontact-permit-plain.yaml > fuzecontact-permit.yaml
# Plain secret (DO NOT COMMIT):
#   kubectl create secret generic fuzecontact-permit \
#     --namespace fuzecontact \
#     --from-literal=PERMIT_API_KEY=<your-key> \
#     --from-literal=PERMIT_PDP_URL=http://permit-pdp.fuzefront.svc.cluster.local:7766 \
#     --dry-run=client -o yaml > fuzecontact-permit-plain.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fuzecontact-permit
  namespace: fuzecontact
spec:
  encryptedData:
    PERMIT_API_KEY: PLACEHOLDER_SEAL_ME
    PERMIT_PDP_URL: PLACEHOLDER_SEAL_ME
  template:
    metadata:
      name: fuzecontact-permit
      namespace: fuzecontact
