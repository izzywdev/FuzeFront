openapi: 3.1.0
info:
  title: FuzeFront Security API
  version: 0.4.0
  description: >-
    The FuzeFront-owned, **provider-agnostic** Security API for the whole Fuze
    family. It exposes both authentication (AuthN) and authorization (AuthZ)
    behind a single, stable, same-origin contract under `/api/v1/security`.


    ## Provider-agnostic by design

    The underlying identity provider (federation / MFA / enrollment engine) and
    the authorization engine (policy / ReBAC) are **swappable implementations**
    hidden behind internal adapter interfaces (`IdentityProvider`,
    `AuthorizationProvider`). Consumers, the frontend SPA, and federated remotes
    know **only** this API and the generated `@fuzefront/security-client` — never
    a vendor. We can switch or blend providers for features/cost without any
    consumer change.


    ## Naming rule (strict)

    No vendor/product name appears in ANY consumer-facing path, schema name,
    field, config key, or description. Open-standard protocol terms
    (OIDC/OAuth2/JWKS/PKCE) may appear where they describe a genuine wire
    protocol, but are kept out of consumer-facing **names** where practical.
    Provider names live only inside server-side adapter implementations and
    server-only environment configuration.


    ## Boundary guarantee

    For social login the user's browser only ever transits `app.fuzefront.com`
    and (briefly, for the chosen social provider) the provider's own consent
    host (e.g. `accounts.google.com`). No FuzeFront-internal identity host is
    ever visible to the browser or named in this contract.


    ## Fail-closed

    Every AuthN and AuthZ decision is fail-closed: any verification, provider,
    or transport error yields a denial (401/403) or an explicit error body —
    never a permissive fallback.


    ## Delivery phasing

    AuthN is delivered first (it fixes the acute live provider leak); AuthZ is
    designed here in full and its consumer rollout is sequenced after AuthN.


    ## MFA + contact verification (provider-agnostic)

    Multi-factor step-up (`/mfa`) and contact-ownership verification (`/verify`,
    email + SMS) are provider-agnostic: internally they are backed by the
    identity provider's MFA stages and the family email/SMS services via the
    adapter, but consumers see only neutral factor `type` values
    (`totp`/`sms`/`email`, with room for `webauthn` later).
  license:
    name: MIT
servers:
  - url: /api
    description: >-
      Same-origin API base. Works identically under local TLS and prod ingress;
      never hard-code an absolute API host.
tags:
  - name: session
    description: Session lifecycle — password login, current identity, logout, code exchange.
  - name: social
    description: Server-brokered social login. The browser never sees an internal identity host.
  - name: signup
    description: Server-brokered account creation.
  - name: capabilities
    description: Neutral capability descriptor for the auth surface.
  - name: authz
    description: Authorization decisions (check / bulk-check / permissions) + grants (write-side).
  - name: tenants
    description: Tenant, membership, and role management (neutralized authz primitives).
  - name: tokens
    description: FuzeFront-owned machine-to-machine (M2M) token issuance and introspection.
  - name: mfa
    description: Provider-agnostic multi-factor authentication — factor management + login step-up.
  - name: verify
    description: Contact-ownership verification (email + phone), distinct from MFA login step-up.
  - name: sessions
    description: >-
      Active-session / device management for the current user (list devices,
      revoke one, revoke all others). Distinct from `session` (single-session
      login lifecycle).
  - name: account
    description: >-
      Self-service account credential & connection management — password reset,
      set/add password on a social-only account, and linked social connections.
x-design-note:
  accountSwitching: >-
    There is deliberately NO server "switch account" endpoint. Account
    switching is a CLIENT-SIDE multi-session concern: the SPA may hold multiple
    independent `/v1/security/session` tokens (one per signed-in account) and
    switches the active account by selecting which token it presents on the
    same-origin API base. The server treats each token as its own session; it
    never needs to know which one the UI currently considers "active".
paths:
  # ─────────────────────────────── AuthN: session ───────────────────────────
  /v1/security/session:
    post:
      tags: [session]
      summary: Password login — establish a session
      operationId: createSession
      description: >-
        Validates credentials via the configured identity provider (server-
        brokered; the browser never leaves `app.fuzefront.com`). Returns a
        `SessionResult`: either an authenticated session, OR — when the account
        has MFA enabled — an `mfa_required` challenge (discriminated by
        `status`) that the client completes via `/mfa/challenge` + `/mfa/verify`.
        Fail-closed on bad credentials.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session, or an MFA-required challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton session-creation action; returns one session.
    get:
      tags: [session]
      summary: Current identity ("me")
      operationId: getSession
      description: >-
        Returns the normalized `Identity` and hydrated user for the presented
        session token. This is the source of any out-of-band role/tenant
        hydration in legacy token mode.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The current identity + user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton — the current caller's identity.
    delete:
      tags: [session]
      summary: Logout — revoke the current session
      operationId: deleteSession
      description: Revokes the presented session token. Idempotent; fail-closed.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session revoked.
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton mutation; no collection.
  /v1/security/session/exchange:
    post:
      tags: [session]
      summary: Exchange an opaque broker code for a session
      operationId: exchangeSessionCode
      description: >-
        Exchanges the FuzeFront-minted opaque `code` issued by
        `GET /v1/security/social/callback` for a session. The code is single-use
        and short-lived. Returns a `SessionResult`: an authenticated session, or
        an `mfa_required` challenge when the account requires step-up.
        Fail-closed on an unknown/expired code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeRequest'
      responses:
        '200':
          description: Authenticated session, or an MFA-required challenge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton code-exchange action.
  # ─────────────────────── AuthN: self-service password reset ────────────────
  /v1/security/session/password/reset-request:
    post:
      tags: [account]
      summary: Request a password-reset link/code (unauthenticated)
      operationId: requestPasswordReset
      description: >-
        Begins self-service password reset for the supplied email. ALWAYS
        returns 202 regardless of whether an account exists — the response never
        reveals account existence (no user enumeration). If an account exists, a
        reset link/code is dispatched via the family email service.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '202':
          description: >-
            Accepted. A reset message was dispatched IF the email maps to an
            account. Response is identical either way (no enumeration).
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Singleton reset-request action; no collection.
  /v1/security/session/password/reset-confirm:
    post:
      tags: [account]
      summary: Confirm a password reset with a token (unauthenticated)
      operationId: confirmPasswordReset
      description: >-
        Completes password reset by presenting the single-use `token` from the
        reset message together with a `newPassword`. Fail-closed on an
        unknown/expired/consumed token or a password that fails policy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: Password reset; the account may now sign in with the new password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetResult'
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Singleton reset-confirm action; no collection.
  # ─────────────────────── Account: set/add password ────────────────────────
  /v1/security/password:
    post:
      tags: [account]
      summary: Set/add a password on a social-only account
      operationId: setPassword
      description: >-
        Adds a password sign-in method to the authenticated account (e.g. an
        account created via social login that has no password yet). Returns 409
        if a password already exists — use the reset flow to change an existing
        one. Fail-closed on a password that fails policy.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
      responses:
        '200':
          description: Password set; the account now has a password sign-in method.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityConnections'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: A password sign-in method already exists on this account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
      x-pagination: exempt
      x-pagination-reason: Singleton set-password action; no collection.
  # ─────────────────────── Sessions: device management ──────────────────────
  /v1/security/sessions:
    get:
      tags: [sessions]
      summary: List the current user's active sessions / devices
      operationId: listSessions
      description: >-
        Returns the authenticated user's active sessions, one per device/agent,
        with the current session flagged (`current: true`). Bounded per user (a
        person signs in from a handful of devices), so the full set is returned.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The active sessions.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionDevice'
                required: [items]
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Bounded per-user active-session set, not user-controlled data growth.
    delete:
      tags: [sessions]
      summary: Revoke all other sessions (keep the current one)
      operationId: revokeOtherSessions
      description: >-
        Revokes every active session for the authenticated user EXCEPT the one
        making the request. Idempotent. Useful for "sign out everywhere else".
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Other sessions revoked; the current session remains valid.
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton bulk-revoke mutation; no collection returned.
  /v1/security/sessions/{id}:
    delete:
      tags: [sessions]
      summary: Revoke one session by id
      operationId: revokeSession
      description: >-
        Revokes a single active session belonging to the authenticated user.
        Idempotent — revoking an absent/already-revoked session still returns
        204. A user may revoke their current session (equivalent to logout).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The session id from `GET /v1/security/sessions`.
          schema:
            type: string
      responses:
        '204':
          description: Session revoked (idempotent).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton mutation; no collection.
  # ─────────────────────── Account: social linking ──────────────────────────
  /v1/security/social/{provider}/link:
    post:
      tags: [social]
      summary: Begin linking a social provider to the current account
      operationId: linkSocial
      description: >-
        Starts a server-brokered handshake to link the named social provider to
        the authenticated account. Like login, the browser only ever transits
        the app host and the provider's own consent host. Returns either a 302
        redirect to the consent flow, or `{ redirectUrl }` for the SPA to
        navigate to. On completion the provider returns to
        `GET /v1/security/social/callback`, which links (rather than signs in)
        when an authenticated link handshake is in progress.
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          description: Social provider slug. Extensible; `google` is the first supported value.
          schema:
            $ref: '#/components/schemas/SocialProvider'
      responses:
        '200':
          description: Link handshake started; navigate the browser to `redirectUrl`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialLinkStart'
        '302':
          description: Redirect to the social provider consent flow.
          headers:
            Location:
              schema: { type: string }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: This provider is already linked to the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
      x-pagination: exempt
      x-pagination-reason: Singleton link handshake; no collection.
    delete:
      tags: [social]
      summary: Unlink a social provider from the current account
      operationId: unlinkSocial
      description: >-
        Removes the named social provider from the authenticated account.
        Fail-closed: returns 409 if unlinking would leave the account with NO
        remaining sign-in method (no other social connection AND no password) —
        the account must always retain at least one way to sign in.
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          description: Social provider slug to unlink.
          schema:
            $ref: '#/components/schemas/SocialProvider'
      responses:
        '200':
          description: Provider unlinked; remaining connections returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityConnections'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: >-
            Unlinking would leave the account with no sign-in method. Set a
            password or link another provider first.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
      x-pagination: exempt
      x-pagination-reason: Singleton unlink mutation; no collection.
  /v1/security/identity/connections:
    get:
      tags: [account]
      summary: List the current account's sign-in connections
      operationId: getIdentityConnections
      description: >-
        Returns the authenticated account's linked social providers and whether
        it has a password sign-in method. The UI uses this to render link/unlink
        affordances and to decide whether "set password" is offered. Bounded by
        the fixed provider catalogue, so the full set is returned.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The account's sign-in connections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityConnections'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Bounded by the fixed social-provider catalogue, not user-controlled growth.
  # ─────────────────────────────── AuthN: social ────────────────────────────
  /v1/security/social/{provider}/start:
    get:
      tags: [social]
      summary: Begin social login (302)
      operationId: startSocialLogin
      description: >-
        Initiates a server-brokered social login handshake and 302-redirects the
        browser to the social provider's own consent host via a FuzeFront-owned,
        same-host authorize path. No internal identity host is ever exposed. On
        completion the provider returns to `GET /v1/security/social/callback`.
      parameters:
        - name: provider
          in: path
          required: true
          description: Social provider slug. Extensible; `google` is the first supported value.
          schema:
            $ref: '#/components/schemas/SocialProvider'
        - name: redirectTo
          in: query
          required: false
          description: >-
            Optional app-relative path to return to after login completes.
            Must be same-origin; absolute URLs are rejected.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the social provider consent flow.
          headers:
            Location:
              schema: { type: string }
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Redirect action; no collection.
  /v1/security/social/callback:
    get:
      tags: [social]
      summary: Social login broker callback (302 back to app)
      operationId: socialCallback
      description: >-
        The server broker completes the social handshake, provisions/links the
        user, mints a single-use opaque code, and 302-redirects the browser back
        to the app with `?code=<opaque>`. The SPA then calls
        `POST /v1/security/session/exchange`, whose `SessionResult` may itself be
        an `mfa_required` challenge if the account requires step-up. No token is
        placed in the URL.
      parameters:
        - name: code
          in: query
          required: true
          description: Provider authorization code (protocol-level; consumed server-side).
          schema: { type: string }
        - name: state
          in: query
          required: true
          description: Opaque anti-forgery state issued at start.
          schema: { type: string }
      responses:
        '302':
          description: Redirect back to the app with a FuzeFront opaque `?code=`.
          headers:
            Location:
              schema: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Redirect action; no collection.
  /v1/security/social/google/callback:
    get:
      tags: [social]
      summary: Server-brokered Google callback (302 back to app)
      operationId: googleBrokerCallback
      description: >-
        SERVER-BROKERED Google sign-in callback. Google redirects the browser
        here directly (never to an internal identity host). The security service
        exchanges the authorization code with Google server-to-server, validates
        the id_token, provisions/links the user in the identity store, mints a
        single-use opaque code, and 302-redirects back to the app with
        `?code=<opaque>` (or `?linked=<provider>` for a link handshake). On a
        provider error or denied consent it redirects to `/?error=authentication_failed`.
        No token is ever placed in the URL. The exact absolute form of this path
        (`https://app.fuzefront.com/api/v1/security/social/google/callback`) MUST
        be registered as an Authorized redirect URI on FuzeFront's Google OAuth
        client, or Google rejects the handshake.
      parameters:
        - name: code
          in: query
          required: false
          description: Google authorization code (protocol-level; consumed server-side).
          schema: { type: string }
        - name: state
          in: query
          required: false
          description: Opaque anti-forgery state issued at start.
          schema: { type: string }
        - name: error
          in: query
          required: false
          description: Present when Google reports an error (e.g. access_denied).
          schema: { type: string }
      responses:
        '302':
          description: Redirect back to the app with an opaque `?code=`, `?linked=`, or `?error=`.
          headers:
            Location:
              schema: { type: string }
      x-pagination: exempt
      x-pagination-reason: Redirect action; no collection.
  # ─────────────────────────────── AuthN: signup ────────────────────────────
  /v1/security/signup:
    post:
      tags: [signup]
      summary: Create an account (server-brokered)
      operationId: signup
      description: >-
        Server-brokered account creation via the configured identity provider.
        The user only ever sees FuzeFront-branded UI — never a provider's raw
        enrollment page. On success a session may be established directly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Account created; session established.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: An account with that email already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'
      x-pagination: exempt
      x-pagination-reason: Singleton account-creation action.
  # ─────────────────────────── AuthN: capabilities ──────────────────────────
  /v1/security/methods:
    get:
      tags: [capabilities]
      summary: Auth capability descriptor
      operationId: getAuthMethods
      description: >-
        Neutral capability descriptor for the auth surface. Replaces the legacy
        vendor-specific `oidcConfigured` boolean. Lets the UI render the right
        affordances (password form, social buttons) without knowing any provider.
      responses:
        '200':
          description: The configured auth capabilities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMethods'
      x-pagination: exempt
      x-pagination-reason: Singleton capability descriptor.
  # ─────────────────────────────── AuthZ: checks ────────────────────────────
  /v1/security/authz/check:
    post:
      tags: [authz]
      summary: Authorization check (single)
      operationId: authzCheck
      description: >-
        Returns whether `subject` may perform `action` on `resource` within
        `tenant`. Fail-closed: any provider/transport error returns
        `{ allow: false }` (never an exception surfaced as allow).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthzCheckRequest'
      responses:
        '200':
          description: The decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzDecision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton decision.
  /v1/security/authz/bulk-check:
    post:
      tags: [authz]
      summary: Authorization check (bulk)
      operationId: authzBulkCheck
      description: >-
        Evaluates an ordered list of checks and returns decisions in the same
        order. Fail-closed per element. The number of decisions equals the
        number of requested checks. Bounded by the caller-supplied input array
        (`maxItems`), so no server-side pagination applies.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthzBulkCheckRequest'
      responses:
        '200':
          description: Decisions, index-aligned with the request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzBulkDecision'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: >-
        Response is index-aligned to the caller-supplied, bounded (maxItems)
        request array — not an unbounded server-side collection.
  /v1/security/authz/permissions:
    get:
      tags: [authz]
      summary: Effective permissions for a subject in a tenant
      operationId: getPermissions
      description: >-
        Returns the effective permission set for `subject` scoped to `tenant`.
        The permission set for a single subject within one tenant is bounded by
        the policy model (a fixed catalogue of resource/action pairs), not by
        user-controlled data growth, so it is returned whole.
      security:
        - bearerAuth: []
      parameters:
        - name: subject
          in: query
          required: true
          schema: { type: string }
        - name: tenant
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: The effective permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionSet'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: >-
        Bounded by the policy model (fixed resource/action catalogue for one
        subject in one tenant), not by user-controlled data growth.
  # ─────────────────────────────── AuthZ: grants ────────────────────────────
  /v1/security/authz/grants:
    post:
      tags: [authz]
      summary: Grant a role/permission to a subject (RBAC or resource-instance/ReBAC)
      operationId: createGrant
      description: >-
        Grants a role (and/or permission) to a subject within a tenant. Omit
        `resource` for a tenant-wide (RBAC) grant; include `resource: { type,
        key }` to scope it to a specific resource instance (ReBAC). Returns the
        created `Grant`. A grant is a rollout/assignment convenience — the
        AUTHORITATIVE decision is always `POST /authz/check`. Fail-closed.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantRequest'
      responses:
        '201':
          description: Grant created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton grant creation.
    delete:
      tags: [authz]
      summary: Revoke a grant
      operationId: revokeGrant
      description: >-
        Revokes a grant, identified EITHER by `{ grantId }` OR by its identity
        tuple `{ subject, tenant, role, resource? }` (supply one form). Idempotent
        — revoking an absent grant still returns 204. A revoke never changes the
        authoritative model beyond removing the assignment; `authz/check` remains
        the source of truth. Fail-closed.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantRevokeRequest'
      responses:
        '204':
          description: Grant revoked (idempotent).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton revoke action.
    get:
      tags: [authz]
      summary: List grants for a subject within a tenant
      operationId: listGrants
      description: >-
        Lists grants for `subject` within `tenant`, optionally filtered by
        resource instance (`resourceType`/`resourceKey`). Because a subject can
        hold grants across MANY resource instances under ReBAC, this set is
        treated as potentially unbounded and is cursor-paginated per the family
        pagination standard.
      security:
        - bearerAuth: []
      parameters:
        - name: subject
          in: query
          required: true
          schema: { type: string }
        - name: tenant
          in: query
          required: true
          schema: { type: string }
        - name: resourceType
          in: query
          required: false
          schema: { type: string }
        - name: resourceKey
          in: query
          required: false
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: A page of grants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  # ─────────────────────────── AuthZ: tenants/members/roles ─────────────────
  /v1/security/tenants:
    get:
      tags: [tenants]
      summary: List tenants visible to the caller
      operationId: listTenants
      description: Unbounded collection — cursor-paginated per the family pagination standard.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: A page of tenants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [tenants]
      summary: Create a tenant
      operationId: createTenant
      description: Creates a new tenant/organization scope.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantCreate'
      responses:
        '201':
          description: Tenant created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton creation.
  /v1/security/tenants/{tenantId}:
    get:
      tags: [tenants]
      summary: Get a tenant
      operationId: getTenant
      description: Returns a single tenant by id.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: The tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton resource.
  /v1/security/tenants/{tenantId}/members:
    get:
      tags: [tenants]
      summary: List members of a tenant
      operationId: listTenantMembers
      description: Unbounded collection — cursor-paginated per the family pagination standard.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: A page of members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [tenants]
      summary: Add a member to a tenant
      operationId: addTenantMember
      description: Adds a user as a member of the tenant, optionally with roles.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberCreate'
      responses:
        '201':
          description: Member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton creation.
  /v1/security/tenants/{tenantId}/members/{userId}:
    delete:
      tags: [tenants]
      summary: Remove a member from a tenant
      operationId: removeTenantMember
      description: Removes a member from the tenant. Idempotent.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Member removed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton mutation.
  /v1/security/tenants/{tenantId}/roles:
    get:
      tags: [tenants]
      summary: List roles defined for a tenant
      operationId: listTenantRoles
      description: >-
        Roles are a bounded, policy-defined catalogue per tenant (not
        user-data-driven), so the full set is returned.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
      responses:
        '200':
          description: The tenant's roles.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
                required: [items]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: >-
        Bounded policy-defined role catalogue per tenant, not user-controlled
        data growth.
  /v1/security/tenants/{tenantId}/members/{userId}/roles:
    put:
      tags: [tenants]
      summary: Assign roles to a member
      operationId: assignMemberRoles
      description: Replaces the member's role assignment within the tenant.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantId'
        - name: userId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleAssignment'
      responses:
        '200':
          description: Roles updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton mutation.
  # ─────────────────────────────── M2M tokens ───────────────────────────────
  /v1/security/tokens:
    post:
      tags: [tokens]
      summary: Issue an M2M token
      operationId: issueToken
      description: >-
        Issues a FuzeFront-owned machine-to-machine token for a provisioned
        service client (client-credentials style). The issuing identity provider
        is hidden behind the adapter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenIssueRequest'
      responses:
        '200':
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenIssueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton token issuance.
  /v1/security/tokens/introspect:
    post:
      tags: [tokens]
      summary: Introspect an M2M token
      operationId: introspectToken
      description: >-
        Returns the active state and normalized claims for a presented M2M
        token. Fail-closed: an unknown/expired token returns `{ active: false }`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenIntrospectRequest'
      responses:
        '200':
          description: Introspection result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenIntrospection'
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Singleton introspection.
  # ─────────────────────────────── MFA: factors ─────────────────────────────
  /v1/security/mfa/factors:
    get:
      tags: [mfa]
      summary: List the current user's enrolled MFA factors
      operationId: listMfaFactors
      description: >-
        Returns the caller's enrolled factors. Bounded per user (a person has a
        handful of factors), so the full set is returned.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The enrolled factors.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/MfaFactor'
                required: [items]
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Bounded per-user factor set, not user-controlled data growth.
    post:
      tags: [mfa]
      summary: Begin enrolling an MFA factor
      operationId: enrollMfaFactor
      description: >-
        Starts enrollment of a factor. For `totp` the response returns a
        provisioning URI + secret (render as a QR); for `sms`/`email` a code is
        sent and a pending `factorId` is returned. Confirm via
        `POST /mfa/factors/{factorId}/activate`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaEnrollRequest'
      responses:
        '201':
          description: Enrollment started (pending activation).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaEnrollResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton enrollment action.
  /v1/security/mfa/factors/{factorId}/activate:
    post:
      tags: [mfa]
      summary: Activate a pending MFA factor
      operationId: activateMfaFactor
      description: Confirms a pending factor with a one-time code. Fail-closed on bad/expired code.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FactorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaCodeRequest'
      responses:
        '200':
          description: Factor activated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaFactor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton activation action.
  /v1/security/mfa/factors/{factorId}:
    delete:
      tags: [mfa]
      summary: Remove an MFA factor
      operationId: removeMfaFactor
      description: Removes an enrolled factor. Idempotent.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FactorId'
      responses:
        '204':
          description: Factor removed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
      x-pagination: exempt
      x-pagination-reason: Singleton mutation.
  /v1/security/mfa/recovery-codes:
    post:
      tags: [mfa]
      summary: (Re)generate one-time recovery codes
      operationId: regenerateRecoveryCodes
      description: >-
        Generates a fresh set of single-use recovery codes, invalidating any
        prior set. The codes are returned ONCE and never retrievable again.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The newly generated recovery codes (shown once).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryCodes'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton generation; codes shown once.
  # ─────────────────────────────── MFA: step-up ─────────────────────────────
  /v1/security/mfa/challenge:
    post:
      tags: [mfa]
      summary: Trigger an MFA challenge during login step-up
      operationId: challengeMfa
      description: >-
        Given a `challengeId` (from an `mfa_required` `SessionResult`) and a
        chosen `factorId`, triggers delivery (SMS/email OTP) or signals a TOTP
        prompt. Then call `POST /mfa/verify`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaChallengeRequest'
      responses:
        '202':
          description: Challenge dispatched (or TOTP prompt expected).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaChallengeAck'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton challenge action.
  /v1/security/mfa/verify:
    post:
      tags: [mfa]
      summary: Verify an MFA challenge and complete login
      operationId: verifyMfa
      description: >-
        Verifies the one-time `code` for a `challengeId`/`factorId`. On success
        returns the authenticated `LoginResponse`. Fail-closed on bad/expired code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA satisfied; authenticated session returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton verification action.
  # ──────────────────────── Contact verification: email ─────────────────────
  /v1/security/verify/email/start:
    post:
      tags: [verify]
      summary: Send an email verification link/code
      operationId: startEmailVerification
      description: >-
        Sends a verification link/code. Targets the current user's email when
        authenticated, or a signup-scoped address supplied in the body.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerifyStartRequest'
      responses:
        '202':
          description: Verification message dispatched.
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Singleton send action.
  /v1/security/verify/email/confirm:
    post:
      tags: [verify]
      summary: Confirm email ownership
      operationId: confirmEmailVerification
      description: Confirms via `{ token }` (link) or `{ code }` (OTP). Fail-closed on invalid/expired.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyConfirmRequest'
      responses:
        '200':
          description: Email marked verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Singleton confirmation action.
  # ──────────────────────── Contact verification: phone ─────────────────────
  /v1/security/verify/phone/start:
    post:
      tags: [verify]
      summary: Send an SMS verification code
      operationId: startPhoneVerification
      description: Sends an SMS OTP to the supplied phone number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerifyStartRequest'
      responses:
        '202':
          description: SMS code dispatched.
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Singleton send action.
  /v1/security/verify/phone/confirm:
    post:
      tags: [verify]
      summary: Confirm phone ownership
      operationId: confirmPhoneVerification
      description: Confirms `{ phone, code }`. Fail-closed on invalid/expired code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerifyConfirmRequest'
      responses:
        '200':
          description: Phone marked verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
      x-pagination: exempt
      x-pagination-reason: Singleton confirmation action.
  /v1/security/verify/status:
    get:
      tags: [verify]
      summary: Contact verification status for the current user
      operationId: getVerificationStatus
      description: Returns the caller's email/phone verification state.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The verification status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-pagination: exempt
      x-pagination-reason: Singleton status for the caller.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        `Authorization: Bearer <token>`. A FuzeFront-minted session or M2M
        token, verified server-side. Consumers depend on the normalized
        `Identity`, never the raw claims.
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: Max items per page. Clamped server-side to the maximum.
      schema:
        type: integer
        default: 50
        maximum: 200
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque, server-issued cursor for the next page. Omit for the first page.
      schema:
        type: string
    TenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
    FactorId:
      name: factorId
      in: path
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Authentication failed (fail-closed).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
  schemas:
    # ── AuthN request/response shapes (kept compatible with today's @fuzefront/auth) ──
    LoginRequest:
      type: object
      description: Password login credentials. Shape-compatible with today's login.
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    LoginResponse:
      type: object
      description: >-
        Session established. Kept shape-compatible with today's login response
        (adds `sessionId`) so the frontend rename is mechanical.
      properties:
        token:
          type: string
          description: FuzeFront-minted session token.
        sessionId:
          type: string
          description: Server session identifier.
        user:
          $ref: '#/components/schemas/User'
      required: [token, user]
    SessionResult:
      description: >-
        The outcome of a login/exchange attempt: EITHER an authenticated session
        OR an MFA-required challenge. Discriminated by `status`.
      oneOf:
        - $ref: '#/components/schemas/AuthenticatedSession'
        - $ref: '#/components/schemas/MfaRequiredChallenge'
      discriminator:
        propertyName: status
        mapping:
          authenticated: '#/components/schemas/AuthenticatedSession'
          mfa_required: '#/components/schemas/MfaRequiredChallenge'
    AuthenticatedSession:
      type: object
      description: >-
        Authenticated variant of `SessionResult`. Carries the same fields as
        `LoginResponse` plus the `status` discriminator, so a client that only
        needs the session reads `token`/`sessionId`/`user` directly.
      properties:
        status:
          type: string
          enum: [authenticated]
        token:
          type: string
          description: FuzeFront-minted session token.
        sessionId:
          type: string
        user:
          $ref: '#/components/schemas/User'
      required: [status, token, user]
    MfaRequiredChallenge:
      type: object
      description: >-
        MFA-required variant of `SessionResult`. The client picks a factor and
        completes step-up via `/mfa/challenge` + `/mfa/verify`, referencing
        `challengeId`.
      properties:
        status:
          type: string
          enum: [mfa_required]
        challengeId:
          type: string
        factors:
          type: array
          items:
            $ref: '#/components/schemas/MfaFactorRef'
      required: [status, challengeId, factors]
    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        tenantName:
          type: string
          description: Optional tenant/organization name to provision on signup.
      required: [email, password]
    ExchangeRequest:
      type: object
      properties:
        code:
          type: string
          description: The single-use opaque code from the social callback redirect.
      required: [code]
    SessionInfo:
      type: object
      description: Current identity plus hydrated user.
      properties:
        identity:
          $ref: '#/components/schemas/Identity'
        user:
          $ref: '#/components/schemas/User'
      required: [identity, user]
    AuthMethods:
      type: object
      description: >-
        Neutral auth capability descriptor. Replaces `oidcConfigured`. Lets the
        UI render affordances (password form, social buttons, MFA, contact
        verification) without knowing any provider.
      properties:
        password:
          type: boolean
          description: Whether password login/signup is available.
        social:
          type: array
          description: Enabled social provider slugs (may be empty).
          items:
            $ref: '#/components/schemas/SocialProvider'
        mfa:
          type: object
          description: Multi-factor capability.
          properties:
            enabled:
              type: boolean
            types:
              type: array
              items:
                $ref: '#/components/schemas/MfaFactorType'
          required: [enabled, types]
        verification:
          type: object
          description: Contact-verification capability.
          properties:
            email:
              type: boolean
            sms:
              type: boolean
          required: [email, sms]
      required: [password, social, mfa, verification]
    SocialProvider:
      type: string
      description: Supported social provider slug. Extensible; `google` is first.
      enum: [google]
    User:
      type: object
      description: Hydrated user (source of out-of-band role/tenant resolution).
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        defaultAppId:
          type: string
        roles:
          type: array
          items:
            type: string
      required: [id, email, roles]
    Identity:
      type: object
      description: >-
        The STABLE normalized identity, invariant across token-format
        migrations. Mirrors the TypeScript `Identity` interface in
        `@fuzefront/security-client`. Provider-neutral.
      properties:
        userId:
          type: string
          description: Stable subject id. Always present.
        tenantId:
          type: [string, 'null']
          description: >-
            Tenant/org scope. May be null in legacy token mode when unresolved.
            Consumers fail-closed on tenant-scoped authz when null.
        roles:
          type: array
          items:
            type: string
          description: Always an array; empty means "no roles known".
        email:
          type: string
        authMode:
          type: string
          enum: [legacy-hs256, federated-jwks]
        issuedAt:
          type: integer
        expiresAt:
          type: integer
        issuer:
          type: string
      required: [userId, tenantId, roles, authMode]
    # ── AuthZ shapes ──
    AuthzCheckRequest:
      type: object
      properties:
        subject:
          type: string
          description: The principal id (user or service client).
        tenant:
          type: string
          description: Tenant/org scope for the decision.
        resource:
          $ref: '#/components/schemas/ResourceRef'
        action:
          type: string
        context:
          type: object
          additionalProperties: true
      required: [subject, tenant, resource, action]
    ResourceRef:
      type: object
      properties:
        type:
          type: string
        key:
          type: string
          description: Optional specific resource instance key.
      required: [type]
    AuthzDecision:
      type: object
      properties:
        allow:
          type: boolean
      required: [allow]
    AuthzBulkCheckRequest:
      type: object
      properties:
        checks:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: '#/components/schemas/AuthzCheckRequest'
      required: [checks]
    AuthzBulkDecision:
      type: object
      properties:
        decisions:
          type: array
          description: Index-aligned with the request `checks`.
          items:
            $ref: '#/components/schemas/AuthzDecision'
      required: [decisions]
    PermissionSet:
      type: object
      properties:
        subject:
          type: string
        tenant:
          type: string
        permissions:
          type: array
          description: Effective `resource:action` grants.
          items:
            type: string
      required: [subject, tenant, permissions]
    GrantRequest:
      type: object
      description: >-
        Grant a role (and/or permission) to a subject. Omit `resource` for a
        tenant-wide (RBAC) grant; include it to scope to a resource instance
        (ReBAC).
      properties:
        subject:
          type: string
        tenant:
          type: string
        role:
          type: string
          description: Role key to assign.
        permission:
          type: string
          description: Optional explicit `resource:action` permission to grant alongside the role.
        resource:
          $ref: '#/components/schemas/ResourceRef'
      required: [subject, tenant, role]
    Grant:
      type: object
      description: A created, revocable grant wrapping the provider's assignment.
      properties:
        id:
          type: string
        subject:
          type: string
        tenant:
          type: string
        role:
          type: string
        permission:
          type: string
        resource:
          $ref: '#/components/schemas/ResourceRef'
        createdAt:
          type: integer
      required: [id, subject, tenant, role]
    GrantRevokeRequest:
      type: object
      description: >-
        Revoke a grant by `grantId` OR by its identity tuple
        `{ subject, tenant, role, resource? }`. Supply exactly one form.
      properties:
        grantId:
          type: string
        subject:
          type: string
        tenant:
          type: string
        role:
          type: string
        resource:
          $ref: '#/components/schemas/ResourceRef'
    GrantPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Grant'
        page:
          $ref: '#/components/schemas/PageInfo'
      required: [items, page]
    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
      required: [id, name]
    TenantCreate:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
      required: [name]
    Member:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
      required: [userId, roles]
    MemberCreate:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
      required: []
    Role:
      type: object
      properties:
        key:
          type: string
        name:
          type: string
      required: [key]
    RoleAssignment:
      type: object
      properties:
        roles:
          type: array
          items:
            type: string
      required: [roles]
    # ── M2M shapes ──
    TokenIssueRequest:
      type: object
      properties:
        clientId:
          type: string
        clientSecret:
          type: string
        scope:
          type: string
      required: [clientId, clientSecret]
    TokenIssueResponse:
      type: object
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          description: Lifetime in seconds.
        scope:
          type: string
      required: [accessToken, tokenType, expiresIn]
    TokenIntrospectRequest:
      type: object
      properties:
        token:
          type: string
      required: [token]
    TokenIntrospection:
      type: object
      description: Fail-closed introspection result.
      properties:
        active:
          type: boolean
        subject:
          type: string
        tenantId:
          type: [string, 'null']
        scope:
          type: string
        expiresAt:
          type: integer
      required: [active]
    # ── MFA shapes ──
    MfaFactorType:
      type: string
      description: Neutral factor type. Extensible; `webauthn` reserved for later.
      enum: [totp, sms, email, webauthn]
    MfaFactorStatus:
      type: string
      enum: [pending, active]
    MfaFactor:
      type: object
      properties:
        factorId:
          type: string
        type:
          $ref: '#/components/schemas/MfaFactorType'
        status:
          $ref: '#/components/schemas/MfaFactorStatus'
        label:
          type: string
          description: Neutral display hint (e.g. masked phone/email), never a provider name.
        createdAt:
          type: integer
      required: [factorId, type, status]
    MfaFactorRef:
      type: object
      description: Minimal factor reference offered in an MFA challenge.
      properties:
        factorId:
          type: string
        type:
          $ref: '#/components/schemas/MfaFactorType'
      required: [factorId, type]
    MfaEnrollRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/MfaFactorType'
        phone:
          type: string
          description: Required when `type` is `sms`.
        email:
          type: string
          format: email
          description: Required when `type` is `email`.
      required: [type]
    MfaEnrollResult:
      type: object
      description: >-
        Enrollment material. For `totp`, `secret` + `provisioningUri` are
        present (render a QR). For `sms`/`email`, a code was sent and the factor
        is pending.
      properties:
        factorId:
          type: string
        type:
          $ref: '#/components/schemas/MfaFactorType'
        status:
          $ref: '#/components/schemas/MfaFactorStatus'
        secret:
          type: string
          description: TOTP shared secret (present only for `totp`).
        provisioningUri:
          type: string
          description: otpauth:// URI for QR rendering (present only for `totp`).
        codeSent:
          type: boolean
          description: Whether an OTP was dispatched (present for `sms`/`email`).
      required: [factorId, type, status]
    MfaCodeRequest:
      type: object
      properties:
        code:
          type: string
      required: [code]
    RecoveryCodes:
      type: object
      properties:
        codes:
          type: array
          items:
            type: string
      required: [codes]
    MfaChallengeRequest:
      type: object
      properties:
        challengeId:
          type: string
        factorId:
          type: string
      required: [challengeId, factorId]
    MfaChallengeAck:
      type: object
      properties:
        challengeId:
          type: string
        factorId:
          type: string
        delivered:
          type: boolean
          description: True when an OTP was dispatched; false/omitted for TOTP prompts.
      required: [challengeId, factorId]
    MfaVerifyRequest:
      type: object
      properties:
        challengeId:
          type: string
        factorId:
          type: string
        code:
          type: string
      required: [challengeId, factorId, code]
    # ── Contact verification shapes ──
    EmailVerifyStartRequest:
      type: object
      description: Optional body; omit when verifying the authenticated user's email.
      properties:
        email:
          type: string
          format: email
          description: Signup-scoped address to verify when unauthenticated.
    PhoneVerifyStartRequest:
      type: object
      properties:
        phone:
          type: string
      required: [phone]
    VerifyConfirmRequest:
      type: object
      description: Confirm with a link `token` OR an OTP `code`.
      properties:
        token:
          type: string
        code:
          type: string
    PhoneVerifyConfirmRequest:
      type: object
      properties:
        phone:
          type: string
        code:
          type: string
      required: [phone, code]
    VerificationStatus:
      type: object
      properties:
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        phone:
          type: string
      required: [emailVerified, phoneVerified]
    # ── Account: password reset / set-password shapes ──
    PasswordResetRequest:
      type: object
      description: Self-service password-reset request. Response never reveals account existence.
      properties:
        email:
          type: string
          format: email
      required: [email]
    PasswordResetConfirmRequest:
      type: object
      description: Complete a password reset with the single-use token from the reset message.
      properties:
        token:
          type: string
          description: Single-use, short-lived reset token from the dispatched message.
        newPassword:
          type: string
          description: The new password; must satisfy the account password policy.
      required: [token, newPassword]
    PasswordResetResult:
      type: object
      description: Outcome of a successful password reset.
      properties:
        reset:
          type: boolean
          description: Always true on success.
      required: [reset]
    SetPasswordRequest:
      type: object
      description: Set/add a password on an account that has no password sign-in method yet.
      properties:
        newPassword:
          type: string
          description: The password to set; must satisfy the account password policy.
      required: [newPassword]
    # ── Sessions: device-management shapes ──
    SessionDevice:
      type: object
      description: >-
        One active session for the current user, describing the device/agent it
        was established from. `current: true` marks the session making the request.
      properties:
        id:
          type: string
          description: Session id; pass to `DELETE /v1/security/sessions/{id}` to revoke.
        device:
          type: [string, 'null']
          description: Best-effort device descriptor (e.g. "iPhone", "Desktop"), or null.
        browser:
          type: [string, 'null']
          description: Best-effort browser name, or null.
        os:
          type: [string, 'null']
          description: Best-effort OS name, or null.
        ip:
          type: [string, 'null']
          description: Source IP recorded for the session, or null.
        geo:
          type: [string, 'null']
          description: Best-effort coarse geolocation label (e.g. city/country), or null.
        lastSeenAt:
          type: integer
          description: Epoch millis of the session's most recent activity.
        current:
          type: boolean
          description: True for the session making this request.
      required: [id, current]
    # ── Account: social linking / connections shapes ──
    SocialLinkStart:
      type: object
      description: >-
        Result of beginning a social-link handshake. The SPA navigates the
        browser to `redirectUrl` (the same-host authorize path); the browser
        never sees an internal identity host.
      properties:
        redirectUrl:
          type: string
          description: Same-origin/consent-host URL to navigate to in order to continue linking.
      required: [redirectUrl]
    SocialConnection:
      type: object
      description: A linked social sign-in connection on the account.
      properties:
        provider:
          $ref: '#/components/schemas/SocialProvider'
        linkedAt:
          type: integer
          description: Epoch millis when the provider was linked.
      required: [provider]
    IdentityConnections:
      type: object
      description: >-
        The account's sign-in connections: which social providers are linked and
        whether a password sign-in method exists. Drives link/unlink and
        set-password affordances in the UI.
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/SocialConnection'
        hasPassword:
          type: boolean
          description: Whether the account has a password sign-in method.
      required: [providers, hasPassword]
    # ── Pagination envelopes (family standard) ──
    PageInfo:
      type: object
      description: Cursor-pagination page metadata (family standard).
      properties:
        nextCursor:
          type: [string, 'null']
          description: Opaque cursor for the next page; null on the last page.
        hasMore:
          type: boolean
        total:
          type: integer
          description: Optional; omitted when counting the full set is expensive.
      required: [nextCursor, hasMore]
    TenantPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Tenant'
        page:
          $ref: '#/components/schemas/PageInfo'
      required: [items, page]
    MemberPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Member'
        page:
          $ref: '#/components/schemas/PageInfo'
      required: [items, page]
    # ── Errors ──
    ErrorBody:
      type: object
      description: Stable error body. Fail-closed; provider-neutral codes.
      properties:
        error:
          type: string
        code:
          type: string
          enum:
            - NO_TOKEN
            - MALFORMED
            - INVALID_SIGNATURE
            - EXPIRED
            - NOT_ACTIVE
            - INVALID_ISSUER
            - INVALID_AUDIENCE
            - MISSING_CLAIM
            - JWKS_UNAVAILABLE
            - VERIFIER_UNAVAILABLE
            - INVALID_CREDENTIALS
            - INVALID_CODE
            - CONFLICT
            - FORBIDDEN
            - NOT_FOUND
            - PROVIDER_UNAVAILABLE
            - UNKNOWN
      required: [error, code]
