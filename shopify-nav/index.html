<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#004c3f" />
<title>Shopify Navigator</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="favicon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Shopify Nav" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green: #008060;
    --green-dark: #004c3f;
    --green-light: #f0fdf7;
    --ink: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #f3f4f6;
  }
  html, body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    overscroll-behavior-y: none;
  }
  body {
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    position: relative;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea { font-family: inherit; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    padding: calc(20px + env(safe-area-inset-top)) 20px 30px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: ""; position: absolute; top: -30px; left: -30px; pointer-events: none;
    width: 140px; height: 140px; background: rgba(255,255,255,0.05); border-radius: 50%;
  }
  .header::after {
    content: ""; position: absolute; bottom: -40px; right: -10px; pointer-events: none;
    width: 100px; height: 100px; background: rgba(255,255,255,0.04); border-radius: 50%;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; position: relative; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    background: rgba(255,255,255,0.15); border-radius: 10px; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .brand h1 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .brand p { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }
  .gear {
    background: rgba(255,255,255,0.15); border: none; border-radius: 10px;
    width: 38px; height: 38px; color: #fff; font-size: 18px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }

  /* Body */
  .body { padding: 16px 16px 40px; }

  /* Search */
  .search {
    background: #fff; border-radius: 14px; padding: 5px; display: flex; gap: 5px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1); margin-top: -18px; position: relative;
  }
  .search input {
    flex: 1; border: none; outline: none; padding: 12px 14px; font-size: 16px;
    background: transparent; color: var(--ink);
  }
  .search button {
    background: var(--green); color: #fff; border: none; border-radius: 10px;
    padding: 0 18px; font-weight: 700; font-size: 20px; min-width: 48px;
    display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .search button:disabled { background: #cbd5e1; }
  .search button:active:not(:disabled) { background: var(--green-dark); }
  html[dir="ltr"] .search button .arrow { transform: scaleX(-1); }

  /* Examples */
  .examples { margin-top: 16px; }
  .examples .label { font-size: 12px; color: var(--muted); margin: 0 2px 8px; font-weight: 600; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip {
    background: #fff; border: 1.5px solid var(--border); border-radius: 20px;
    padding: 7px 13px; font-size: 13px; color: #374151;
  }
  .chip:active { background: var(--green-light); border-color: var(--green); }

  /* Loading */
  .loading { text-align: center; padding: 48px 20px; }
  .spinner {
    width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--green);
    border-radius: 50%; margin: 0 auto 14px; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: var(--muted); font-size: 14px; }

  /* Empty */
  .empty { text-align: center; padding: 40px 24px; color: #9ca3af; }
  .empty .big { font-size: 52px; margin-bottom: 14px; }
  .empty .t { font-size: 16px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
  .empty .s { font-size: 13px; line-height: 1.5; }

  /* Results */
  .result-title {
    background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px;
    animation: fadeIn .3s ease;
  }
  .result-title .ico { background: var(--green-light); border-radius: 9px; padding: 9px; font-size: 18px; }
  .result-title .tag { font-size: 11px; color: var(--green); font-weight: 700; margin-bottom: 2px; }
  .result-title .txt { font-size: 17px; font-weight: 700; }

  .step {
    background: #fff; border-radius: 12px; padding: 13px 14px 10px; margin-bottom: 7px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05); animation: fadeIn .3s ease backwards;
  }
  .step-main { display: flex; gap: 12px; align-items: flex-start; }
  .step .num {
    background: var(--green); color: #fff; border-radius: 50%; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px;
    flex-shrink: 0; margin-top: 1px;
  }
  .step .action { font-weight: 600; font-size: 15px; line-height: 1.45; }
  .step .where { font-size: 12px; color: var(--green); margin-top: 4px; font-weight: 500; }
  .step .detail { font-size: 13px; color: #555; margin-top: 5px; line-height: 1.55; }
  .stuck-btn {
    margin: 8px 0 0 40px; background: none; border: none; color: #9ca3af;
    font-size: 12px; font-weight: 600; padding: 4px 0; display: inline-flex; align-items: center; gap: 4px;
  }
  .stuck-btn:active { color: var(--green); }

  .callout {
    border-radius: 12px; padding: 13px 15px; margin-bottom: 8px; animation: fadeIn .3s ease;
  }
  .callout.tip { background: linear-gradient(135deg, #f0fdf7, #e8f9f3); border: 1px solid #a7f3d0; }
  .callout.shortcut { background: #fafafa; border: 1px solid var(--border); }
  .callout .ch { font-size: 11px; font-weight: 700; margin-bottom: 5px; }
  .callout.tip .ch { color: var(--green); }
  .callout.shortcut .ch { color: var(--muted); }
  .callout .cb { font-size: 13px; line-height: 1.55; color: #1a1a1a; }

  .again {
    width: 100%; background: #fff; border: 2px solid var(--green); border-radius: 12px;
    padding: 13px; color: var(--green); font-weight: 700; font-size: 14px; margin-top: 8px;
  }
  .again:active { background: var(--green-light); }

  .err {
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px;
    padding: 14px; color: #dc2626; font-size: 14px; line-height: 1.5;
  }
  .cached-badge {
    display: inline-block; font-size: 10px; background: #eef2ff; color: #4f46e5;
    padding: 2px 8px; border-radius: 10px; margin: 0 8px; font-weight: 600; vertical-align: middle;
  }
  .scope-note {
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
    padding: 12px 14px; margin-bottom: 10px; font-size: 13px; line-height: 1.55; color: #92400e;
    animation: fadeIn .3s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* Bottom sheet (settings + stuck + wizard) */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex;
    align-items: flex-end; justify-content: center; z-index: 100; animation: fadeIn .2s;
  }
  .sheet {
    background: #fff; width: 100%; max-width: 520px; border-radius: 20px 20px 0 0;
    padding: 22px 20px calc(20px + env(safe-area-inset-bottom));
    animation: slideUp .28s ease; max-height: 92vh; max-height: 92dvh;
    display: flex; flex-direction: column;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
  .sheet h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .sheet .desc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 16px; }
  .sheet label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .sheet input[type=password], .sheet input[type=text] {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px;
    font-size: 15px; outline: none; direction: ltr; text-align: left;
  }
  .sheet input:focus, .sheet textarea:focus { border-color: var(--green); }
  .sheet .hint { font-size: 11px; color: #9ca3af; margin-top: 6px; line-height: 1.5; }
  .sheet .hint a { color: var(--green); }
  .sheet-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; margin: 0 -4px; padding: 0 4px; }
  .settings-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
  .settings-section > label:first-child { font-size: 13px; font-weight: 700; color: var(--ink); }
  .sheet-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary {
    flex: 1; background: var(--green); color: #fff; border: none; border-radius: 11px;
    padding: 13px; font-weight: 700; font-size: 15px;
  }
  .btn-primary:active { background: var(--green-dark); }
  .btn-primary:disabled { background: #cbd5e1; }
  .btn-ghost {
    background: #fff; color: var(--muted); border: 1.5px solid var(--border); border-radius: 11px;
    padding: 13px 18px; font-weight: 600; font-size: 15px;
  }
  .model-row { display: flex; gap: 8px; margin-top: 14px; }
  .model-opt {
    flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 8px;
    text-align: center; font-size: 12px; font-weight: 600; color: #374151; background: #fff;
  }
  .model-opt.sel { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .model-opt small { display: block; font-size: 10px; color: var(--muted); font-weight: 400; margin-top: 2px; }

  /* Language grid */
  .lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px; }
  .lang-opt {
    border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 8px;
    font-size: 13px; font-weight: 600; color: #374151; background: #fff; text-align: center;
  }
  .lang-opt.sel { border-color: var(--green); background: var(--green-light); color: var(--green); }

  /* Store scan */
  .scan-row { display: flex; gap: 8px; margin-top: 10px; }
  .scan-row button {
    background: var(--green); color: #fff; border: none; border-radius: 10px;
    padding: 0 16px; font-weight: 700; font-size: 14px; white-space: nowrap; min-height: 40px;
  }
  .scan-row button:disabled { background: #cbd5e1; }
  .scan-status { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .scan-status.ok { color: var(--green); }
  .scan-status.err { color: #dc2626; }
  .scan-mini-spin {
    display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border);
    border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite;
    vertical-align: middle; margin-inline-end: 6px;
  }

  /* Stuck sheet specifics */
  .sheet-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .sheet-close {
    background: #f3f4f6; border: none; border-radius: 50%; width: 32px; height: 32px;
    font-size: 16px; color: var(--muted); flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .stuck-ctx {
    background: var(--green-light); border: 1px solid #a7f3d0; border-radius: 10px;
    padding: 10px 12px; margin-bottom: 14px; font-size: 13px; line-height: 1.5;
  }
  .stuck-ctx b { color: var(--green-dark); }
  .convo { overflow-y: auto; flex: 1; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
  .convo:empty { display: none; }
  .bubble-user {
    background: var(--green); color: #fff; border-radius: 14px 14px 4px 14px;
    padding: 10px 13px; margin: 0 0 10px auto; max-width: 85%; font-size: 14px; line-height: 1.5;
    width: fit-content;
  }
  .bubble-user img { max-width: 100%; border-radius: 8px; margin-top: 6px; display: block; }
  .bubble-ai {
    background: #f9fafb; border: 1px solid var(--border); border-radius: 14px 14px 14px 4px;
    padding: 12px 14px; margin-bottom: 10px; max-width: 92%; animation: fadeIn .25s ease;
  }
  .bubble-ai .diag { font-size: 14px; line-height: 1.55; color: var(--ink); margin-bottom: 10px; }
  .bubble-ai .hstep { display: flex; gap: 9px; margin-bottom: 8px; align-items: flex-start; }
  .bubble-ai .hstep .d {
    width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-top: 7px; flex-shrink: 0;
  }
  .bubble-ai .hstep .a { font-size: 14px; line-height: 1.5; }
  .bubble-ai .hstep .a small { display: block; color: var(--muted); font-size: 12px; margin-top: 2px; line-height: 1.5; }
  .bubble-ai .hnote {
    font-size: 12px; color: var(--muted); background: #fff; border-radius: 8px;
    padding: 8px 10px; margin-top: 4px; line-height: 1.5;
  }
  .stuck-mini-spin { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .stuck-mini-spin .sp {
    width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--green);
    border-radius: 50%; animation: spin .8s linear infinite;
  }
  .stuck-input textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 11px 13px;
    font-size: 15px; outline: none; resize: none; line-height: 1.5; min-height: 46px;
  }
  .attach-row { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  .attach-btn {
    background: #fff; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font-size: 13px; font-weight: 600; color: #374151; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .attach-btn:active { border-color: var(--green); color: var(--green); }
  .send-btn {
    flex: 1; background: var(--green); color: #fff; border: none; border-radius: 10px;
    padding: 11px; font-weight: 700; font-size: 15px;
  }
  .send-btn:active { background: var(--green-dark); }
  .send-btn:disabled { background: #cbd5e1; }
  .preview-wrap { position: relative; margin-top: 8px; display: inline-block; }
  .preview-wrap img { max-height: 90px; border-radius: 8px; border: 1px solid var(--border); display: block; }
  .preview-x {
    position: absolute; top: -7px; inset-inline-start: -7px; background: #dc2626; color: #fff; border: 2px solid #fff;
    border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center;
  }

  /* Product wizard */
  .wiz-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; margin: 0 -4px 4px; padding: 4px; }
  .wiz-intro { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 14px; }
  .idea-card {
    background: #fff; border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px;
    margin-bottom: 8px; text-align: start; width: 100%; display: block;
  }
  .idea-card:active { border-color: var(--green); background: var(--green-light); }
  .idea-badge {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px;
    margin-bottom: 5px;
  }
  .idea-badge.classic { background: #eef2ff; color: #4f46e5; }
  .idea-badge.unique { background: #fef3c7; color: #b45309; }
  .idea-badge.trend { background: #fce7f3; color: #be185d; }
  .idea-card .name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .idea-card .why { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .wiz-or { text-align: center; font-size: 12px; color: #9ca3af; margin: 14px 0 8px; font-weight: 600; }
  .wiz-input-box {
    border: 1.5px solid var(--border); border-radius: 12px; padding: 6px; display: flex; gap: 6px; align-items: flex-end;
  }
  .wiz-input-box textarea {
    flex: 1; border: none; outline: none; resize: none; font-size: 15px; padding: 8px 8px;
    line-height: 1.5; min-height: 40px; background: transparent;
  }
  .wiz-plus {
    background: #f3f4f6; border: none; border-radius: 9px; width: 40px; height: 40px; flex-shrink: 0;
    font-size: 20px; color: var(--green); display: flex; align-items: center; justify-content: center;
  }
  .wiz-primary {
    width: 100%; background: var(--green); color: #fff; border: none; border-radius: 11px;
    padding: 13px; font-weight: 700; font-size: 15px; margin-top: 10px;
  }
  .wiz-primary:active { background: var(--green-dark); }
  .wiz-primary:disabled { background: #cbd5e1; }
  .cand-card {
    background: #fff; border: 1.5px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px;
  }
  .cand-card img { width: 100%; max-height: 240px; object-fit: contain; background: #f9fafb; display: block; }
  .cand-body { padding: 12px 14px; }
  .cand-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
  .cand-price { font-size: 18px; font-weight: 800; color: var(--green); margin-top: 6px; }
  .cand-desc { font-size: 13px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .cand-link { font-size: 12px; margin-top: 8px; display: inline-block; color: var(--green); word-break: break-all; }
  .yn-question { font-size: 15px; font-weight: 700; text-align: center; margin: 6px 0 12px; }
  .yn-row { display: flex; gap: 10px; }
  .yn-btn { flex: 1; border-radius: 11px; padding: 14px; font-weight: 700; font-size: 15px; border: none; }
  .yn-yes { background: var(--green); color: #fff; }
  .yn-yes:active { background: var(--green-dark); }
  .yn-no { background: #fff; color: #dc2626; border: 1.5px solid #fecaca; }
  .yn-no:active { background: #fef2f2; }
  .supplier-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0; }
  .supplier-chip {
    background: #fff; border: 1.5px solid var(--border); border-radius: 20px; padding: 9px 15px;
    font-size: 14px; font-weight: 600; color: #374151;
  }
  .supplier-chip.sel { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .prompt-box {
    background: #0f172a; color: #e2e8f0; border-radius: 12px; padding: 14px; font-size: 12px;
    line-height: 1.6; white-space: pre-wrap; word-break: break-word; max-height: 300px; overflow-y: auto;
    direction: ltr; text-align: left; font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  .copy-btn {
    width: 100%; background: var(--green); color: #fff; border: none; border-radius: 11px;
    padding: 14px; font-weight: 700; font-size: 15px; margin-top: 10px;
  }
  .copy-btn:active { background: var(--green-dark); }
  .img-links { margin-top: 14px; }
  .img-links .il-label { font-size: 12px; font-weight: 700; color: #374151; margin-bottom: 6px; }
  .img-links a {
    display: block; font-size: 12px; color: var(--green); word-break: break-all; margin-bottom: 5px;
    direction: ltr; text-align: left;
  }
  .wiz-err {
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 12px;
    padding: 14px; color: #dc2626; font-size: 14px; line-height: 1.5; margin-bottom: 12px;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="header-row">
      <div class="brand">
        <div class="brand-icon">🗺️</div>
        <div>
          <h1>Shopify Navigator</h1>
          <p id="tagline">כתוב מה לעשות — AI יבנה מפה מדויקת</p>
        </div>
      </div>
      <button class="gear" id="gearBtn" aria-label="הגדרות">⚙️</button>
    </div>
  </div>

  <div class="body">
    <div class="search">
      <input id="q" type="text" placeholder="מה אתה רוצה לעשות בשופיפיי?" autocomplete="off" enterkeyhint="search" />
      <button id="goBtn" aria-label="חפש"><span class="arrow">←</span></button>
    </div>
    <div id="content"></div>
  </div>

<script>
const $ = (id) => document.getElementById(id);
const LS_KEY = "sn_api_key";
const LS_MODEL = "sn_model";
const LS_CACHE = "sn_cache";
const LS_SERVER = "sn_server";
const LS_LANG = "sn_lang";
const LS_STORE_URL = "sn_store_url";
const LS_STORE_PROFILE = "sn_store_profile";

/* ============================ i18n ============================ */
const LANGS = [
  { code: "he",    name: "עברית",          dir: "rtl", ai: "Hebrew" },
  { code: "en-US", name: "English (US)",    dir: "ltr", ai: "English" },
  { code: "ru",    name: "Русский",         dir: "ltr", ai: "Russian" },

function getLang() {
  const saved = localStorage.getItem(LS_LANG);
  if (saved && I18N[saved]) return saved;
  const nav = (navigator.language || navigator.userLanguage || "he");
  let m = LANGS.find(l => l.code.toLowerCase() === nav.toLowerCase());
  if (!m) { const base = nav.split("-")[0].toLowerCase(); m = LANGS.find(l => l.code.split("-")[0].toLowerCase() === base); }
  return m ? m.code : "he";
}
function langMeta(code) { return LANGS.find(l => l.code === code) || LANGS[0]; }
function setLang(code) { localStorage.setItem(LS_LANG, code); applyLangDir(); }
function aiLangName() { return langMeta(getLang()).ai; }
function t(key, vars) {
  const lang = getLang();
  const tbl = I18N[lang] || I18N["en-US"];
  let s = (tbl[key] != null) ? tbl[key] : (I18N["en-US"][key] != null ? I18N["en-US"][key] : key);
  if (vars && typeof s === "string") for (const k in vars) s = s.split("{" + k + "}").join(vars[k]);
  return s;
}
function applyLangDir() {
  const code = getLang();
  const meta = langMeta(code);
  document.documentElement.lang = code;
  document.documentElement.dir = meta.dir;
}

/* Apply static translations to the shell (header, search) */
function applyStaticText() {
  $("tagline").textContent = t("tagline");
  $("gearBtn").setAttribute("aria-label", t("settings"));
  $("q").setAttribute("placeholder", t("searchPlaceholder"));
  $("goBtn").setAttribute("aria-label", t("searchAria"));
}

let state = { loading: false, result: null, error: null, cached: false, query: "" };

/* ============================ Self-hosted server ============================ */
/* When the PWA is served by its own server (shopify-nav/server), the server
 * holds the Anthropic key and proxies /api/message — users don't need a key.
 *   serverMode  = this origin is served by the shopify-nav server (route via it)
 *   serverKeyed = that server holds a key, so keyless use is possible
 * Both are persisted (per-origin) so an OFFLINE relaunch of the installed app
 * still knows it's in server mode and doesn't wrongly demand an API key. */
const LS_SERVER_SEEN = "sn_server_seen";
const LS_SERVER_KEYED = "sn_server_keyed";
let serverMode = localStorage.getItem(LS_SERVER_SEEN) === "1";
let serverKeyed = localStorage.getItem(LS_SERVER_KEYED) === "1";
function canCallAI() { return serverKeyed || !!getKey(); }
async function detectServer() {
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 2500);
    const res = await fetch("api/health", { signal: ctrl.signal, cache: "no-store" });
    clearTimeout(timer);
    if (res.ok) {
      const j = await res.json();
      if (j && j.service === "shopify-nav") {
        serverMode = true;
        serverKeyed = !!j.keyed;
        localStorage.setItem(LS_SERVER_SEEN, "1");
        localStorage.setItem(LS_SERVER_KEYED, serverKeyed ? "1" : "0");
        registerStoreOnServer(); // make sure a pre-existing store URL is registered for background scans
      }
    }
    // Reachable-but-not-ours can't happen at same origin; leave persisted flags as-is on any non-ok.
  } catch {
    // health failed (offline / not served by the shopify-nav server). Keep the
    // persisted flags: an installed keyless app relaunched offline stays usable.
  }
  return serverMode;
}
function registerStoreOnServer() {
  const url = getStoreUrl();
  if (!url || (!serverMode && !getServer())) return;
  fetch((getServer() || "") + "/api/store/register", {
    method: "POST",
    headers: { "content-type": "application/json" },

  }).catch(() => {});

function apiHeaders() {
  return {
    "content-type": "application/json",
    "x-api-key": getKey(),
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };
}

/* Single entry point for all Claude calls. Optional `model` overrides the stored model.
 * Routing: explicit server URL from settings > auto-detected same-origin server > Anthropic direct. */
async function callClaude({ system, messages, max_tokens, tools, model }) {
  const useModel = model || getModel();
  const server = getServer();
  const payload = { model: useModel, system, messages, max_tokens };
  if (tools) payload.tools = tools;
  if (server || serverMode) {
    const headers = { "content-type": "application/json" };
    if (getKey()) headers["x-user-api-key"] = getKey();
    return fetch((server || "") + "/api/message", {
      method: "POST",
      headers,
      body: JSON.stringify(payload),
    });
  }
  return fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: apiHeaders(),
    body: JSON.stringify(payload),
  });
}

/* Web tools for the smart flows (store scan + product wizard). */
const WEB_TOOLS = [
  { type: "web_search_20260209", name: "web_search", max_uses: 6 },
  { type: "web_fetch_20260209", name: "web_fetch", max_uses: 6 },
];

/* Run a tools-enabled Claude call, looping over pause_turn until the turn ends. Returns the final message data. */
async function callClaudeSmart({ system, messages, max_tokens, tools }) {
  let msgs = messages.slice();
  let data = null;
  for (let hop = 0; hop < 8; hop++) {
    const res = await callClaude({ system, messages: msgs, max_tokens, tools, model: getSmartModel() });
    data = await res.json();
    if (!res.ok) {
      const e = new Error(data && data.error && data.error.message ? data.error.message : ("HTTP " + res.status));
      e.status = res.status;
      throw e;
    }
    if (data.stop_reason === "pause_turn") {
      msgs.push({ role: "assistant", content: data.content });
      continue;
    }
    break;
  }
  return data;
}

function textFromData(data) {
  return ((data && data.content) || []).map(b => (b && b.type === "text" && b.text) ? b.text : "").join("");
}

function extractJson(text) {
  let clean = String(text).replace(/```json|```/g, "").trim();
  const first = clean.indexOf("{");
  const last = clean.lastIndexOf("}");
  if (first !== -1 && last !== -1 && last > first) clean = clean.slice(first, last + 1);
  return JSON.parse(clean);
}

function render() {
  const c = $("content");
  if (state.loading) {
    c.innerHTML = `<div class="loading"><div class="spinner"></div><p>${esc(t("buildingMap"))}</p></div>`;
    return;
  }
  if (state.error) {
    c.innerHTML = `<div class="err">${esc(state.error)}</div>
      <button class="again" id="retryBtn" style="margin-top:10px">${esc(t("retry"))}</button>`;
    $("retryBtn").onclick = () => search();
    return;
  }
  if (state.result) {
    const r = state.result;
    let html = `<div class="result-title">
      <div class="ico">✅</div>
      <div><div class="tag">${esc(t("foundLabel"))} ${state.cached ? `<span class="cached-badge">${esc(t("cachedBadge"))}</span>` : ''}</div>
      <div class="txt">${esc(r.title)}</div></div>
    </div>`;
    if (r.scopeNote) html += `<div class="scope-note">ℹ️ ${esc(r.scopeNote)}</div>`;
    (r.steps || []).forEach((s, i) => {
      html += `<div class="step" style="animation-delay:${i * 0.05}s">
        <div class="step-main">
          <div class="num">${esc(s.step ?? i + 1)}</div>
          <div>
            <div class="action">${esc(s.action)}</div>
            ${s.where ? `<div class="where">📍 ${esc(s.where)}</div>` : ""}
            ${s.detail ? `<div class="detail">${esc(s.detail)}</div>` : ""}
          </div>
        </div>
        <button class="stuck-btn" data-step="${i}">${esc(t("stuckBtn"))}</button>
      </div>`;
    });
    if (r.tip) html += `<div class="callout tip"><div class="ch">${esc(t("tipLabel"))}</div><div class="cb">${esc(r.tip)}</div></div>`;
    if (r.shortcut) html += `<div class="callout shortcut"><div class="ch">${esc(t("shortcutLabel"))}</div><div class="cb">${esc(r.shortcut)}</div></div>`;
    html += `<button class="again" id="againBtn">${esc(t("newSearch"))}</button>`;
    c.innerHTML = html;
    $("againBtn").onclick = () => { state.result = null; state.cached = false; state.query = ""; $("q").value = ""; render(); $("q").focus(); };
    c.querySelectorAll(".stuck-btn").forEach(btn => {
      btn.onclick = () => openStuck(parseInt(btn.dataset.step, 10));
    });
    return;
  }
  // Empty
  const examples = t("examples") || [];
  c.innerHTML = `
    <div class="examples">
      <div class="label">${esc(t("examplesLabel"))}</div>
      <div class="chips">${examples.map(e => `<button class="chip">${esc(e)}</button>`).join("")}</div>
    </div>
    <div class="empty">
      <div class="big">🗺️</div>
      <div class="t">${esc(t("emptyTitle"))}</div>
      <div class="s">${t("emptySub")}</div>
    </div>`;
  c.querySelectorAll(".chip").forEach(btn => {
    btn.onclick = () => { $("q").value = btn.textContent; search(); };
  });
}

async function search() {
  const q = $("q").value.trim();
  if (!q) return;
  if (!canCallAI()) { openSettings(true); return; }

  const cache = getCache();
  const key = getLang() + "|" + norm(q);
  if (cache[key]) {
    const cached = cache[key];
    if (cached.actionRequested === "add_product") { openProductWizard(q); return; }
    state = { loading: false, result: cached, error: null, cached: true, query: q };
    render();
    return;
  }

  state = { loading: true, result: null, error: null, cached: false, query: q };
  render();

  try {
    const res = await callClaude({
      system: SYSTEM_PROMPT(),
      messages: [{ role: "user", content: q }],
      max_tokens: 2048,
    });
    const data = await res.json();
    if (!res.ok) {
      if (res.status === 401) throw new Error((serverMode && data && data.error && data.error.message) || t("errKeyInvalid"));
      throw new Error((data && data.error && data.error.message) || t("errGeneric", { status: res.status }));
    }
    const text = (data.content || []).map(b => b.text || "").join("");
    let parsed;
    try {
      parsed = extractJson(text);
    } catch (parseErr) {
      throw new Error(data.stop_reason === "max_tokens" ? "__TRUNCATED__" : "__BADJSON__");
    }
    cache[key] = parsed;
    saveCache(cache);
    if (parsed.actionRequested === "add_product") {
      state = { loading: false, result: null, error: null, cached: false, query: q };
      render();
      openProductWizard(q);
      return;
    }
    state = { loading: false, result: parsed, error: null, cached: false, query: q };
    render();
  } catch (err) {
    let m = err.message || t("wizErr");
    if (m === "__TRUNCATED__") m = t("errTruncated");
    else if (m === "__BADJSON__") m = t("errBadJson");
    else if (m.includes("Failed to fetch") || m.includes("NetworkError")) m = t("errOffline");
    state = { loading: false, result: null, error: m, cached: false, query: q };
    render();
  }
}

/* ============================ Image resize ============================ */
function resizeImage(file, maxDim = 1568, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("read error"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("image error"));
      img.onload = () => {
        let { width, height } = img;
        if (width >= height && width > maxDim) { height = Math.round(height * maxDim / width); width = maxDim; }
        else if (height > width && height > maxDim) { width = Math.round(width * maxDim / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL("image/jpeg", quality);
        resolve(dataUrl);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ============================ Stuck helper ============================ */
function openStuck(stepIndex) {
  const step = state.result.steps[stepIndex];
  const stepNo = step.step ?? stepIndex + 1;

  const history = [];
  let pendingImg = null;

  const existing = document.querySelector(".overlay");
  if (existing) existing.remove();

  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `
    <div class="sheet">
      <div class="sheet-head">
        <h2>🤔 ${esc(t("stuckHelpTitle", { step: stepNo }))}</h2>
        <button class="sheet-close" id="stuckClose" aria-label="${esc(t("close"))}">✕</button>
      </div>
      <div class="stuck-ctx">
        <b>${esc(t("stuckStepLabel"))}</b> ${esc(step.action)}${step.where ? ` <span style="color:#008060">(${esc(step.where)})</span>` : ""}
      </div>
      <div class="convo" id="convo"></div>
      <div class="stuck-input">
        <textarea id="stuckText" placeholder="${esc(t("stuckPlaceholder"))}" rows="2"></textarea>
        <div id="previewArea"></div>
        <div class="attach-row">
          <button class="attach-btn" id="attachBtn">${esc(t("screenshotBtn"))}</button>
          <button class="send-btn" id="stuckSend">${esc(t("getHelp"))}</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none" />
      </div>
    </div>`;
  document.body.appendChild(ov);

  const convo = $("convo");
  const textEl = $("stuckText");
  const fileInput = $("fileInput");
  const previewArea = $("previewArea");
  const sendBtn = $("stuckSend");

  function autoGrow() { textEl.style.height = "auto"; textEl.style.height = Math.min(textEl.scrollHeight, 120) + "px"; }
  textEl.addEventListener("input", autoGrow);

  $("stuckClose").onclick = () => ov.remove();
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };

  $("attachBtn").onclick = () => fileInput.click();
  fileInput.onchange = async () => {
    const file = fileInput.files && fileInput.files[0];
    if (!file) return;
    try {
      pendingImg = await resizeImage(file);
      previewArea.innerHTML = `<div class="preview-wrap"><img src="${pendingImg}" alt=""/><button class="preview-x" id="rmImg" aria-label="${esc(t("close"))}">✕</button></div>`;
      $("rmImg").onclick = () => { pendingImg = null; previewArea.innerHTML = ""; fileInput.value = ""; };
    } catch {
      previewArea.innerHTML = `<div style="font-size:12px;color:#dc2626;margin-top:8px">${esc(t("imgLoadErr"))}</div>`;
    }
  };

  function renderAiBubble(parsed) {
    let html = `<div class="bubble-ai">`;
    if (parsed.diagnosis) html += `<div class="diag">${esc(parsed.diagnosis)}</div>`;
    (parsed.steps || []).forEach(s => {
      html += `<div class="hstep"><div class="d"></div><div class="a">${esc(s.action)}${s.detail ? `<small>${esc(s.detail)}</small>` : ""}</div></div>`;
    });
    if (parsed.note) html += `<div class="hnote">💡 ${esc(parsed.note)}</div>`;
    html += `</div>`;
    return html;
  }

  async function sendStuck() {
    const txt = textEl.value.trim();
    if (!txt && !pendingImg) { textEl.focus(); return; }
    if (!canCallAI()) { ov.remove(); openSettings(true); return; }

    let userHtml = `<div class="bubble-user">`;
    if (txt) userHtml += esc(txt);
    if (pendingImg) userHtml += `<img src="${pendingImg}" alt=""/>`;
    userHtml += `</div>`;
    convo.insertAdjacentHTML("beforeend", userHtml);

    const contentParts = [];
    if (pendingImg) {
      contentParts.push({
        type: "image",
        source: { type: "base64", media_type: "image/jpeg", data: pendingImg.split(",")[1] },
      });
    }
    let msgText;
    if (history.length === 0) {
      msgText = `${t("task")}: "${state.query || state.result.title}"\n`
        + `${t("stuckAt")} (${stepNo}): ${step.action}`
        + (step.where ? ` — ${t("where")}: ${step.where}` : "")
        + (step.detail ? ` — ${t("details")}: ${step.detail}` : "") + `\n`
        + `${t("myExplain")}: ${txt || t("noTextSeeImg")}`;
    } else {
      msgText = txt || t("seeImg");
    }
    contentParts.push({ type: "text", text: msgText });
    history.push({ role: "user", content: contentParts });

    textEl.value = ""; autoGrow();
    pendingImg = null; previewArea.innerHTML = ""; fileInput.value = "";
    sendBtn.disabled = true;

    const loadId = "ld" + convo.children.length;
    convo.insertAdjacentHTML("beforeend", `<div class="stuck-mini-spin" id="${loadId}"><div class="sp"></div>${esc(t("analyzing"))}</div>`);
    convo.scrollTop = convo.scrollHeight;

    try {
      const res = await callClaude({
        system: STUCK_SYSTEM(),
        messages: history,
        max_tokens: 1500,
      });
      const data = await res.json();
      const ld = $(loadId); if (ld) ld.remove();
      if (!res.ok) {
        if (res.status === 401) throw new Error((serverMode && data && data.error && data.error.message) || t("errKeyInvalid"));
        throw new Error((data && data.error && data.error.message) || t("errGeneric", { status: res.status }));
      }
      const text = (data.content || []).map(b => b.text || "").join("");
      history.push({ role: "assistant", content: text });
      let parsed;
      try { parsed = extractJson(text); }
      catch { parsed = { diagnosis: text, steps: [] }; }
      convo.insertAdjacentHTML("beforeend", renderAiBubble(parsed));
      convo.scrollTop = convo.scrollHeight;
    } catch (err) {
      const ld = $(loadId); if (ld) ld.remove();
      let m = err.message || t("wizErr");
      if (m.includes("Failed to fetch") || m.includes("NetworkError")) m = t("stuckNetErr");
      convo.insertAdjacentHTML("beforeend", `<div class="bubble-ai" style="border-color:#fecaca;background:#fef2f2;color:#dc2626;font-size:13px">${esc(m)}</div>`);
    } finally {
      sendBtn.disabled = false;
    }
  }

  sendBtn.onclick = sendStuck;
  textEl.focus();
}

/* ============================ Store scan ============================ */
let scanInFlight = false;

function SCAN_SYSTEM() {
  return `You analyze a Shopify (or general e-commerce) online store and produce a compact structured profile of it, used to tailor product suggestions.

Use the web_fetch tool to open the given store URL, and web_search if needed to learn more about the brand. Look at the homepage, product listings, and overall branding.

${langInstruction()}

Respond ONLY with valid JSON, no markdown, no extra text:
{
  "niche": "the store's niche / product category",
  "style": "visual & brand style in a few words (e.g. minimalist, playful, luxury)",
  "colors": ["main brand colors, e.g. #hex or names"],
  "tone": "brand voice / tone",
  "audience": "target audience",
  "categories": ["product categories the store sells"],
  "exampleProducts": ["a few example products currently sold"],
  "summary": "2-3 sentence summary of the store for tailoring new product ideas"
}

If the site cannot be reached or is not an online store, still return your best guess from the name/URL and set summary to note the limitation. All descriptive text in ${aiLangName()}.`;
}

async function scanStore() {
  const url = getStoreUrl();
  if (!url) throw new Error(t("storeMissing"));
  if (!canCallAI()) throw new Error(t("errKeyInvalid"));
  if (serverMode || getServer()) {
    // The server performs (and keeps refreshing) the scan with its own key.
    const headers = { "content-type": "application/json" };
    if (getKey()) headers["x-user-api-key"] = getKey();
    const res = await fetch((getServer() || "") + "/api/store/scan", {
      method: "POST",
      headers,
      body: JSON.stringify({ url, lang: aiLangName() }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok || !j.profile) throw new Error((j && j.error) || "scan failed");
    const profile = j.profile;
    profile.url = url;
    profile.scannedAt = j.scannedAt || nowStamp();
    saveStoreProfile(profile);
    return profile;
  }
  const data = await callClaudeSmart({
    system: SCAN_SYSTEM(),
    messages: [{ role: "user", content: `Analyze this store and produce its profile: ${url}` }],
    max_tokens: 2000,
    tools: WEB_TOOLS,
  });
  const text = textFromData(data);
  let profile;
  try { profile = extractJson(text); }
  catch { profile = { summary: text, niche: "", style: "", colors: [], tone: "", categories: [], exampleProducts: [] }; }
  profile.url = url;
  profile.scannedAt = nowStamp();
  saveStoreProfile(profile);
  return profile;
}

function nowStamp() { try { return new Date().toISOString(); } catch { return ""; } }
function fmtTime(iso) {
  if (!iso) return "";
  try { return new Date(iso).toLocaleString(getLang()); } catch { return iso; }
}

/* Background refresh every 10 minutes while the app is open.
 * With a server: the server rescans on its own even when the app is closed —
 * we only pull the latest profile. Without a server: run a client-side scan. */
let bgScanTimer = null;
function startBgScan() {
  if (bgScanTimer) clearInterval(bgScanTimer);
  bgScanTimer = setInterval(async () => {
    const url = getStoreUrl();
    if (!url || scanInFlight || document.visibilityState !== "visible") return;
    if (serverMode || getServer()) {
      try {
        const res = await fetch((getServer() || "") + "/api/store/profile?url=" + encodeURIComponent(url), { cache: "no-store" });
        if (res.ok) {
          const j = await res.json();
          if (j && j.profile) {
            j.profile.url = url;
            j.profile.scannedAt = j.scannedAt || j.profile.scannedAt;
            saveStoreProfile(j.profile);
          }
        }
      } catch { /* offline */ }
      return;
    }
    if (!getKey()) return;
    scanInFlight = true;
    scanStore().catch(() => {}).finally(() => { scanInFlight = false; });
  }, 10 * 60 * 1000);
}

      </div>
      <div id="wizPreview"></div>
      <button class="wiz-primary" id="wizFindBtn">${esc(t("wizFind"))}</button>
      <input type="file" id="wizFile" accept="image/*" style="display:none" />`;
  }

  function wireInputRow() {
    const input = $("wizInput");
    if (input) {
      input.value = wiz.userText || "";
      const grow = () => { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 120) + "px"; };
      input.addEventListener("input", () => { wiz.userText = input.value; grow(); });
      grow();
    }
    const file = $("wizFile");
    const plus = $("wizPlus");
    if (plus && file) {
      plus.onclick = () => file.click();
      file.onchange = async () => {
        const f = file.files && file.files[0];
        if (!f) return;
        try { wiz.pastedImg = await resizeImage(f); renderPreview(); } catch { /* ignore */ }
      };
    }
    renderPreview();
    const findBtn = $("wizFindBtn");
    if (findBtn) findBtn.onclick = () => startFind();
  }

  function renderPreview() {
    const p = $("wizPreview");
    if (!p) return;
    if (wiz.pastedImg) {
      p.innerHTML = `<div class="preview-wrap"><img src="${wiz.pastedImg}" alt="${esc(t("wizAttachedImg"))}"/><button class="preview-x" id="wizRmImg" aria-label="${esc(t("close"))}">✕</button></div>`;
      const rm = $("wizRmImg");
      if (rm) rm.onclick = () => { wiz.pastedImg = null; renderPreview(); };
    } else {
      p.innerHTML = "";
    }
  }

  async function fetchIdeas() {
    try {
      const data = await callClaudeSmart({
        system: IDEAS_SYSTEM(),
        messages: [{ role: "user", content: "Suggest 4 products for my store." }],
        max_tokens: 1200,
      });
      const parsed = extractJson(textFromData(data));
      wiz.ideas = (parsed.ideas || []).slice(0, 4);
      const list = $("ideaList");
      if (!list) return;
      list.innerHTML = wiz.ideas.map((idea, i) => {
        const kind = idea.kind === "unique" ? "unique" : idea.kind === "trend" ? "trend" : "classic";
        const badge = kind === "unique" ? "★" : kind === "trend" ? "🔥 TikTok" : "✓";
        return `<button class="idea-card" data-i="${i}">
          <span class="idea-badge ${kind}">${esc(badge)}</span>
          <div class="name">${esc(idea.name)}</div>
          <div class="why">${esc(idea.why || "")}</div>
        </button>`;
      }).join("");
      list.querySelectorAll(".idea-card").forEach(btn => {
        btn.onclick = () => {
          const idea = wiz.ideas[parseInt(btn.dataset.i, 10)];
          const inp = $("wizInput");
          wiz.userText = idea.name;
          if (inp) inp.value = idea.name;
          startFind();
        };
      });
    } catch (err) {
      const list = $("ideaList");
      if (list) list.innerHTML = `<div class="scope-note">⚠️ ${esc(t("wizErr"))}</div>`;
    }
  }

  function renderIdeas() {
    let html = `<div class="wiz-intro">${esc(t("wizIntro"))}</div>`;
    if (!getStoreProfile()) html += `<div class="scope-note" style="margin-bottom:12px">💡 ${esc(t("wizNoStore"))}</div>`;
    html += `<div id="ideaList">${loadingBody(t("wizLoadingIdeas"))}</div>`;
    html += `<div class="wiz-or">${esc(t("wizOr"))}</div>`;
    html += inputRowHtml();
    shell(html);
    wireInputRow();
    fetchIdeas();
  }

  function startFind(feedback) {
    const text = (wiz.userText || "").trim();
    if (!text && !wiz.pastedImg && !feedback) { alert(t("wizNeedInput")); return; }
    wiz.stage = "searching";
    shell(loadingBody(t("wizSearching")));

    const parts = [];
    if (!feedback && wiz.pastedImg) {
      parts.push({ type: "image", source: { type: "base64", media_type: "image/jpeg", data: wiz.pastedImg.split(",")[1] } });
    }
    let msg;
    if (feedback) {
      msg = `The previous candidate was not right. User feedback: "${feedback}". Find a different matching product.`;
    } else {
      msg = `Find a real product to add to my store.\nUser description / link: ${text || "(see attached image)"}`;
    }
    parts.push({ type: "text", text: msg });
    wiz.findHistory.push({ role: "user", content: parts });

    callClaudeSmart({
      system: FIND_SYSTEM(),
      messages: wiz.findHistory,
      max_tokens: 2000,
      tools: WEB_TOOLS,
    }).then(data => {
      wiz.findHistory.push({ role: "assistant", content: (data.content || []).filter(b => b.type === "text").map(b => ({ type: "text", text: b.text })) });
      let parsed;
      try { parsed = extractJson(textFromData(data)); }
      catch { parsed = { found: false }; }
      if (!parsed.found || !parsed.title) { wiz.stage = "notfound"; renderNotFound(); return; }
      wiz.candidate = parsed;
      wiz.stage = "candidate";
      renderCandidate();
    }).catch(err => {
      wiz.error = (err && err.message) || t("wizErr");
      wiz.stage = "error";
      renderError();
    });
  }

  function renderNotFound() {
    let html = `<div class="wiz-err">${esc(t("wizNotFound"))}</div>`;
    html += inputRowHtml();
    shell(html);
    wireInputRow();
  }

  function renderError() {
    shell(`<div class="wiz-err">${esc(wiz.error)}</div>
      <button class="wiz-primary" id="wizRetry">${esc(t("retry"))}</button>`);
    const r = $("wizRetry"); if (r) r.onclick = () => renderIdeas();
  }

  function renderCandidate() {
    const c = wiz.candidate;
    const priceStr = c.price ? `${esc(c.currency || "")} ${esc(c.price)}`.trim() : "";
    let html = `<div class="cand-card">`;
    if (c.imageUrl) html += `<img src="${esc(c.imageUrl)}" alt="" onerror="this.style.display='none'"/>`;
    html += `<div class="cand-body">
        <div class="cand-title">${esc(c.title)}</div>
        ${priceStr ? `<div class="cand-price">${priceStr}</div>` : ""}
        ${c.description ? `<div class="cand-desc">${esc(c.description)}</div>` : ""}
        ${c.sourceUrl ? `<a class="cand-link" href="${esc(c.sourceUrl)}" target="_blank" rel="noopener">${esc(c.sourceUrl)}</a>` : ""}
      </div></div>`;
    html += `<div class="yn-question">${esc(t("wizCandidateQ"))}</div>`;
    html += `<div class="yn-row">
        <button class="yn-btn yn-no" id="wizNo">${esc(t("wizNo"))}</button>
        <button class="yn-btn yn-yes" id="wizYes">${esc(t("wizYes"))}</button>
      </div>`;
    shell(html);
    $("wizYes").onclick = () => { wiz.stage = "supplier"; renderSupplier(); };
    $("wizNo").onclick = () => { wiz.stage = "feedback"; renderFeedback(); };
  }

  function renderFeedback() {
    let html = `<div class="wiz-intro">${esc(t("wizWhatWrong"))}</div>
      <div class="wiz-input-box">
        <textarea id="fbInput" rows="2" placeholder="${esc(t("wizWhatWrongPlaceholder"))}"></textarea>
      </div>
      <button class="wiz-primary" id="fbBtn">${esc(t("wizSearchAgain"))}</button>`;
    shell(html);
    const inp = $("fbInput");
    if (inp) inp.focus();
    $("fbBtn").onclick = () => {
      const fb = (inp.value || "").trim();
      if (!fb) { inp.focus(); return; }
      startFind(fb);
    };
  }

  const SUPPLIERS = ["DSers", "AutoDS", "Zendrop", "CJdropshipping", "Spocket"];
  function renderSupplier() {
    let html = `<div class="wiz-intro">${esc(t("wizSupplierQ"))}</div>`;
    html += `<div class="supplier-chips" id="supChips">` +
      SUPPLIERS.map(s => `<button class="supplier-chip" data-s="${esc(s)}">${esc(s)}</button>`).join("") +
      `</div>`;
    html += `<div class="wiz-input-box"><textarea id="supOther" rows="1" placeholder="${esc(t("wizSupplierOtherPlaceholder"))}"></textarea></div>`;
    html += `<button class="wiz-primary" id="supBtn" disabled>${esc(t("wizBuildPrompt"))}</button>`;
    shell(html);
    const btn = $("supBtn");
    const other = $("supOther");
    function refresh() { btn.disabled = !wiz.supplier; }
    $("supChips").querySelectorAll(".supplier-chip").forEach(chip => {
      chip.onclick = () => {
        $("supChips").querySelectorAll(".supplier-chip").forEach(x => x.classList.remove("sel"));
        chip.classList.add("sel");
        wiz.supplier = chip.dataset.s;
        if (other) other.value = "";
        refresh();
      };
    });
    if (other) other.addEventListener("input", () => {
      const v = other.value.trim();
      if (v) { $("supChips").querySelectorAll(".supplier-chip").forEach(x => x.classList.remove("sel")); wiz.supplier = v; }
      else if (![...$("supChips").querySelectorAll(".supplier-chip")].some(x => x.classList.contains("sel"))) wiz.supplier = "";
      refresh();
    });
    btn.onclick = () => buildPrompt();
  }

  function buildPrompt() {
    wiz.stage = "building";
    shell(loadingBody(t("wizBuildingPrompt")));
    const c = wiz.candidate;
    const imgs = [];
    if (c.imageUrl) imgs.push(c.imageUrl);
    (c.images || []).forEach(u => { if (u && imgs.indexOf(u) === -1) imgs.push(u); });

    const userMsg = `Chosen product:
- Title: ${c.title}
- Price: ${c.currency || ""} ${c.price || ""}
- Source URL: ${c.sourceUrl || "(none)"}
- Description: ${c.description || ""}
- Product image URLs: ${imgs.join(" , ") || "(none)"}

Supplier app the user uses: ${wiz.supplier}

Write the final English prompt now.`;

    callClaudeSmart({
      system: PROMPT_SYSTEM().split("{SUPPLIER}").join(wiz.supplier),
      messages: [{ role: "user", content: userMsg }],
      max_tokens: 2000,
    }).then(data => {
      let promptText = textFromData(data).trim();
      let extra = "";
      if (imgs.length) extra += `\n\nProduct image URLs to use:\n` + imgs.map(u => "- " + u).join("\n");
      if (wiz.pastedImg) extra += `\n\n(The user also attached their own product image in the app; use it as an additional reference image.)`;
      wiz.finalPrompt = promptText + extra;
      wiz.promptImages = imgs;
      wiz.stage = "prompt";
      renderPrompt();
    }).catch(err => {
      wiz.error = (err && err.message) || t("wizErr");
      wiz.stage = "error";
      renderError();
    });
  }

  function renderPrompt() {
    const imgs = wiz.promptImages || [];
    let html = `<div class="wiz-intro"><b>${esc(t("wizPromptTitle"))}</b><br/>${esc(t("wizPromptIntro"))}</div>`;
    html += `<div class="prompt-box" id="promptBox">${esc(wiz.finalPrompt)}</div>`;
    html += `<button class="copy-btn" id="copyBtn">${esc(t("wizCopyPrompt"))}</button>`;
    if (imgs.length) {
      html += `<div class="img-links"><div class="il-label">${esc(t("wizImagesTitle"))}</div>` +
        imgs.map(u => `<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`).join("") + `</div>`;
    }
    if (wiz.pastedImg) html += `<div class="scan-status" style="margin-top:10px">${esc(t("wizAttachedImages"))}</div>`;
    html += `<button class="again" id="wizRestart" style="margin-top:14px">🔄 ${esc(t("wizRestart"))}</button>`;
    shell(html);
    const copyBtn = $("copyBtn");
    copyBtn.onclick = async () => {
      try {
        await navigator.clipboard.writeText(wiz.finalPrompt);
      } catch {
        const range = document.createRange();
        range.selectNodeContents($("promptBox"));
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        try { document.execCommand("copy"); } catch {}
        sel.removeAllRanges();
      }
      copyBtn.textContent = t("wizCopied");
      setTimeout(() => { copyBtn.textContent = t("wizCopyPrompt"); }, 1600);
    };
    $("wizRestart").onclick = () => {
      wiz.stage = "ideas"; wiz.userText = ""; wiz.pastedImg = null; wiz.candidate = null;
      wiz.findHistory = []; wiz.supplier = ""; wiz.finalPrompt = ""; wiz.promptImages = [];
      renderIdeas();
    };
  }

  // start
  renderIdeas();
}

/* ============================ Settings ============================ */
function openSettings(firstTime) {
  const existing = document.querySelector(".overlay");
  if (existing) existing.remove();

  const curKey = getKey();
  const curModel = getModel();
  const curServer = getServer();
  const curLang = getLang();
  const curStore = getStoreUrl();
  const profile = getStoreProfile();

  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = `
    <div class="sheet">
      <h2>${esc(t("settings"))}</h2>
      <div class="sheet-scroll">
      <p class="desc">${firstTime ? esc(t("settingsDescFirst")) : esc(t("settingsDescNormal"))}</p>
      <label>${esc(t("apiKeyLabel"))}</label>
      <input id="keyInput" type="password" placeholder="sk-ant-..." value="${esc(curKey)}" autocomplete="off" />
      ${serverKeyed
        ? `<div class="hint" style="color:var(--green)">✓ ${esc(t("serverConnectedNote"))}</div>`
        : `<div class="hint">${esc(t("apiKeyHint"))}<a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a></div>`}

      <div class="model-row">
        ${Object.entries(MODELS).map(([id, m]) => `
          <button class="model-opt ${id === curModel ? "sel" : ""}" data-model="${id}">
            ${m.name}<small>${esc(t(m.descKey))}</small>
          </button>`).join("")}
      </div>

      <div class="settings-section">
        <label>🌐 ${esc(t("languageLabel"))}</label>
        <div class="lang-grid" id="langGrid">
          ${LANGS.map(l => `<button class="lang-opt ${l.code === curLang ? "sel" : ""}" data-lang="${l.code}">${esc(l.name)}</button>`).join("")}
        </div>
      </div>

      <div class="settings-section">
        <label>🏬 ${esc(t("storeSectionLabel"))}</label>
        <label style="font-weight:600;margin-top:8px">${esc(t("storeLabel"))}</label>
        <input id="storeInput" type="text" placeholder="https://your-store.myshopify.com" value="${esc(curStore)}" autocomplete="off" dir="ltr" />
        <div class="scan-row">
          <button id="scanBtn">${esc(t("scanNow"))}</button>
        </div>
        <div class="scan-status" id="scanStatus">${profile && profile.scannedAt ? esc(t("scanLast", { time: fmtTime(profile.scannedAt) })) : esc(t("scanNever"))}</div>
        <div class="hint">${esc(t("storeHint"))}</div>
        <div class="hint">${esc(t("scanBgNote"))}</div>
      </div>

      <div class="settings-section">
        <label>${esc(t("serverLabel"))}</label>
        <input id="serverInput" type="text" placeholder="https://your-server.com" value="${esc(curServer)}" autocomplete="off" dir="ltr" />
        <div class="hint">${esc(t("serverHint"))}</div>
      </div>
      </div>

      <div class="sheet-actions">
        <button class="btn-primary" id="saveBtn">${esc(t("save"))}</button>
        ${firstTime ? "" : `<button class="btn-ghost" id="cancelBtn">${esc(t("cancel"))}</button>`}
      </div>
    </div>`;
  document.body.appendChild(ov);

  let pickedModel = curModel;
  ov.querySelectorAll(".model-opt").forEach(b => {
    b.onclick = () => {
      pickedModel = b.dataset.model;
      ov.querySelectorAll(".model-opt").forEach(x => x.classList.remove("sel"));
      b.classList.add("sel");
    };
  });

  function persistFields() {
    const k = $("keyInput").value.trim();
    if (k) localStorage.setItem(LS_KEY, k);
    else localStorage.removeItem(LS_KEY); // allow clearing a personal key (server mode)
    localStorage.setItem(LS_MODEL, pickedModel);
    const s = $("serverInput").value.trim().replace(/\/+$/, "");
    if (s) localStorage.setItem(LS_SERVER, s); else localStorage.removeItem(LS_SERVER);
    const st = $("storeInput").value.trim();
    if (st) localStorage.setItem(LS_STORE_URL, st); else localStorage.removeItem(LS_STORE_URL);
  }

  // Language: apply immediately so the whole settings sheet re-renders in the new language.
  ov.querySelectorAll(".lang-opt").forEach(b => {
    b.onclick = () => {
      persistFields();
      setLang(b.dataset.lang);
      applyStaticText();
      render();
      openSettings(firstTime);
    };
  });

  // Store scan
  const scanBtn = $("scanBtn");
  const scanStatus = $("scanStatus");
  scanBtn.onclick = async () => {
    const st = $("storeInput").value.trim();
    if (!st) { scanStatus.className = "scan-status err"; scanStatus.textContent = t("storeMissing"); return; }
    persistFields(); // persist store URL + key + server URL so scanStore routes correctly
    if (!canCallAI()) { scanStatus.className = "scan-status err"; scanStatus.textContent = t("errKeyInvalid"); return; }
    scanBtn.disabled = true;
    scanStatus.className = "scan-status";
    scanStatus.innerHTML = `<span class="scan-mini-spin"></span>${esc(t("scanning"))}`;
    scanInFlight = true;
    try {
      const prof = await scanStore();
      scanStatus.className = "scan-status ok";
      scanStatus.textContent = t("scanDone") + " — " + t("scanLast", { time: fmtTime(prof.scannedAt) });
    } catch (err) {
      scanStatus.className = "scan-status err";
      scanStatus.textContent = t("scanErr");
    } finally {
      scanInFlight = false;
      scanBtn.disabled = false;
    }
  };

  if (!serverKeyed) $("keyInput").focus();
  $("saveBtn").onclick = () => {
    const k = $("keyInput").value.trim();
    // A key is only optional when the server can supply one (serverKeyed).
    if (!k && !serverKeyed) { $("keyInput").focus(); return; }
    persistFields();
    registerStoreOnServer();
    ov.remove();
  };
  const cancel = $("cancelBtn");
  if (cancel) cancel.onclick = () => ov.remove();
  ov.onclick = (e) => { if (e.target === ov && !firstTime) ov.remove(); };
}

/* ============================ Wire up ============================ */
$("goBtn").onclick = search;
$("q").addEventListener("keydown", e => { if (e.key === "Enter") search(); });
$("gearBtn").onclick = () => openSettings(false);

applyLangDir();
applyStaticText();
render();
startBgScan();
detectServer().then(() => {
  // Only demand an API key when there's no server to lean on.
  if (!canCallAI()) openSettings(true);
});

/* ============================ Service worker ============================ */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
