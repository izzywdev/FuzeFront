# Managed by fuzeone — @claude interactive handler. Mention @claude in an issue/comment/PR/review;
# Claude reads the thread + repo and pushes a claude/** branch (claude-auto-pr.yml opens the draft PR).
# Requires repo secret: ANTHROPIC_API_KEY.
name: Claude
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]
jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Checkout PR branch (when triggered from a PR)
        if: |
          (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) ||
          github.event_name == 'pull_request_review_comment' ||
          github.event_name == 'pull_request_review'
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUM=${{ github.event.issue.number }}
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq .head.sha)
            HEAD_REF=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq .head.ref)
          else
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            HEAD_REF="${{ github.event.pull_request.head.ref }}"
          fi
          git fetch origin "$HEAD_SHA"
          git checkout "$HEAD_SHA"
          echo "Checked out PR branch: $HEAD_REF @ $HEAD_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
