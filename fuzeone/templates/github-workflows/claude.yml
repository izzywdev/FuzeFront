# Managed by fuzeone — @claude interactive handler. Thin caller of the hub's reusable workflow
# so central fixes propagate; re-run `fuzeone sync` to update the pinned ref.
name: claude
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]
jobs:
  claude:
    uses: {{HUB}}/.github/workflows/reusable-claude.yml@{{HUB_REF}}
    secrets: inherit
