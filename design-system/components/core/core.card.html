<!-- @dsCard group="Components" viewport="760x420" name="Core — Buttons, Badges, Avatars" subtitle="Pill buttons, status badges, icon buttons & avatars" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body {
    margin: 0;
    padding: var(--space-6) var(--space-8);
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
  }
  .lbl {
    font-size: var(--text-2xs);
    letter-spacing: var(--tracking-wide);
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin: 0 0 var(--space-3);
    font-weight: var(--weight-semibold);
  }
  .group { margin-bottom: var(--space-6); }
  .row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: var(--space-4);
  }
  .specimen { display: flex; flex-direction: column; align-items: center; gap: var(--space-2); }
  .cap {
    font-size: var(--text-2xs);
    color: var(--text-tertiary);
    font-family: var(--font-mono);
  }

  /* ---- Button -------------------------------------------- */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    font-family: var(--font-sans);
    font-weight: var(--weight-semibold);
    line-height: 1;
    border-radius: var(--radius-md);
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-md { padding: 12px 24px; font-size: var(--text-sm); }
  .btn-sm { padding: 8px 16px; font-size: var(--text-xs); }
  .btn-lg { padding: 16px 32px; font-size: var(--text-md); }
  .btn-primary {
    background: var(--accent-color);
    color: #fff;
    border: 1px solid transparent;
    box-shadow: var(--shadow-accent);
  }
  .btn-secondary {
    background: var(--bg-quaternary);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid transparent;
  }
  .btn-danger {
    background: var(--error-color);
    color: #fff;
    border: 1px solid transparent;
  }
  .btn:disabled, .btn.is-disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---- Badge --------------------------------------------- */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    font-family: var(--font-sans);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    letter-spacing: var(--tracking-wide);
    line-height: 1.4;
    white-space: nowrap;
    border-radius: var(--radius-pill);
    text-transform: uppercase;
  }
  .badge-neutral {
    color: var(--text-secondary);
    background: var(--bg-quaternary);
    border: 1px solid var(--border-color);
  }
  .badge-accent {
    color: var(--accent-color);
    background: var(--accent-soft);
    border: 1px solid transparent;
  }
  .badge-success {
    color: var(--success-color);
    background: color-mix(in srgb, var(--success-color) 14%, transparent);
    border: 1px solid transparent;
  }
  .badge-warning {
    color: var(--warning-color);
    background: color-mix(in srgb, var(--warning-color) 14%, transparent);
    border: 1px solid transparent;
  }
  .badge-error {
    color: var(--error-color);
    background: color-mix(in srgb, var(--error-color) 14%, transparent);
    border: 1px solid transparent;
  }
  .badge-mono {
    font-family: var(--font-mono);
    letter-spacing: var(--tracking-normal);
    text-transform: none;
  }

  /* ---- Avatar -------------------------------------------- */
  .avatar {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: none;
    border-radius: var(--radius-pill);
    background: linear-gradient(45deg, var(--accent-color), var(--accent-hover));
    color: #fff;
    font-family: var(--font-sans);
    font-weight: var(--weight-semibold);
    letter-spacing: var(--tracking-wide);
    line-height: 1;
    user-select: none;
    box-shadow: var(--shadow-xs);
  }
  .avatar-sm { width: 28px; height: 28px; font-size: var(--text-2xs); }
  .avatar-md { width: 36px; height: 36px; font-size: var(--text-sm); }
  .avatar-lg { width: 48px; height: 48px; font-size: var(--text-md); }

  /* ---- IconButton ---------------------------------------- */
  .iconbtn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    padding: 0;
    flex: none;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    cursor: pointer;
    line-height: 0;
    background: transparent;
    color: var(--text-primary);
  }
  .iconbtn-active {
    background: var(--bg-quaternary);
    color: var(--accent-color);
  }
</style>
</head>
<body>
  <div class="group">
    <p class="lbl">Buttons</p>
    <div class="row">
      <div class="specimen">
        <button class="btn btn-md btn-primary">
          Launch app
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6" /></svg>
        </button>
        <span class="cap">primary · withArrow</span>
      </div>
      <div class="specimen">
        <button class="btn btn-md btn-secondary">Connect remote</button>
        <span class="cap">secondary</span>
      </div>
      <div class="specimen">
        <button class="btn btn-md btn-ghost">Cancel</button>
        <span class="cap">ghost</span>
      </div>
      <div class="specimen">
        <button class="btn btn-md btn-danger">Delete</button>
        <span class="cap">danger</span>
      </div>
      <div class="specimen">
        <button class="btn btn-md btn-primary is-disabled" disabled>Sign in</button>
        <span class="cap">disabled</span>
      </div>
    </div>
    <div class="row" style="margin-top: var(--space-4);">
      <div class="specimen">
        <button class="btn btn-sm btn-primary">Subscribe</button>
        <span class="cap">size sm</span>
      </div>
      <div class="specimen">
        <button class="btn btn-md btn-primary">Subscribe</button>
        <span class="cap">size md</span>
      </div>
      <div class="specimen">
        <button class="btn btn-lg btn-primary">Subscribe</button>
        <span class="cap">size lg</span>
      </div>
    </div>
  </div>

  <div class="group">
    <p class="lbl">Badges</p>
    <div class="row">
      <div class="specimen"><span class="badge badge-neutral">Draft</span><span class="cap">neutral</span></div>
      <div class="specimen"><span class="badge badge-accent">New</span><span class="cap">accent</span></div>
      <div class="specimen"><span class="badge badge-success">Online</span><span class="cap">success</span></div>
      <div class="specimen"><span class="badge badge-warning">Pending</span><span class="cap">warning</span></div>
      <div class="specimen"><span class="badge badge-error">Failed</span><span class="cap">error</span></div>
      <div class="specimen"><span class="badge badge-accent badge-mono">remoteEntry</span><span class="cap">mono</span></div>
    </div>
  </div>

  <div class="group">
    <p class="lbl">Icon buttons &amp; avatars</p>
    <div class="row">
      <div class="specimen">
        <button class="iconbtn" title="Notifications" aria-label="Notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </button>
        <span class="cap">default</span>
      </div>
      <div class="specimen">
        <button class="iconbtn iconbtn-active" title="Notifications" aria-label="Notifications" aria-pressed="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
        </button>
        <span class="cap">active</span>
      </div>
      <div class="specimen" style="margin-left: var(--space-6);">
        <span class="avatar avatar-sm" role="img" aria-label="Izzy Weinberg">IW</span>
        <span class="cap">sm</span>
      </div>
      <div class="specimen">
        <span class="avatar avatar-md" role="img" aria-label="Izzy Weinberg">IW</span>
        <span class="cap">md</span>
      </div>
      <div class="specimen">
        <span class="avatar avatar-lg" role="img" aria-label="Izzy Weinberg">IW</span>
        <span class="cap">lg</span>
      </div>
    </div>
  </div>
</body>
</html>
