<!-- @dsCard group="Components" viewport="720x380" name="Forms — Inputs & selects" subtitle="Text fields and dropdowns with the accent focus ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body {
    margin: 0;
    padding: var(--space-6) var(--space-8);
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-8) var(--space-10);
    max-width: 640px;
  }
  .lbl {
    font-family: var(--font-sans);
    font-size: var(--text-2xs);
    letter-spacing: var(--tracking-wide);
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin: 0 0 var(--space-3);
    font-weight: var(--weight-semibold);
  }

  /* ---- Field scaffold (mirrors Input/Select wrapper) ---- */
  .field { display: flex; flex-direction: column; gap: var(--space-2); width: 100%; }
  .field-label {
    font-family: var(--font-sans);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--text-secondary);
    line-height: 1.2;
  }

  /* ---- Input ---- */
  .ff-input {
    width: 100%;
    box-sizing: border-box;
    padding: var(--space-3) var(--space-3);
    font-family: var(--font-sans);
    font-size: var(--text-sm);
    font-weight: var(--weight-regular);
    line-height: 1.4;
    color: var(--text-primary);
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    outline: none;
    transition:
      border-color var(--duration-base) var(--ease-standard),
      box-shadow var(--duration-base) var(--ease-standard),
      background var(--duration-base) var(--ease-standard);
  }
  .ff-input::placeholder { color: var(--text-tertiary); }
  /* live focus matches the JS onFocus handler */
  .ff-input:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  /* static "focused" specimen — pinned so the ring shows without interaction */
  .ff-input.is-focused {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .ff-input.is-error,
  .ff-input.is-error:focus {
    border-color: var(--error-color);
    box-shadow: none;
  }

  /* ---- Select ---- */
  .select-wrap { position: relative; width: 100%; }
  .ff-select {
    width: 100%;
    box-sizing: border-box;
    /* Logical spacing: inline-end room for the chevron mirrors under dir="rtl". */
    padding-block: var(--space-3);
    padding-inline-start: var(--space-3);
    padding-inline-end: calc(var(--space-3) + var(--space-6));
    font-family: var(--font-sans);
    font-size: var(--text-sm);
    font-weight: var(--weight-regular);
    line-height: 1.4;
    color: var(--text-primary);
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    outline: none;
    text-align: start;
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    transition:
      border-color var(--duration-base) var(--ease-standard),
      box-shadow var(--duration-base) var(--ease-standard),
      background var(--duration-base) var(--ease-standard);
  }
  .ff-select:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .ff-select option { background: var(--bg-tertiary); color: var(--text-primary); }
  .chevron {
    position: absolute;
    inset-inline-end: var(--space-3);
    top: 50%;
    transform: translateY(-50%);
    display: inline-flex;
    align-items: center;
    color: var(--text-tertiary);
    pointer-events: none;
  }

  /* ---- Error message ---- */
  .err-msg {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-family: var(--font-sans);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    color: var(--error-color);
    line-height: 1.3;
  }
  .err-msg svg { flex: none; }
</style>
</head>
<body>
  <div class="grid">

    <!-- Input — default -->
    <div>
      <p class="lbl">Input — default</p>
      <div class="field">
        <label class="field-label" for="i-default">Application name</label>
        <input class="ff-input" id="i-default" type="text" placeholder="e.g. FuzeClock" />
      </div>
    </div>

    <!-- Input — focused (accent-soft ring) -->
    <div>
      <p class="lbl">Input — focused</p>
      <div class="field">
        <label class="field-label" for="i-focused">Application name</label>
        <input class="ff-input is-focused" id="i-focused" type="text" value="FuzeClock" />
      </div>
    </div>

    <!-- Input — error -->
    <div>
      <p class="lbl">Input — error</p>
      <div class="field">
        <label class="field-label" for="i-error">Remote entry URL</label>
        <input class="ff-input is-error" id="i-error" type="text" value="ht!tp://bad-url" aria-invalid="true" />
        <span class="err-msg" role="alert">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 9v4M12 17h.01" />
            <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
          </svg>
          Enter a valid URL
        </span>
      </div>
    </div>

    <!-- Select — default (no label) -->
    <div>
      <p class="lbl">Select — default</p>
      <div class="field">
        <div class="select-wrap">
          <select class="ff-select" id="s-default" aria-label="Visibility">
            <option value="" disabled>Choose visibility…</option>
            <option value="private" selected>Private</option>
            <option value="org">Organization</option>
            <option value="public">Public</option>
          </select>
          <span class="chevron" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </span>
        </div>
      </div>
    </div>

    <!-- Select — with label -->
    <div>
      <p class="lbl">Select — with label</p>
      <div class="field">
        <label class="field-label" for="s-labeled">Mount target</label>
        <div class="select-wrap">
          <select class="ff-select" id="s-labeled">
            <option value="main">Main canvas</option>
            <option value="panel" selected>Side panel</option>
            <option value="modal">Modal</option>
          </select>
          <span class="chevron" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
