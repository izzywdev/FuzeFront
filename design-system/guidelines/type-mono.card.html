<!-- @dsCard group="Type" viewport="720x240" name="Data — JetBrains Mono" subtitle="The voice of the machine: IDs, scopes, remoteEntry URLs" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body {
    margin: 0;
    padding: var(--space-6);
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
  }
  .stack { display: grid; gap: var(--space-3); }
  .row {
    display: grid;
    grid-template-columns: 120px 1fr;
    align-items: center;
    gap: var(--space-4);
    background: var(--bg-tertiary);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
  }
  .label {
    font-family: var(--font-sans);
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    letter-spacing: var(--tracking-wide);
    text-transform: uppercase;
    color: var(--text-tertiary);
  }
  .data {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--text-primary);
    word-break: break-all;
  }
  .data .key { color: var(--accent-2); }
  .data .scope { color: var(--accent-color); }
  .caption {
    margin-top: var(--space-4);
    display: flex;
    gap: var(--space-6);
    flex-wrap: wrap;
    font-family: var(--font-mono);
    font-size: var(--text-2xs);
    color: var(--text-tertiary);
  }
  .caption b { color: var(--text-secondary); font-weight: var(--weight-semibold); }
</style></head><body>
  <div class="stack">
    <div class="row">
      <div class="label">app id</div>
      <div class="data"><span class="key">app_</span>fuzeclock_01HZX9</div>
    </div>
    <div class="row">
      <div class="label">scope</div>
      <div class="data"><span class="scope">fuzeclock</span>/remote</div>
    </div>
    <div class="row">
      <div class="label">remoteEntry</div>
      <div class="data">https://cdn.fuzefront.dev/<span class="scope">fuzeclock</span>/<span class="key">remoteEntry.js</span></div>
    </div>
  </div>
  <div class="caption">
    <span><b>--font-mono</b> · JetBrains Mono</span>
    <span><b>--role-data-font</b> · IDs · scopes · remotes</span>
    <span><b>--text-sm</b> · 0.8125rem / 13px</span>
  </div>
</body></html>
