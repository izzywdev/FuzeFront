<!-- @dsCard group="Spacing" viewport="720x240" name="Spacing scale" subtitle="4px base rhythm" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: var(--space-6); font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); }
  .scale { display: flex; flex-direction: column; gap: var(--space-2); }
  .row { display: grid; grid-template-columns: 96px 1fr; align-items: center; gap: var(--space-3); }
  .label { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-secondary); white-space: nowrap; }
  .label b { color: var(--text-primary); font-weight: 600; }
  .label .px { color: var(--text-tertiary); }
  .bar { height: 16px; border-radius: var(--radius-sm); background: var(--seam); box-shadow: var(--shadow-xs); }
</style></head><body>
  <div class="scale">
    <div class="row"><div class="label"><b>--space-1</b> <span class="px">4px</span></div><div class="bar" style="width:var(--space-1)"></div></div>
    <div class="row"><div class="label"><b>--space-2</b> <span class="px">8px</span></div><div class="bar" style="width:var(--space-2)"></div></div>
    <div class="row"><div class="label"><b>--space-3</b> <span class="px">12px</span></div><div class="bar" style="width:var(--space-3)"></div></div>
    <div class="row"><div class="label"><b>--space-4</b> <span class="px">16px</span></div><div class="bar" style="width:var(--space-4)"></div></div>
    <div class="row"><div class="label"><b>--space-5</b> <span class="px">20px</span></div><div class="bar" style="width:var(--space-5)"></div></div>
    <div class="row"><div class="label"><b>--space-6</b> <span class="px">24px</span></div><div class="bar" style="width:var(--space-6)"></div></div>
    <div class="row"><div class="label"><b>--space-8</b> <span class="px">32px</span></div><div class="bar" style="width:var(--space-8)"></div></div>
    <div class="row"><div class="label"><b>--space-10</b> <span class="px">40px</span></div><div class="bar" style="width:var(--space-10)"></div></div>
    <div class="row"><div class="label"><b>--space-12</b> <span class="px">48px</span></div><div class="bar" style="width:var(--space-12)"></div></div>
    <div class="row"><div class="label"><b>--space-16</b> <span class="px">64px</span></div><div class="bar" style="width:var(--space-16)"></div></div>
  </div>
</body></html>
