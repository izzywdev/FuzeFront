<!-- @dsCard group="Colors" viewport="720x180" name="Text — Primary / Secondary / Tertiary" subtitle="The three text levels on the dark shell" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .line { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; }
  .sample { font-size: var(--text-xl); font-weight: var(--weight-medium); }
  .p1 { color: var(--text-primary); }
  .p2 { color: var(--text-secondary); }
  .p3 { color: var(--text-tertiary); }
  .meta { display: flex; gap: 12px; align-items: baseline; flex: none; }
  .name { font-size: var(--text-xs); font-weight: var(--weight-semibold); color: var(--text-secondary); }
  .hex { font-size: var(--text-2xs); color: var(--text-tertiary); font-family: var(--font-mono); text-transform: uppercase; }
</style></head><body>
  <div class="stack">
    <div class="line">
      <div class="sample p1">The runtime fabric reads here.</div>
      <div class="meta"><div class="name">--text-primary</div><div class="hex">#E7ECF5</div></div>
    </div>
    <div class="line">
      <div class="sample p2">Supporting copy steps back a notch.</div>
      <div class="meta"><div class="name">--text-secondary</div><div class="hex">#9FA9BC</div></div>
    </div>
    <div class="line">
      <div class="sample p3">Captions and meta sit quietest.</div>
      <div class="meta"><div class="name">--text-tertiary</div><div class="hex">#66718A</div></div>
    </div>
  </div>
</body></html>
