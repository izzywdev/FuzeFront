# Skaffold — local in-cluster dev loop for FuzeFront on kind.
#
#   skaffold run     # one-shot: build images -> load into kind -> deploy
#   skaffold dev     # watch sources, rebuild + reload + redeploy on change
#   skaffold verify  # run the Playwright sign-in check against the deployment
#
# Prereqs:
#   - kind cluster "fuzeinfra" exists with FuzeInfra (Postgres/Redis) deployed and
#     ingress-nginx installed (see FuzeInfra: make kind-up).
#   - HELM 3 on PATH. Skaffold's Helm renderer uses the Helm-3 plugin format and
#     cannot parse Helm 4's plugin.yaml; if your system helm is v4, put a helm 3
#     binary earlier on PATH for skaffold invocations.
#   - Windows: enable Developer Mode (Skaffold's Helm post-renderer is installed
#     via a symlink, which needs that privilege).
# Skaffold auto-loads images into kind (build.local.push=false + a kind
# kube-context), so no registry is needed.
apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: fuzefront

build:
  local:
    push: false # kind: load images into nodes instead of pushing to a registry
    useBuildkit: true
  artifacts:
    - image: fuzefront/backend
      # Root context so the backend image can build the @fuzefront/shared kafka
      # sub-barrel (mirrors email-service). See backend/Dockerfile.
      context: .
      docker:
        dockerfile: backend/Dockerfile
    - image: fuzefront/frontend
      context: frontend
      docker:
        buildArgs:
          VITE_API_URL: http://fuzefront.dev.local
    - image: fuzefront/clock-app
      context: clock-app
    - image: fuzefront/email-service
      context: .
      docker:
        dockerfile: services/email-service/Dockerfile
    - image: fuzefront/sms-service
      context: .
      docker:
        dockerfile: services/sms-service/Dockerfile
    - image: fuzefront/provisioning-service
      context: .
      docker:
        dockerfile: services/provisioning-service/Dockerfile
    - image: fuzefront/billing-service
      # Root context so the image can build the @fuzefront/shared kafka
      # sub-barrel (mirrors email-service). See services/billing-service/Dockerfile.
      context: .
      docker:
        dockerfile: services/billing-service/Dockerfile
    - image: fuzefront/security-service
      # Root context so the image can build @fuzefront/core + @fuzefront/shared.
      context: .
      docker:
        dockerfile: backend/security/Dockerfile
    - image: fuzefront/applications-service
      context: .
      docker:
        dockerfile: backend/applications/Dockerfile

manifests:
  helm:
    releases:
      - name: fuzefront
        chartPath: deploy/helm/fuzefront
        namespace: fuzefront
        createNamespace: true
        valuesFiles:
          - deploy/helm/fuzefront/values-local.yaml
        # Inject the freshly-built image refs into the chart's image values.
        setValueTemplates:
          backend.image.repository: '{{.IMAGE_REPO_fuzefront_backend}}'
          backend.image.tag: '{{.IMAGE_TAG_fuzefront_backend}}'
          frontend.image.repository: '{{.IMAGE_REPO_fuzefront_frontend}}'
          frontend.image.tag: '{{.IMAGE_TAG_fuzefront_frontend}}'
          emailService.image.repository: "{{.IMAGE_REPO_fuzefront_email_service}}"
          emailService.image.tag: "{{.IMAGE_TAG_fuzefront_email_service}}"
          smsService.image.repository: "{{.IMAGE_REPO_fuzefront_sms_service}}"
          smsService.image.tag: "{{.IMAGE_TAG_fuzefront_sms_service}}"
          provisioningService.image.repository: "{{.IMAGE_REPO_fuzefront_provisioning_service}}"
          provisioningService.image.tag: "{{.IMAGE_TAG_fuzefront_provisioning_service}}"
          billingService.image.repository: "{{.IMAGE_REPO_fuzefront_billing_service}}"
          billingService.image.tag: "{{.IMAGE_TAG_fuzefront_billing_service}}"
          securityService.image.repository: "{{.IMAGE_REPO_fuzefront_security_service}}"
          securityService.image.tag: "{{.IMAGE_TAG_fuzefront_security_service}}"
          applicationsService.image.repository: "{{.IMAGE_REPO_fuzefront_applications_service}}"
          applicationsService.image.tag: "{{.IMAGE_TAG_fuzefront_applications_service}}"
  # clock-app example: image ref is substituted automatically from the artifact.
  rawYaml:
    - deploy/examples/clock-app.yaml

deploy:
  kubeContext: kind-fuzeinfra
  # Apply the Helm-rendered chart + the rawYaml example in a single pass.
  # defaultNamespace pins resources that don't carry an explicit namespace to
  # the fuzefront namespace — Helm-templated manifests omit metadata.namespace,
  # which would otherwise land them in "default" and collide cluster-wide.
  kubectl:
    defaultNamespace: fuzefront

# After `skaffold run`/`dev`, run the Playwright sign-in check against the
# deployment with:  cd frontend && npm run test:e2e
# (BASE_URL defaults to http://fuzefront.dev.local). The same spec runs in CI
# on every PR — see .github/workflows/e2e.yml.
