name: Claude

# Lets maintainers delegate work to Claude by mentioning @claude in an issue,
# issue comment, PR, or review comment. Claude reads the thread + repo and
# responds / pushes a claude/** branch. The companion `claude-auto-pr.yml`
# workflow then opens a draft PR from that branch (issue -> PR autonomy).
#
# Requires repo secret: ANTHROPIC_API_KEY.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ${{ fromJSON(vars.RUNNER || '["ubuntu-latest"]') }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v5
        with:
          fetch-depth: 1

      - name: Run Claude
        uses: anthropics/claude-code-action@428971d2ecd6e3a7cb0ee0da2a3a8b33fdb3678d  # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          settings: ${{ secrets.PENPOT_MCP_URL != '' && format('{{"mcpServers":{{"penpot":{{"type":"sse","url":"{0}"}}}}}}', secrets.PENPOT_MCP_URL) || '{}' }}
