name: OIDC Plumbing E2E

# Full end-to-end test of the OIDC authentication stack using a LOCAL Authentik
# user — no Google OAuth credentials or Cloudflare tunnel required.
#
# What is tested (every component is real, nothing is mocked):
#   FuzeFront frontend → backend /api/auth/oidc/login → Authentik authorization
#   endpoint → Playwright fills native Authentik login UI → Authentik issues code
#   → backend /api/auth/oidc/callback (real PKCE) → backend POSTs Authentik
#   /token/ (real token exchange) → Authentik returns signed JWT → backend
#   creates session → frontend stores JWT → /dashboard
#
# This job runs on EVERY push and pull_request to master — it is a required
# check for the integration. It replaces the mocked "E2E" tests (google-signin.spec.ts)
# that only tested frontend rendering logic without touching Authentik.

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/helm/fuzefront/authentik/blueprints/**'
      - 'docker-compose.e2e.yml'
      - 'deploy/e2e/**'
      - '.github/workflows/oidc-plumbing-e2e.yml'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/helm/fuzefront/authentik/blueprints/**'
      - 'docker-compose.e2e.yml'
      - 'deploy/e2e/**'
      - '.github/workflows/oidc-plumbing-e2e.yml'
  workflow_dispatch: {}

concurrency:
  group: oidc-plumbing-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  oidc-plumbing-e2e:
    name: OIDC plumbing (local user, no Google)
    runs-on: ubuntu-latest

    env:
      # No tunnel — backend and browser both reach Authentik via Docker-published port 9000.
      # The /etc/hosts step below maps authentik-server → 127.0.0.1 for Playwright.
      AUTHENTIK_EXTERNAL_URL: http://authentik-server:9000
      AUTHENTIK_ISSUER_URL: http://authentik-server:9000/application/o/fuzefront/
      AUTHENTIK_COOKIE_DOMAIN: authentik-server
      AUTHENTIK_OIDC_CLIENT_SECRET: e2e-oidc-client-secret
      # Test user created by the "Create E2E test user" step below
      E2E_USER_EMAIL: e2e@test.local
      E2E_USER_PASSWORD: E2eP@ssw0rd123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # ── /etc/hosts entry so Playwright can reach authentik-server:9000 ────
      # Authentik's OIDC metadata (authorization_endpoint) uses the same hostname
      # (authentik-server) that the backend uses for server-side discovery.
      # Adding 127.0.0.1 → authentik-server makes it browser-reachable too
      # without any external URL or tunnel dependency.
      - name: Map authentik-server to localhost in /etc/hosts
        run: echo "127.0.0.1 authentik-server" | sudo tee -a /etc/hosts

      - name: Install root workspace (for frontend + Playwright deps)
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers (Chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── Start the E2E stack (no tunnel profile — cloudflared not started) ─
      - name: Start E2E stack
        run: |
          docker compose -f docker-compose.e2e.yml up -d --build
        timeout-minutes: 20
        env:
          AUTHENTIK_EXTERNAL_URL: ${{ env.AUTHENTIK_EXTERNAL_URL }}
          AUTHENTIK_ISSUER_URL: ${{ env.AUTHENTIK_ISSUER_URL }}
          AUTHENTIK_COOKIE_DOMAIN: ${{ env.AUTHENTIK_COOKIE_DOMAIN }}
          AUTHENTIK_OIDC_CLIENT_SECRET: ${{ env.AUTHENTIK_OIDC_CLIENT_SECRET }}

      # ── Wait for Authentik API ────────────────────────────────────────────
      # Authentik on a fresh DB runs 100+ Django migrations before it can serve
      # any requests.  On slower GitHub Actions runners this can take 15-20 min.
      #
      # Strategy: poll the REST API with the bootstrap token (not OIDC discovery)
      # for up to 20 minutes. The API being available means migrations are done
      # and the bootstrap token is active. We then provision the OIDC provider
      # and application via REST API instead of relying on the custom blueprint
      # (the blueprint runner applies entries at debug log level so silent failures
      # are invisible at info log level; the REST API gives us explicit control).
      - name: Wait for Authentik API to become healthy
        run: |
          echo "Waiting for Authentik API (migrations + bootstrap token, up to 20 minutes)..."
          for i in $(seq 1 240); do
            STATUS=$(curl -o /dev/null -w "%{http_code}" -s \
              -H "Authorization: Bearer e2e-bootstrap-token" \
              "http://authentik-server:9000/api/v3/core/users/" \
              2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Authentik API ready after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 240 ]; then
              echo "Authentik API did not become available in 20 minutes"
              echo "=== authentik-server (last 60 lines) ==="
              docker compose -f docker-compose.e2e.yml logs authentik-server | tail -60
              echo "=== authentik-worker (last 200 lines) ==="
              docker compose -f docker-compose.e2e.yml logs authentik-worker | tail -200
              exit 1
            fi
            if [ $((i % 12)) -eq 0 ]; then
              echo "Still waiting... $((i * 5))s elapsed (last status: $STATUS)"
            fi
            sleep 5
          done

      # ── Provision FuzeFront OIDC via REST API ────────────────────────────
      # The custom blueprint runner silently fails to create entries when !Find
      # references within attrs cannot resolve at apply time (logged at debug,
      # invisible at info). Provisioning via REST API gives explicit error
      # reporting and is idempotent (check-then-create).
      - name: Provision FuzeFront OIDC provider and application via REST API
        run: |
          BASE="http://authentik-server:9000/api/v3"
          AUTH="Authorization: Bearer e2e-bootstrap-token"
          CT="Content-Type: application/json"

          # Check if the FuzeFront application already exists (blueprint may have worked)
          APP_RAW=$(curl -s -H "$AUTH" "$BASE/core/applications/?search=fuzefront")
          APP_COUNT=$(echo "$APP_RAW" | jq '.results | length' 2>/dev/null || echo "0")
          if [ "$APP_COUNT" -gt "0" ]; then
            echo "FuzeFront application already exists (blueprint succeeded) — skipping REST provisioning"
            exit 0
          fi
          echo "FuzeFront application not found — provisioning via REST API"

          # ── Find the authorization flow ──────────────────────────────────
          # Use Authentik's default implicit-consent flow which already has the
          # implicit-consent stage bound. Creating a new empty flow causes
          # access_denied because a flow with no stages can't complete authorization.
          FLOW_ALL=$(curl -s -H "$AUTH" "$BASE/flows/instances/?designation=authorization&ordering=slug")
          echo "Authorization flows available: $(echo "$FLOW_ALL" | jq '[.results[].slug]' 2>/dev/null)"
          # Prefer default-provider-authorization-implicit-consent (Authentik bootstrap default)
          FLOW_PK=$(echo "$FLOW_ALL" | jq -r '.results[] | select(.slug=="default-provider-authorization-implicit-consent") | .pk' 2>/dev/null | head -1 || true)
          # Fall back to any authorization flow if the default slug is absent
          if [ -z "$FLOW_PK" ] || [ "$FLOW_PK" = "null" ]; then
            FLOW_PK=$(echo "$FLOW_ALL" | jq -r '.results[0].pk // empty' 2>/dev/null || true)
          fi
          if [ -z "$FLOW_PK" ] || [ "$FLOW_PK" = "null" ]; then
            echo "ERROR: no authorization flow found in Authentik — bootstrap may have failed"
            exit 1
          fi
          echo "Using authorization flow pk=$FLOW_PK"

          # ── Get or create scope mappings via Python ORM ────────────────────
          # /api/v3/propertymappings/scope/ returns 405 for POST and 404 for GET
          # in this Authentik 2024.12.3 setup — the URL pattern is not registered
          # at the Django routing layer (auth_via:unauthenticated on 404 confirms
          # the request never reaches auth middleware). Bypass REST entirely: use
          # docker exec to run Python inside the authentik-worker container with
          # direct ORM access to the shared Postgres database.
          echo "Getting scope mapping PKs via Python ORM (docker exec authentik-worker)..."
          SCOPE_OUTPUT=$(docker compose -f docker-compose.e2e.yml exec -T \
            authentik-worker python - << 'PYEOF'
          import os
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "authentik.root.settings")
          import django
          django.setup()
          from authentik.providers.oauth2.models import ScopeMapping
          def ensure_scope(name, scope_name, expr):
              sm, _ = ScopeMapping.objects.get_or_create(name=name, defaults={"scope_name": scope_name, "expression": expr})
              print("SCOPE_" + scope_name.upper() + "=" + str(sm.pk))
          ensure_scope("FuzeFront OIDC scope - openid", "openid", "return {}")
          ensure_scope("FuzeFront OIDC scope - email", "email", 'return {"email": request.user.email, "email_verified": True}')
          ensure_scope("FuzeFront OIDC scope - profile", "profile", 'return {"name": request.user.name, "given_name": request.user.name, "preferred_username": request.user.username}')
          PYEOF
          )
          echo "Scope output: $SCOPE_OUTPUT"
          SCOPE_OPENID=$(echo "$SCOPE_OUTPUT" | grep "^SCOPE_OPENID=" | head -1 | cut -d= -f2 | tr -d '\r\n ')
          SCOPE_EMAIL=$(echo "$SCOPE_OUTPUT" | grep "^SCOPE_EMAIL=" | head -1 | cut -d= -f2 | tr -d '\r\n ')
          SCOPE_PROFILE=$(echo "$SCOPE_OUTPUT" | grep "^SCOPE_PROFILE=" | head -1 | cut -d= -f2 | tr -d '\r\n ')
          if [ -z "$SCOPE_OPENID" ] || [ -z "$SCOPE_EMAIL" ] || [ -z "$SCOPE_PROFILE" ]; then
            echo "ERROR: Could not get scope mapping PKs from Python ORM"
            echo "  openid:  ${SCOPE_OPENID:-MISSING}"
            echo "  email:   ${SCOPE_EMAIL:-MISSING}"
            echo "  profile: ${SCOPE_PROFILE:-MISSING}"
            exit 1
          fi

          echo "Scope mapping PKs: openid=$SCOPE_OPENID email=$SCOPE_EMAIL profile=$SCOPE_PROFILE"

          # ── Find or create the invalidation flow ─────────────────────────
          # Authentik 2024.12.3 requires invalidation_flow on the OAuth2 provider.
          INV_FLOW_RAW=$(curl -s -H "$AUTH" "$BASE/flows/instances/?designation=invalidation")
          INV_FLOW_PK=$(echo "$INV_FLOW_RAW" | jq -r '.results[0].pk // empty' 2>/dev/null || true)
          echo "Invalidation flow lookup: pk=${INV_FLOW_PK:-NOT_FOUND}"

          if [ -z "$INV_FLOW_PK" ] || [ "$INV_FLOW_PK" = "null" ]; then
            echo "Creating invalidation flow..."
            INV_HTTP=$(curl -s -X POST "$BASE/flows/instances/" \
              -H "$AUTH" -H "$CT" \
              -o /tmp/inv_flow_create.json -w "%{http_code}" \
              -d '{"name":"FuzeFront Invalidation Flow","slug":"fuzefront-invalidation-flow","designation":"invalidation","title":"Signed Out","authentication":"none","policy_engine_mode":"all"}')
            INV_RAW=$(cat /tmp/inv_flow_create.json)
            echo "Invalidation flow create HTTP $INV_HTTP: $INV_RAW"
            if [ "$INV_HTTP" != "201" ]; then
              echo "ERROR: failed to create invalidation flow (HTTP $INV_HTTP)"
              exit 1
            fi
            INV_FLOW_PK=$(echo "$INV_RAW" | jq -r '.pk // empty' 2>/dev/null || true)
            if [ -z "$INV_FLOW_PK" ] || [ "$INV_FLOW_PK" = "null" ]; then
              echo "ERROR: no pk in invalidation flow create response"
              exit 1
            fi
            echo "Created invalidation flow pk=$INV_FLOW_PK"
          fi

          # ── Find or create the OAuth2 provider ──────────────────────────
          PROVIDER_HTTP=$(curl -s -H "$AUTH" \
            -o /tmp/provider_lookup.json -w "%{http_code}" \
            "$BASE/providers/oauth2/?search=FuzeFront")
          PROVIDER_RAW=$(cat /tmp/provider_lookup.json)
          echo "Provider lookup HTTP $PROVIDER_HTTP: ${PROVIDER_RAW:0:300}"
          PROVIDER_PK=$(echo "$PROVIDER_RAW" | jq -r '.results[]? | select(.name=="FuzeFront") | .pk' 2>/dev/null | head -1 || true)

          if [ -z "$PROVIDER_PK" ] || [ "$PROVIDER_PK" = "null" ]; then
            echo "Creating FuzeFront OAuth2 provider..."
            PROVIDER_BODY=$(jq -n \
              --arg secret "$AUTHENTIK_OIDC_CLIENT_SECRET" \
              --arg flow "$FLOW_PK" \
              --arg inv_flow "$INV_FLOW_PK" \
              --arg m1 "$SCOPE_OPENID" --arg m2 "$SCOPE_EMAIL" --arg m3 "$SCOPE_PROFILE" \
              '{name:"FuzeFront",client_type:"confidential",client_id:"fuzefront-oidc-client",client_secret:$secret,redirect_uris:[{matching_mode:"strict",url:"http://fuzefront.dev.local/api/auth/oidc/callback"},{matching_mode:"strict",url:"https://fuzefront.dev.local/api/auth/oidc/callback"},{matching_mode:"strict",url:"https://app.fuzefront.com/api/auth/oidc/callback"},{matching_mode:"strict",url:"http://localhost:3001/api/auth/oidc/callback"}],property_mappings:[$m1,$m2,$m3],sub_mode:"user_email",include_claims_in_id_token:true,authorization_flow:$flow,invalidation_flow:$inv_flow}')
            PROVIDER_HTTP=$(curl -s -X POST "$BASE/providers/oauth2/" \
              -H "$AUTH" -H "$CT" \
              -o /tmp/provider_create.json -w "%{http_code}" \
              -d "$PROVIDER_BODY")
            PROVIDER_RAW=$(cat /tmp/provider_create.json)
            echo "Provider create HTTP $PROVIDER_HTTP: $PROVIDER_RAW"
            if [ "$PROVIDER_HTTP" != "201" ]; then
              echo "ERROR: failed to create OAuth2 provider (HTTP $PROVIDER_HTTP)"
              exit 1
            fi
            PROVIDER_PK=$(echo "$PROVIDER_RAW" | jq -r '.pk // empty' 2>/dev/null || true)
            if [ -z "$PROVIDER_PK" ] || [ "$PROVIDER_PK" = "null" ]; then
              echo "ERROR: no pk in provider create response"
              exit 1
            fi
            echo "Created OAuth2 provider pk=$PROVIDER_PK"
          else
            echo "OAuth2 provider already exists pk=$PROVIDER_PK"
          fi

          # ── Create the application ──────────────────────────────────────
          echo "Creating FuzeFront application..."
          APP_BODY=$(jq -n --argjson provider "$PROVIDER_PK" \
            '{name:"FuzeFront",slug:"fuzefront",provider:$provider,meta_launch_url:"https://fuzefront.dev.local/",meta_description:"FuzeFront runtime microfrontend platform",policy_engine_mode:"all",open_in_new_tab:false}')
          APP_HTTP=$(curl -s -X POST "$BASE/core/applications/" \
            -H "$AUTH" -H "$CT" \
            -o /tmp/app_create.json -w "%{http_code}" \
            -d "$APP_BODY")
          APP_RAW=$(cat /tmp/app_create.json)
          echo "Application create HTTP $APP_HTTP: $APP_RAW"
          if [ "$APP_HTTP" != "201" ]; then
            echo "ERROR: failed to create application (HTTP $APP_HTTP)"
            exit 1
          fi
          APP_SLUG=$(echo "$APP_RAW" | jq -r '.slug // empty' 2>/dev/null || true)
          if [ -z "$APP_SLUG" ] || [ "$APP_SLUG" = "null" ]; then
            echo "ERROR: no slug in application create response"
            exit 1
          fi
          echo "Created application slug=$APP_SLUG"

          # ── Wait briefly for OIDC discovery to become available ─────────
          echo "Waiting for OIDC discovery to be available (up to 3 minutes)..."
          for i in $(seq 1 36); do
            if curl -fsS "http://authentik-server:9000/application/o/fuzefront/.well-known/openid-configuration" >/dev/null 2>&1; then
              echo "OIDC discovery available after $((i * 5))s"
              exit 0
            fi
            sleep 5
          done
          echo "WARNING: OIDC discovery not available after 3 minutes — continuing anyway"

      # ── Verify blueprint status ────────────────────────────────────────────
      # Runs with if: always() so it captures state even when OIDC discovery
      # times out — this is the primary diagnostic for blueprint failures.
      - name: Check Authentik blueprint status
        if: always()
        run: |
          echo "=== Blueprint instances ==="
          curl -s "http://authentik-server:9000/api/v3/blueprints/instances/" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {name: .name, status: .status, last_applied: .last_applied}' || true
          echo "=== FuzeFront OIDC provider check ==="
          curl -s "http://authentik-server:9000/api/v3/providers/oauth2/?search=FuzeFront" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {name: .name, client_id: .client_id, authorization_flow: .authorization_flow}' || true
          echo "=== FuzeFront application check ==="
          curl -s "http://authentik-server:9000/api/v3/core/applications/?search=fuzefront" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {name: .name, slug: .slug, policy_engine_mode: .policy_engine_mode}' || true
          echo "=== implicit-consent flow check ==="
          curl -s "http://authentik-server:9000/api/v3/flows/instances/?search=implicit-consent" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {slug: .slug, designation: .designation}' || true
          echo "=== Scope mappings (FuzeFront custom, via Python ORM) ==="
          docker compose -f docker-compose.e2e.yml exec -T authentik-worker python - << 'PYEOF' || true
          import os
          os.environ.setdefault("DJANGO_SETTINGS_MODULE", "authentik.root.settings")
          import django
          django.setup()
          from authentik.providers.oauth2.models import ScopeMapping
          for sm in ScopeMapping.objects.filter(name__startswith="FuzeFront"):
              print({"name": sm.name, "scope_name": sm.scope_name, "pk": str(sm.pk)})
          PYEOF

      # ── Create the E2E test user via Authentik REST API ───────────────────
      # Uses the bootstrap token (AUTHENTIK_BOOTSTRAP_TOKEN=e2e-bootstrap-token).
      # This is cleaner than a blueprint because it's a simple API call and
      # produces no git-committed passwords.
      - name: Create E2E test user in Authentik
        run: |
          # Create user (internal type = password-based login).
          # Retry up to 10 times with 10s backoff in case the bootstrap token
          # is not yet active (the server applies the token during startup;
          # rarely it's not ready immediately after OIDC discovery is up).
          USER_PK=""
          for attempt in $(seq 1 10); do
            RESPONSE=$(curl -s -X POST http://authentik-server:9000/api/v3/core/users/ \
              -H "Authorization: Bearer e2e-bootstrap-token" \
              -H "Content-Type: application/json" \
              -d '{
                "username": "e2e-test",
                "name": "E2E Test User",
                "email": "e2e@test.local",
                "is_active": true,
                "type": "internal"
              }')
            echo "Create user attempt $attempt: $RESPONSE"
            USER_PK=$(echo "$RESPONSE" | jq -r '.pk // empty')
            if [ -n "$USER_PK" ] && [ "$USER_PK" != "null" ]; then
              break
            fi
            # Check for "already exists" (username conflict = already created)
            if echo "$RESPONSE" | jq -e '.username[]?' 2>/dev/null | grep -q "already exists"; then
              echo "User already exists — fetching pk"
              USER_PK=$(curl -s "http://authentik-server:9000/api/v3/core/users/?search=e2e-test" \
                -H "Authorization: Bearer e2e-bootstrap-token" | jq -r '.results[0].pk // empty')
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "Failed to create user after 10 attempts"
              exit 1
            fi
            echo "Retrying in 10s..."
            sleep 10
          done

          if [ -z "$USER_PK" ] || [ "$USER_PK" = "null" ]; then
            echo "Could not obtain user pk"
            exit 1
          fi

          # Set the user's password
          SET_PW=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://authentik-server:9000/api/v3/core/users/${USER_PK}/set_password/" \
            -H "Authorization: Bearer e2e-bootstrap-token" \
            -H "Content-Type: application/json" \
            -d "{\"password\": \"${E2E_USER_PASSWORD}\"}")
          echo "Set password HTTP status: $SET_PW"
          if [ "$SET_PW" != "204" ]; then
            echo "Failed to set password (expected 204, got $SET_PW)"
            exit 1
          fi

          echo "E2E test user created successfully (pk=${USER_PK}, email=e2e@test.local)"

      # ── Wait for backend and frontend ──────────────────────────────────────
      - name: Wait for backend health
        run: |
          for i in $(seq 1 18); do
            if curl -fsS http://localhost:3001/health >/dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "Backend did not become ready"
              docker compose -f docker-compose.e2e.yml logs backend | tail -40
              exit 1
            fi
            sleep 5
          done

      - name: Wait for backend OIDC login to be ready
        run: |
          echo "Waiting for backend OIDC login endpoint (up to 90s)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -o /dev/null -w "%{http_code}" -s --max-redirs 0 http://localhost:3001/api/auth/oidc/login)
            if [ "$STATUS" = "302" ]; then
              echo "Backend OIDC login ready (returned 302) after $((i * 5))s"
              break
            fi
            echo "Attempt $i: OIDC login returned $STATUS, waiting..."
            if [ "$i" -eq 18 ]; then
              echo "ERROR: Backend OIDC login not ready after 90s"
              docker compose -f docker-compose.e2e.yml logs backend | tail -30
              exit 1
            fi
            sleep 5
          done

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:4173 >/dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Frontend did not become ready in 60s"
              exit 1
            fi
            sleep 5
          done

      # ── Run OIDC plumbing E2E tests ────────────────────────────────────────
      - name: Run OIDC plumbing E2E tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:4173
          BACKEND_URL: http://localhost:3001
          AUTHENTIK_URL: http://authentik-server:9000
          E2E_USER_EMAIL: ${{ env.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ env.E2E_USER_PASSWORD }}
          # The plumbing test doesn't need Google-specific env vars.
          # Run headless (Authentik login page has no bot detection).
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ''
        run: npx playwright test tests/oidc-plumbing.e2e.spec.ts --project=chromium --reporter=list,html --timeout 180000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oidc-plumbing-playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Dump compose logs on failure
        if: failure()
        run: |
          echo "=== authentik-server (last 120 lines) ==="
          docker compose -f docker-compose.e2e.yml logs authentik-server | tail -120
          echo "=== authentik-worker (last 200 lines) ==="
          docker compose -f docker-compose.e2e.yml logs authentik-worker | tail -200
          echo "=== backend (last 200 lines — full, unfiltered) ==="
          docker compose -f docker-compose.e2e.yml logs backend | tail -200
          echo "=== frontend ==="
          docker compose -f docker-compose.e2e.yml logs frontend | tail -20

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
