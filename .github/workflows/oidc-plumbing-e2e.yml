name: OIDC Plumbing E2E

# Full end-to-end test of the OIDC authentication stack using a LOCAL Authentik
# user — no Google OAuth credentials or Cloudflare tunnel required.
#
# What is tested (every component is real, nothing is mocked):
#   FuzeFront frontend → backend /api/auth/oidc/login → Authentik authorization
#   endpoint → Playwright fills native Authentik login UI → Authentik issues code
#   → backend /api/auth/oidc/callback (real PKCE) → backend POSTs Authentik
#   /token/ (real token exchange) → Authentik returns signed JWT → backend
#   creates session → frontend stores JWT → /dashboard
#
# This job runs on EVERY push and pull_request to master — it is a required
# check for the integration. It replaces the mocked "E2E" tests (google-signin.spec.ts)
# that only tested frontend rendering logic without touching Authentik.

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/helm/fuzefront/authentik/blueprints/**'
      - 'docker-compose.e2e.yml'
      - 'deploy/e2e/**'
      - '.github/workflows/oidc-plumbing-e2e.yml'
  pull_request:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/helm/fuzefront/authentik/blueprints/**'
      - 'docker-compose.e2e.yml'
      - 'deploy/e2e/**'
      - '.github/workflows/oidc-plumbing-e2e.yml'
  workflow_dispatch: {}

concurrency:
  group: oidc-plumbing-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  oidc-plumbing-e2e:
    name: OIDC plumbing (local user, no Google)
    runs-on: ubuntu-latest

    env:
      # No tunnel — backend and browser both reach Authentik via Docker-published port 9000.
      # The /etc/hosts step below maps authentik-server → 127.0.0.1 for Playwright.
      AUTHENTIK_EXTERNAL_URL: http://authentik-server:9000
      AUTHENTIK_ISSUER_URL: http://authentik-server:9000/application/o/fuzefront/
      AUTHENTIK_COOKIE_DOMAIN: authentik-server
      AUTHENTIK_OIDC_CLIENT_SECRET: e2e-oidc-client-secret
      # Test user created by the "Create E2E test user" step below
      E2E_USER_EMAIL: e2e@test.local
      E2E_USER_PASSWORD: E2eP@ssw0rd123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # ── /etc/hosts entry so Playwright can reach authentik-server:9000 ────
      # Authentik's OIDC metadata (authorization_endpoint) uses the same hostname
      # (authentik-server) that the backend uses for server-side discovery.
      # Adding 127.0.0.1 → authentik-server makes it browser-reachable too
      # without any external URL or tunnel dependency.
      - name: Map authentik-server to localhost in /etc/hosts
        run: echo "127.0.0.1 authentik-server" | sudo tee -a /etc/hosts

      - name: Install root workspace (for frontend + Playwright deps)
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers (Chromium only)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # ── Start the E2E stack (no tunnel profile — cloudflared not started) ─
      - name: Start E2E stack
        run: |
          docker compose -f docker-compose.e2e.yml up -d --build
        timeout-minutes: 20
        env:
          AUTHENTIK_EXTERNAL_URL: ${{ env.AUTHENTIK_EXTERNAL_URL }}
          AUTHENTIK_ISSUER_URL: ${{ env.AUTHENTIK_ISSUER_URL }}
          AUTHENTIK_COOKIE_DOMAIN: ${{ env.AUTHENTIK_COOKIE_DOMAIN }}
          AUTHENTIK_OIDC_CLIENT_SECRET: ${{ env.AUTHENTIK_OIDC_CLIENT_SECRET }}

      # ── Wait for Authentik ─────────────────────────────────────────────────
      # Authentik takes 2-3 minutes to start and apply blueprints on first boot.
      # We wait for BOTH the server health endpoint AND the OIDC discovery
      # endpoint because:
      #   - /-/health/ready/ passes once gunicorn starts (~10s)
      #   - The OIDC provider is created by the authentik-worker via blueprints
      #     (asynchronous, may take 60-120s after the server is healthy)
      # Only once the OIDC discovery endpoint returns 200 are blueprints applied
      # and the bootstrap token usable for API calls.
      - name: Wait for Authentik to become healthy and blueprints applied
        run: |
          echo "Waiting for Authentik server health (up to 5 minutes)..."
          for i in $(seq 1 60); do
            if curl -fsS http://authentik-server:9000/-/health/ready/ >/dev/null 2>&1; then
              echo "Authentik server healthy after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Authentik did not become ready in 5 minutes"
              docker compose -f docker-compose.e2e.yml logs authentik-server | tail -60
              exit 1
            fi
            sleep 5
          done

          echo "Waiting for OIDC discovery (blueprints applied, up to 10 more minutes)..."
          for i in $(seq 1 120); do
            if curl -fsS "http://authentik-server:9000/application/o/fuzefront/.well-known/openid-configuration" >/dev/null 2>&1; then
              echo "OIDC discovery available after $((i * 5))s"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "OIDC discovery did not become available in 10 minutes — blueprints may have failed"
              docker compose -f docker-compose.e2e.yml logs authentik-worker | tail -200
              exit 1
            fi
            sleep 5
          done

      # ── Verify blueprint status ────────────────────────────────────────────
      # Confirm all custom blueprints applied successfully before proceeding.
      # Helps distinguish "OIDC discovery up but blueprint failed" scenarios.
      - name: Check Authentik blueprint status
        run: |
          echo "=== Blueprint instances ==="
          curl -s "http://authentik-server:9000/api/v3/blueprints/instances/" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {name: .name, status: .status, last_applied: .last_applied}'
          echo "=== FuzeFront OIDC provider check ==="
          curl -s "http://authentik-server:9000/api/v3/providers/oauth2/?search=FuzeFront" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {name: .name, client_id: .client_id, authorization_flow: .authorization_flow}'
          echo "=== FuzeFront application check ==="
          curl -s "http://authentik-server:9000/api/v3/core/applications/?search=fuzefront" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {name: .name, slug: .slug, policy_engine_mode: .policy_engine_mode}'
          echo "=== default-provider-authorization-implicit-consent flow check ==="
          curl -s "http://authentik-server:9000/api/v3/flows/instances/?search=implicit-consent" \
            -H "Authorization: Bearer e2e-bootstrap-token" | jq '.results[] | {slug: .slug, designation: .designation}'

      # ── Create the E2E test user via Authentik REST API ───────────────────
      # Uses the bootstrap token (AUTHENTIK_BOOTSTRAP_TOKEN=e2e-bootstrap-token).
      # This is cleaner than a blueprint because it's a simple API call and
      # produces no git-committed passwords.
      - name: Create E2E test user in Authentik
        run: |
          # Create user (internal type = password-based login).
          # Retry up to 10 times with 10s backoff in case the bootstrap token
          # is not yet active (the server applies the token during startup;
          # rarely it's not ready immediately after OIDC discovery is up).
          USER_PK=""
          for attempt in $(seq 1 10); do
            RESPONSE=$(curl -s -X POST http://authentik-server:9000/api/v3/core/users/ \
              -H "Authorization: Bearer e2e-bootstrap-token" \
              -H "Content-Type: application/json" \
              -d '{
                "username": "e2e-test",
                "name": "E2E Test User",
                "email": "e2e@test.local",
                "is_active": true,
                "type": "internal"
              }')
            echo "Create user attempt $attempt: $RESPONSE"
            USER_PK=$(echo "$RESPONSE" | jq -r '.pk // empty')
            if [ -n "$USER_PK" ] && [ "$USER_PK" != "null" ]; then
              break
            fi
            # Check for "already exists" (username conflict = already created)
            if echo "$RESPONSE" | jq -e '.username[]?' 2>/dev/null | grep -q "already exists"; then
              echo "User already exists — fetching pk"
              USER_PK=$(curl -s "http://authentik-server:9000/api/v3/core/users/?search=e2e-test" \
                -H "Authorization: Bearer e2e-bootstrap-token" | jq -r '.results[0].pk // empty')
              break
            fi
            if [ "$attempt" -eq 10 ]; then
              echo "Failed to create user after 10 attempts"
              exit 1
            fi
            echo "Retrying in 10s..."
            sleep 10
          done

          if [ -z "$USER_PK" ] || [ "$USER_PK" = "null" ]; then
            echo "Could not obtain user pk"
            exit 1
          fi

          # Set the user's password
          SET_PW=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://authentik-server:9000/api/v3/core/users/${USER_PK}/set_password/" \
            -H "Authorization: Bearer e2e-bootstrap-token" \
            -H "Content-Type: application/json" \
            -d "{\"password\": \"${E2E_USER_PASSWORD}\"}")
          echo "Set password HTTP status: $SET_PW"
          if [ "$SET_PW" != "204" ]; then
            echo "Failed to set password (expected 204, got $SET_PW)"
            exit 1
          fi

          echo "E2E test user created successfully (pk=${USER_PK}, email=e2e@test.local)"

      # ── Wait for backend and frontend ──────────────────────────────────────
      - name: Wait for backend health
        run: |
          for i in $(seq 1 18); do
            if curl -fsS http://localhost:3001/health >/dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "Backend did not become ready"
              docker compose -f docker-compose.e2e.yml logs backend | tail -40
              exit 1
            fi
            sleep 5
          done

      - name: Wait for backend OIDC login to be ready
        run: |
          echo "Waiting for backend OIDC login endpoint (up to 90s)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -o /dev/null -w "%{http_code}" -s --max-redirs 0 http://localhost:3001/api/auth/oidc/login)
            if [ "$STATUS" = "302" ]; then
              echo "Backend OIDC login ready (returned 302) after $((i * 5))s"
              break
            fi
            echo "Attempt $i: OIDC login returned $STATUS, waiting..."
            if [ "$i" -eq 18 ]; then
              echo "ERROR: Backend OIDC login not ready after 90s"
              docker compose -f docker-compose.e2e.yml logs backend | tail -30
              exit 1
            fi
            sleep 5
          done

      - name: Wait for frontend health
        run: |
          for i in $(seq 1 12); do
            if curl -fsS http://localhost:4173 >/dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 5
          done

      # ── Run OIDC plumbing E2E tests ────────────────────────────────────────
      - name: Run OIDC plumbing E2E tests
        working-directory: frontend
        env:
          BASE_URL: http://localhost:4173
          BACKEND_URL: http://localhost:3001
          AUTHENTIK_URL: http://authentik-server:9000
          E2E_USER_EMAIL: ${{ env.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ env.E2E_USER_PASSWORD }}
          # The plumbing test doesn't need Google-specific env vars.
          # Run headless (Authentik login page has no bot detection).
          PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ''
        run: npx playwright test tests/oidc-plumbing.e2e.spec.ts --project=chromium --reporter=list,html --timeout 180000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oidc-plumbing-playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Dump compose logs on failure
        if: failure()
        run: |
          echo "=== authentik-server (last 120 lines) ==="
          docker compose -f docker-compose.e2e.yml logs authentik-server | tail -120
          echo "=== authentik-worker (last 200 lines) ==="
          docker compose -f docker-compose.e2e.yml logs authentik-worker | tail -200
          echo "=== backend (last 200 lines — full, unfiltered) ==="
          docker compose -f docker-compose.e2e.yml logs backend | tail -200
          echo "=== frontend ==="
          docker compose -f docker-compose.e2e.yml logs frontend | tail -20

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
