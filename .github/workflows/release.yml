name: Release (images + GitOps bump)

# On merge to master that touches the platform: build backend/frontend, push to
# GHCR tagged with the commit SHA, then bump the tags in values-prod.yaml and
# commit. Argo CD sees the git change and rolls out the new images.
on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'frontend/**'
      - 'services/email-service/**'
      - 'services/sms-service/**'
      - 'services/provisioning-service/**'
      - 'services/billing-service/**'
      - 'clock-app/**'
      - 'deploy/helm/fuzefront/**'
      - '.github/workflows/release.yml'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the tag bump
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzefront-backend:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            # Empty => the frontend uses window.location.origin (same-origin /api).
            # Robust across hosts: works on app.prod.fuzefront.com now and on
            # app.fuzefront.com after the 301 fast-follow, with no cross-origin/mixed
            # -content risk under the Cloudflare TLS edge. (api.ts: VITE_API_URL || origin)
            VITE_API_URL=
          tags: |
            ghcr.io/izzywdev/fuzefront-frontend:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-frontend:latest
          # Dedicated scope: the frontend build context changed from ./frontend to
          # repo root, so the old shared gha cache snapshot (where nginx.conf sat at
          # the context root, not frontend/) no longer matches and buildkit errors
          # with "frontend/nginx.conf: not found". A fresh scope busts that.
          cache-from: type=gha,scope=frontend-root
          cache-to: type=gha,mode=max,scope=frontend-root

      - name: Build and push email-service
        # Ancillary services are disabled in prod (only billing is enabled) and some
        # have unbuilt workspace wiring. They must NEVER block the core backend+frontend
        # deploy — a failed build here is non-fatal; the bump+deploy still proceeds.
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/email-service/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzefront-email-service:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-email-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push sms-service
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/sms-service/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzefront-sms-service:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-sms-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push provisioning-service
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/provisioning-service/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzefront-provisioning-service:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-provisioning-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push billing-service
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/billing-service/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzefront-billing-service:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-billing-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push security-service
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/security/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzefront-security-service:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-security-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push applications-service
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/applications/Dockerfile
          push: true
          tags: |
            ghcr.io/izzywdev/fuzefront-applications-service:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-applications-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push clock-app (built-in MF remote)
        # Built-in reference Module-Federation remote, served same-origin at
        # app.fuzefront.com/apps/clock/. Self-contained Dockerfile => context is clock-app/.
        continue-on-error: true
        uses: docker/build-push-action@v5
        with:
          context: clock-app
          file: clock-app/Dockerfile
          push: true
          build-args: |
            VITE_HUB_API_URL=https://app.fuzefront.com
            VITE_PUBLIC_URL=https://app.fuzefront.com
          tags: |
            ghcr.io/izzywdev/fuzefront-clock-app:${{ steps.tag.outputs.sha }}
            ghcr.io/izzywdev/fuzefront-clock-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bump image tags in values-prod.yaml (GitOps)
        # master enables required_signatures, so a plain `git push` of a bot
        # commit is REJECTED (this step failed on every release since the
        # hardening landed — prod stopped rolling). Committing via the GitHub
        # contents API instead produces a server-side commit signed by GitHub's
        # web-flow key, which satisfies the ruleset
        # (governance/hardening-convention.md §3 / repo CLAUDE.md hardening).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILE: deploy/helm/fuzefront/values-prod.yaml
        run: |
          set -euo pipefail
          SHA="${{ steps.tag.outputs.sha }}"
          # Read-modify-write against CURRENT master, not this job's (stale)
          # checkout: the builds above take minutes, and pairing fresh blob-SHA
          # with stale content would silently overwrite any intervening edit to
          # the file. If master's file changes between this GET and the PUT the
          # blob-SHA no longer matches and the PUT 409s (rerun the job).
          RESP=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE}?ref=master")
          CUR_SHA=$(jq -r .sha <<<"$RESP")
          jq -r .content <<<"$RESP" | base64 -d > /tmp/vp-current.yaml
          # Bump ONLY the core-app image tags built by this workflow. A blanket
          # `tag:` sed would also stomp deliberately-pinned services and the
          # EXTERNAL images (authentik, unleash) whose tags are managed by hand.
          # The tag: line must be the line IMMEDIATELY after the repository:
          # line (true for every block in values-prod.yaml). Scoping `hot` to a
          # single following line means a block that drops its tag: can never
          # leak the bump onto a later, unrelated tag: (review finding).
          awk -v sha="$SHA" '
            hot {
              hot=0
              if ($0 ~ /^[[:space:]]*tag:/) {
                match($0, /^[[:space:]]*/)
                print substr($0, 1, RLENGTH) "tag: " sha
                n++
                next
              }
            }
            /repository: ghcr\.io\/izzywdev\/fuzefront-(backend|frontend|security-service|applications-service|clock-app)$/ { hot=1 }
            { print }
            END { print n+0 > "/tmp/bump-count" }
          ' /tmp/vp-current.yaml > /tmp/vp-new.yaml
          # Guard against silent no-ops: if the file layout drifts (quoted
          # values, reordered keys, renamed registry path) the awk matches
          # nothing and we would otherwise "succeed" while deploying stale
          # tags (review finding). Exactly 5 core-app tags must be rewritten.
          COUNT=$(cat /tmp/bump-count)
          if [ "$COUNT" -ne 5 ]; then
            echo "::error::expected 5 core-app tag rewrites in ${FILE}, got ${COUNT} — file layout changed; update the bump step"
            exit 1
          fi
          if cmp -s /tmp/vp-current.yaml /tmp/vp-new.yaml; then
            echo "values-prod.yaml already at ${SHA} — nothing to bump"
            exit 0
          fi
          # No pipe here: a rejected PUT (e.g. ruleset denies the actor) must
          # FAIL this step, not vanish into a downstream consumer's exit code.
          NEW_COMMIT=$(gh api -X PUT "repos/${GITHUB_REPOSITORY}/contents/${FILE}" \
            -f message="release: fuzefront images ${SHA} [skip ci]" \
            -f branch=master \
            -f sha="${CUR_SHA}" \
            -f content="$(base64 -w0 /tmp/vp-new.yaml)" \
            --jq '.commit.sha')
          echo "Bumped via API commit ${NEW_COMMIT}"
