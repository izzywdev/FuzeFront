name: Auto-PR from agent branches

# Closes the autonomy gap for ALL agent-created branch prefixes:
#
#   claude/**          — anthropics/claude-code-action (claude.yml, cloud sessions)
#   claude-auto-fix-ci-* — claude-ci-autofix.yml → izzywdev/AITools
#   ds-propagate/**    — ds-propagate.yml multi-agent runs (3 per DS push)
#   nightly-autofix-*  — nightly-integration.yml autofix job
#
# Gap 1 (draft PR never auto-merges): fixed by opening as ready-for-review + auto-merge label.
# Gap 2 (no PR at all when session errors/times-out): fixed by watching all four prefixes.
#
# Flow: push → this workflow → non-draft PR + auto-merge label
#       → auto-merge.yml enables gh pr merge --auto --squash --delete-branch
#       → CI passes → GitHub merges + deletes branch automatically.
on:
  push:
    branches:
      - 'claude/**'
      - 'claude-auto-fix-ci-*'
      - 'claude-auto-fix-ci-*/**'
      - 'ds-propagate/**'
      - 'nightly-autofix-*'
      - 'nightly-autofix-*/**'

permissions:
  contents: read
  pull-requests: write
  issues: write   # required for gh label create (repo-level labels API)

jobs:
  open-pr:
    runs-on: ${{ fromJSON(vars.RUNNER || '["ubuntu-latest"]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608  # v5
        with:
          fetch-depth: 0

      - name: Ensure auto-merge label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "auto-merge" --color "#0052cc" --description "Enable squash auto-merge once CI passes" --force 2>/dev/null || true

      - name: Open PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          BASE: ${{ github.event.repository.default_branch }}
        run: |
          existing=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "PR #$existing already open for $BRANCH — nothing to do."
            exit 0
          fi
          # Only open a PR if the branch actually diverges from base.
          if git rev-list --count "origin/${BASE}..origin/${BRANCH}" | grep -qvE '^0$'; then
            gh pr create --base "$BASE" --head "$BRANCH" --fill --label "auto-merge" \
              || { echo "::error::gh pr create failed for $BRANCH — branch will persist with no PR until governance-nightly retries"; exit 1; }
          else
            echo "No commits on $BRANCH ahead of $BASE — no PR opened."
          fi
