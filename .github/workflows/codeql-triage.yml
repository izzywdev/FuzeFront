name: Code-scanning triage (legacy alerts)

# Dismisses KNOWN-LEGACY code-scanning alerts that pre-date the current work
# and keep re-anchoring into PR diffs as "new" whenever nearby lines move
# (fingerprint drift). Scope is tightly bounded: only the listed rules, only
# in the listed legacy files. Real findings in new code are never touched —
# they get fixed in PRs, not dismissed.
#
# Manual dispatch only. dry_run=true prints what would be dismissed.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Only print what would be dismissed'
        required: false
        default: 'true'

permissions:
  security-events: write
  issues: write
  pull-requests: write

jobs:
  triage:
    runs-on: ${{ fromJSON(vars.RUNNER || '["ubuntu-latest"]') }}
    steps:
      - name: Dismiss legacy alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          # Legacy files whose alerts pre-date the SDLC gates (old logging
          # style, legacy local-auth machinery kept as machine/break-glass path).
          LEGACY_PATHS='backend/src/routes/auth.ts backend/src/index.ts backend/security/src/routes/auth.ts frontend/src/pages/LoginPage.tsx'
          # Rules considered legacy-noise/by-design IN THOSE FILES ONLY.
          DISMISS_RULES='js/tainted-format-string js/log-injection js/missing-rate-limiting js/user-controlled-bypass js/clear-text-logging javascript.lang.security.audit.unsafe-formatstring.unsafe-formatstring fuze-auth-local-password-store semgrep.fuze-auth-local-password-store fuze-auth-self-minted-user-token semgrep.fuze-auth-self-minted-user-token'

          COMMENT='Pre-existing legacy pattern (predates PR #218; re-anchored into the PR diff by fingerprint drift). The local-auth machinery is the intentional machine/break-glass path and this service is the platform token issuer. Tracked for dedicated cleanup — not introduced by current work.'

          PAGE=1
          DISMISSED=0
          SUMMARY=""
          while :; do
            ALERTS=$(gh api "repos/${GITHUB_REPOSITORY}/code-scanning/alerts?state=open&per_page=100&page=${PAGE}")
            COUNT=$(echo "$ALERTS" | jq 'length')
            [ "$COUNT" -eq 0 ] && break
            for row in $(echo "$ALERTS" | jq -r '.[] | @base64'); do
              _jq() { echo "$row" | base64 -d | jq -r "$1"; }
              NUM=$(_jq '.number')
              RULE=$(_jq '.rule.id')
              PATH_=$(_jq '.most_recent_instance.location.path')
              MATCH_RULE=false; MATCH_PATH=false
              for r in $DISMISS_RULES; do [ "$RULE" = "$r" ] && MATCH_RULE=true; done
              for p in $LEGACY_PATHS; do [ "$PATH_" = "$p" ] && MATCH_PATH=true; done
              if [ "$MATCH_RULE" = true ] && [ "$MATCH_PATH" = true ]; then
                SUMMARY="${SUMMARY}\n- #${NUM} ${RULE} @ ${PATH_}"
                if [ "$DRY_RUN" != "true" ]; then
                  gh api -X PATCH "repos/${GITHUB_REPOSITORY}/code-scanning/alerts/${NUM}" \
                    -f state=dismissed \
                    -f dismissed_reason="won't fix" \
                    -f dismissed_comment="$COMMENT" >/dev/null
                fi
                DISMISSED=$((DISMISSED+1))
              fi
            done
            PAGE=$((PAGE+1))
          done

          MODE=$([ "$DRY_RUN" = "true" ] && echo 'DRY RUN — would dismiss' || echo 'Dismissed')
          BODY=$(printf '## Code-scanning triage\n\n%s %d legacy alerts:\n%b' "$MODE" "$DISMISSED" "$SUMMARY")
          gh api "repos/${GITHUB_REPOSITORY}/issues/218/comments" -f body="$BODY" >/dev/null
          echo "$MODE $DISMISSED alerts"
