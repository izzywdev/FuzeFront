name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci   # root workspace (backend + shared) — applies root overrides
          cd frontend && npm ci
          cd ../sdk && npm ci
          cd ../api-client && npm ci
          cd ../task-manager-app && npm ci

      - name: Type checking
        run: |
          cd backend && npm run type-check
          cd ../frontend && npm run type-check
          cd ../sdk && npm run type-check
          cd ../api-client && npm run type-check

      - name: Lint code
        run: |
          cd backend && npm run lint
          cd ../frontend && npm run lint
          cd ../sdk && npm run lint

      # Backend tests need a Postgres service (and the Permit PDP), so they run
      # in the dedicated jobs that provide that infra — the `integration-tests`
      # job below and the `Backend Authentication Tests` workflow — not in this
      # infra-less lint/type/unit job.

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Run SDK tests
        run: cd sdk && npm test

  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci   # root workspace (backend + shared) — applies root overrides
          cd frontend && npm ci
          cd ../sdk && npm ci
          cd ../task-manager-app && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build SDK
        run: cd sdk && npm run build

      - name: Build task manager app
        run: cd task-manager-app && npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            backend/dist/
            frontend/dist/
            sdk/dist/
            task-manager-app/dist/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: frontfuse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Install dependencies
        run: |
          npm ci   # root workspace (backend + shared) — applies root overrides
          cd frontend && npm ci

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/frontfuse_test
          NODE_ENV: test
        run: cd backend && npm run test:integration

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build documentation
        run: |
          mkdir -p docs
          cp sdk/README.md docs/sdk-guide.md
          cp README.md docs/index.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs

  # Platform image build/push moved to release.yml (GHCR + GitOps tag bump).

  notify:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [lint-and-test, build, integration-tests]
    if: always()

    steps:
      - name: Notify on success
        if: ${{ needs.lint-and-test.result == 'success' && needs.build.result == 'success' && needs.integration-tests.result == 'success' }}
        run: |
          echo "✅ All checks passed! Ready for deployment."

      - name: Notify on failure
        if: ${{ needs.lint-and-test.result == 'failure' || needs.build.result == 'failure' || needs.integration-tests.result == 'failure' }}
        run: |
          echo "❌ Some checks failed. Please review the logs."
          exit 1
