name: Infra request → FuzeInfra

# Event-driven, decoupled IaC for the TERRAFORM plane only.
#
# Two planes, two mechanisms (see deploy/argocd/README + docs):
#   - Argo plane (deploy/argocd/**): PULL-reconciled. Once this repo's app-of-apps
#     is registered in Argo (a ONE-TIME install — see the FuzeOne onboarding
#     toolkit / fuzeone/README), Argo polls deploy/argocd/applications (recurse)
#     and self-discovers every inner-service Application on each merge. FuzeInfra
#     does NOT need to be notified for ongoing Argo changes — so this workflow no
#     longer fires on deploy/argocd/**.
#   - Terraform plane (deploy/terraform/**): OUT-of-cluster (Contabo nodes,
#     Cloudflare, cloud). Needs an explicit `terraform apply` with creds+state that
#     ONLY FuzeInfra holds. So on a change here we notify FuzeInfra to reconcile it.
#
# FuzeFront holds NO Contabo/cluster creds — only FUZEINFRA_DISPATCH_TOKEN, a
# narrowly-scoped token whose ONLY power is to fire a repository_dispatch on
# izzywdev/FuzeInfra. FuzeInfra's `on: repository_dispatch: types: [infra-request]`
# handler validates the request against its whitelist (never applies foreign HCL
# verbatim) and applies via its own state/creds (gated PR/plan as configured).
on:
  push:
    branches: [master]
    paths:
      - 'deploy/terraform/**'
  workflow_dispatch: {}

concurrency:
  group: infra-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute changed terraform paths
        id: changed
        run: |
          base="${{ github.event.before }}"
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then base="HEAD~1"; fi
          changed=$(git diff --name-only "$base" HEAD -- deploy/terraform | tr '\n' ',' | sed 's/,$//')
          echo "paths=$changed" >> "$GITHUB_OUTPUT"
          echo "changed: $changed"

      - name: Dispatch infra-request to FuzeInfra
        env:
          GH_TOKEN: ${{ secrets.FUZEINFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::FUZEINFRA_DISPATCH_TOKEN not set — cannot dispatch to FuzeInfra."
            exit 1
          fi
          gh api repos/izzywdev/FuzeInfra/dispatches \
            -f event_type=infra-request \
            -F "client_payload[repo]=${{ github.repository }}" \
            -F "client_payload[ref]=${{ github.sha }}" \
            -F "client_payload[changed]=${{ steps.changed.outputs.paths }}"
          echo "Dispatched infra-request → izzywdev/FuzeInfra (ref ${{ github.sha }})."
