name: i18n AI translation

# Build-time translation: when the English source locales or the curated
# language list change, AI-translate only the missing/changed keys via the
# in-cluster LiteLLM gateway and open a bot PR with the regenerated locale
# files. Translation never runs on every build — only on the inputs below
# (plus manual dispatch).
on:
  push:
    branches: [master]
    paths:
      - 'frontend/locales/en/**'
      - 'i18n.languages.json'
  workflow_dispatch:

concurrency:
  group: i18n-translate
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    name: Translate locales and open bot PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install i18n-translate CLI
        working-directory: packages/i18n-translate
        run: |
          npm ci || npm install
          npm run build

      - name: Run build-time translation
        env:
          I18N_LLM_ENDPOINT: ${{ secrets.I18N_LLM_ENDPOINT }}
          I18N_LLM_API_KEY: ${{ secrets.I18N_LLM_API_KEY }}
          I18N_LLM_MODEL: ${{ secrets.I18N_LLM_MODEL }}
        run: node packages/i18n-translate/dist/cli.js --locales-dir frontend/locales --languages i18n.languages.json

      - name: Open bot PR with regenerated locales
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(i18n): regenerate AI translations'
          branch: bot/i18n-translations
          delete-branch: true
          title: 'chore(i18n): regenerate AI translations'
          body: |
            Automated build-time translation of `frontend/locales/en/**` into the
            curated language set (see `i18n.languages.json`).

            - Only missing/changed keys were translated (per-key source hash).
            - ICU placeholders and `{{interpolation}}` tokens preserved.
            - Glossary/brand terms kept verbatim.

            Generated by `.github/workflows/i18n-translate.yml`.
          labels: i18n, automated
