name: E2E (sign-in)

# Real sign-in + federated-app + mobile-layout e2e against the FULL stack.
#
# The stack is stood up from docker-compose.e2e.yml via the ./.github/actions/e2e-stack
# composite action — the SINGLE definition of the e2e stack. This workflow used to
# hand-roll its own stale stack instead, and that drift is precisely why it was red
# for 30+ consecutive runs:
#
#   * it started Postgres + backend + frontend but NEVER the security service, and
#   * it seeded a local bcrypt row into `users.password_hash` for admin@fuzefront.dev.
#
# The SPA had already cut over to the provider-agnostic Security API — it signs in
# with POST /api/v1/security/session, which ONLY the security service serves and
# which brokers the credential through Authentik. So the login POST 404'd, no 200
# ever arrived, and auth-simple.spec.ts / clock-load.spec.ts both timed out in
# waitForResponse. The bcrypt seed could never have worked: FuzeFront stores no
# passwords, and a password_hash row is not a credential Authentik will accept.
#
# Now: the account is created IN AUTHENTIK, the security service is in the stack,
# and nginx routes /api/v1/security same-origin to it — so a pass here means
# password sign-in genuinely works end to end, exactly as in prod.

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: e2e-signin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  signin:
    name: Playwright sign-in flow
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      # The account lives in Authentik (created by the e2e-stack action), NOT in
      # the platform DB. The specs read these two vars.
      E2E_USER_EMAIL: e2e@test.local
      E2E_USER_PASSWORD: E2eP@ssw0rd123
      # Same-origin: every API call goes through the frontend container's nginx,
      # which path-routes /api/v1/security/ → security:3002 and /api/ → backend:3001.
      BASE_URL: http://localhost:4173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # ── Bring up the whole stack (compose + Authentik provisioning + user) ──
      - name: Start and provision the E2E stack
        uses: ./.github/actions/e2e-stack
        with:
          e2e-user-email: ${{ env.E2E_USER_EMAIL }}
          e2e-user-password: ${{ env.E2E_USER_PASSWORD }}

      # ── Example federated remote: build, serve, register ────────────────────
      # clock-app is not part of the compose stack; it is served on the host and
      # loaded cross-origin by the browser, which is what clock-load.spec.ts
      # exercises. The `apps` row is seeded directly because /api/apps/register
      # goes through requireAppPermission('create') → the Permit PDP, which is
      # absent in CI (ci-noop key).
      - name: Build, serve & register clock-app
        run: |
          cd clock-app
          npm install --include=dev
          VITE_HUB_API_URL=http://localhost:3001 VITE_PUBLIC_URL=http://localhost:4174 npm run build
          npx vite preview --port 4174 --host 0.0.0.0 > /tmp/clock.log 2>&1 &
          clock_up=false
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:4174/apps/clock/remoteEntry.js >/dev/null 2>&1; then
              echo "clock-app up"; clock_up=true; break
            fi
            sleep 2
          done
          if [ "$clock_up" = "false" ]; then
            echo "::error::clock-app never became accessible"; cat /tmp/clock.log; exit 1
          fi
          # vite preview serves the SPA fallback (200 HTML) for any unrecognised
          # path, which silently fools `curl -fsS`. Assert it is really JS.
          content_type=$(curl -fsS -I http://localhost:4174/apps/clock/remoteEntry.js | grep -i "content-type" || echo "MISSING")
          echo "Content-Type: ${content_type}"
          echo "$content_type" | grep -qi "javascript" || {
            echo "::error::remoteEntry.js returned non-JS content (HTML SPA fallback?)"; cat /tmp/clock.log; exit 1; }
          cors_header=$(curl -fsS -I -H "Origin: http://localhost:4173" http://localhost:4174/apps/clock/remoteEntry.js 2>&1 | grep -i "access-control-allow-origin" || true)
          echo "CORS header: ${cors_header:-MISSING}"

      - name: Seed the clock-app registration
        run: |
          docker compose -f docker-compose.e2e.yml exec -T postgres \
            psql -v ON_ERROR_STOP=1 -U e2e -d fuzefront_platform -c \
            "INSERT INTO apps (name, url, remote_url, scope, module, integration_type, description, is_active)
             VALUES ('Clock','http://localhost:4174','http://localhost:4174/apps/clock','clockApp','./ClockApp','module-federation','on-the-fly clock',true)
             ON CONFLICT (name) DO NOTHING;"
          echo 'clock-app seeded into the platform DB'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # ── Playwright: sign-in + runtime federated load ────────────────────────
      - name: Run Playwright e2e (sign-in + FuzeClock load)
        working-directory: frontend
        run: |
          npx playwright install --with-deps chromium
          npx playwright test tests/auth-simple.spec.ts tests/clock-load.spec.ts \
            --project=chromium --reporter=list

      # ── Playwright: mobile layout ───────────────────────────────────────────
      - name: Run Playwright e2e (mobile layout)
        working-directory: frontend
        run: |
          npx playwright install --with-deps webkit
          npx playwright test tests/mobile-layout.spec.ts --project=mobile --reporter=list

      - name: Dump stack logs (always, for diagnosis)
        if: always()
        run: |
          echo "=== security (last 120 lines) ==="
          docker compose -f docker-compose.e2e.yml logs security | tail -120 || true
          echo "=== backend (last 120 lines) ==="
          docker compose -f docker-compose.e2e.yml logs backend | tail -120 || true
          echo "=== frontend/nginx (last 60 lines) ==="
          docker compose -f docker-compose.e2e.yml logs frontend | tail -60 || true
          echo "=== authentik-server (last 60 lines) ==="
          docker compose -f docker-compose.e2e.yml logs authentik-server | tail -60 || true
          echo "=== clock-app (last 60 lines) ==="
          tail -60 /tmp/clock.log || echo "(no clock-app log)"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down E2E stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v
